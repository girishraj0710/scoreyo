<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Notebook with pencil - detailed illustration -->
  <!-- Shadow -->
  <ellipse cx="60" cy="90" rx="30" ry="4" fill="#000000" opacity="0.1"/>

  <!-- Notebook body -->
  <rect x="35" y="25" width="50" height="60" rx="3" fill="#FB923C"/>
  <rect x="38" y="28" width="44" height="54" rx="2" fill="#FFEDD5"/>

  <!-- Spiral binding -->
  <circle cx="42" cy="25" r="2" fill="#EA580C"/>
  <circle cx="50" cy="25" r="2" fill="#EA580C"/>
  <circle cx="58" cy="25" r="2" fill="#EA580C"/>
  <circle cx="66" cy="25" r="2" fill="#EA580C"/>
  <circle cx="74" cy="25" r="2" fill="#EA580C"/>

  <!-- Page lines -->
  <line x1="43" y1="38" x2="77" y2="38" stroke="#FB923C" stroke-width="1.5" opacity="0.5"/>
  <line x1="43" y1="45" x2="77" y2="45" stroke="#FB923C" stroke-width="1.5" opacity="0.5"/>
  <line x1="43" y1="52" x2="77" y2="52" stroke="#FB923C" stroke-width="1.5" opacity="0.5"/>
  <line x1="43" y1="59" x2="70" y2="59" stroke="#FB923C" stroke-width="1.5" opacity="0.5"/>
  <line x1="43" y1="66" x2="77" y2="66" stroke="#FB923C" stroke-width="1.5" opacity="0.5"/>
  <line x1="43" y1="73" x2="75" y2="73" stroke="#FB923C" stroke-width="1.5" opacity="0.5"/>

  <!-- Pencil -->
  <rect x="65" y="55" width="8" height="35" rx="1" fill="#FBBF24" transform="rotate(25 69 72)"/>
  <path d="M77 80 L73 76 L75 74 L79 78 Z" fill="#F59E0B"/>
  <rect x="65" y="55" width="8" height="6" rx="1" fill="#EF4444" transform="rotate(25 69 58)"/>
  <circle cx="69" cy="60" r="2" fill="#92400E" transform="rotate(25 69 60)"/>

  <!-- Pencil tip -->
  <path d="M79 78 L77.5 79.5 L80.5 82.5 L82 81 Z" fill="#78350F"/>
</svg>
