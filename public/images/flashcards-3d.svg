<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White circular background -->
  <circle cx="100" cy="90" r="55" fill="white" opacity="0.95"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="145" rx="48" ry="6" fill="#000000" opacity="0.1"/>

  <!-- Back cards (stack) -->
  <rect x="78" y="88" width="44" height="52" rx="4" fill="#CBD5E1" opacity="0.5" transform="rotate(-6 100 114)"/>
  <rect x="78" y="85" width="44" height="52" rx="4" fill="#E2E8F0" opacity="0.7" transform="rotate(-3 100 111)"/>

  <!-- Front flashcard -->
  <rect x="78" y="82" width="44" height="52" rx="4" fill="white" stroke="#8B5CF6" stroke-width="2.5"/>

  <!-- Question side -->
  <text x="100" y="98" font-family="Arial" font-size="9" fill="#6B7280" text-anchor="middle" font-weight="600">QUESTION</text>
  <circle cx="100" cy="112" r="10" fill="#8B5CF6"/>
  <text x="100" y="117" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">?</text>

  <!-- Flip indicator -->
  <path d="M107 122 L112 122 L112 127 M112 122 L107 125" stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Answer card (flipped, behind) -->
  <rect x="120" y="65" width="44" height="52" rx="4" fill="white" stroke="#10B981" stroke-width="2.5" opacity="0.6" transform="rotate(12 142 91)"/>
  <text x="142" y="83" font-family="Arial" font-size="9" fill="#10B981" text-anchor="middle" font-weight="600" transform="rotate(12 142 83)">ANSWER</text>
  <path d="M138 95 L141 98 L147 92" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" transform="rotate(12 142 95)"/>

  <!-- AI sparkle -->
  <circle cx="62" cy="75" r="12" fill="#FCD34D"/>
  <path d="M62 68 L63 72 L67 73 L63 74 L62 78 L61 74 L57 73 L61 72 Z" fill="white"/>
</svg>
