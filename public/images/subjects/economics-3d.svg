<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="16" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Book body -->
  <rect x="18" y="16" width="28" height="36" rx="2" fill="url(#book-gradient)"/>

  <!-- Book spine -->
  <rect x="18" y="16" width="4" height="36" rx="1" fill="#117A65"/>

  <!-- Pages -->
  <rect x="22" y="17" width="23" height="34" fill="#ECF0F1"/>

  <!-- Chart/Graph on cover -->
  <g transform="translate(32, 34)">
    <!-- Bar chart background -->
    <rect x="-10" y="-8" width="20" height="16" rx="1" fill="white" opacity="0.3"/>

    <!-- Rising bars -->
    <rect x="-8" y="2" width="3" height="6" rx="0.5" fill="#27AE60"/>
    <rect x="-4" y="-2" width="3" height="10" rx="0.5" fill="#2ECC71"/>
    <rect x="0" y="-6" width="3" height="14" rx="0.5" fill="#16A085"/>
    <rect x="4" y="-4" width="3" height="12" rx="0.5" fill="#1ABC9C"/>

    <!-- Upward arrow trend -->
    <path d="M -8 6 L 8 -6" stroke="#E74C3C" stroke-width="2" stroke-linecap="round"/>
    <path d="M 8 -6 L 5 -5 M 8 -6 L 7 -3" stroke="#E74C3C" stroke-width="2" stroke-linecap="round"/>

    <!-- Dollar sign -->
    <g transform="translate(-8, -6) scale(0.8)">
      <text x="0" y="0" text-anchor="middle" font-size="6" fill="#16A085" font-weight="bold">$</text>
    </g>
  </g>

  <!-- Title bar -->
  <rect x="22" y="22" width="20" height="3" rx="1" fill="#16A085"/>
  <text x="32" y="25" text-anchor="middle" font-size="2.2" fill="white" font-weight="bold">ECONOMICS</text>

  <!-- Page edge effect -->
  <line x1="45" y1="17" x2="45" y2="51" stroke="#BDC3C7" stroke-width="0.5"/>

  <!-- Coin decoration -->
  <g transform="translate(40, 46) scale(0.6)">
    <circle cx="0" cy="0" r="4" fill="url(#coin-gradient)"/>
    <text x="0" y="1.5" text-anchor="middle" font-size="4" fill="white" font-weight="bold">₹</text>
  </g>

  <defs>
    <linearGradient id="book-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1ABC9C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16A085;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coin-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F39C12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E67E22;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
