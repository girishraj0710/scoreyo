<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="16" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Book body -->
  <rect x="18" y="16" width="28" height="36" rx="2" fill="url(#book-gradient)"/>

  <!-- Book spine -->
  <rect x="18" y="16" width="4" height="36" rx="1" fill="#2874A6"/>

  <!-- Pages -->
  <rect x="22" y="17" width="23" height="34" fill="#ECF0F1"/>

  <!-- ABC letters on cover -->
  <g transform="translate(32, 30)">
    <text x="-8" y="0" font-size="10" fill="#3498DB" font-weight="bold" font-family="serif">A</text>
    <text x="0" y="6" font-size="10" fill="#5DADE2" font-weight="bold" font-family="serif">B</text>
    <text x="6" y="12" font-size="10" fill="#85C1E9" font-weight="bold" font-family="serif">C</text>
  </g>

  <!-- Title bar -->
  <rect x="22" y="22" width="20" height="3" rx="1" fill="#3498DB"/>
  <text x="32" y="25" text-anchor="middle" font-size="2.5" fill="white" font-weight="bold">ENGLISH</text>

  <!-- Page edge effect -->
  <line x1="45" y1="17" x2="45" y2="51" stroke="#BDC3C7" stroke-width="0.5"/>
  <line x1="44" y1="17" x2="44" y2="51" stroke="#D5DBDB" stroke-width="0.5"/>

  <!-- Quill pen decoration -->
  <g transform="translate(38, 44) rotate(-20)">
    <!-- Feather -->
    <path d="M 0 0 Q 2 -8 3 -12 Q 2 -8 1 -4 L 0 0" fill="url(#feather-gradient)"/>
    <path d="M 0 0 Q -1 -8 -2 -12 Q -1 -8 0 -4 L 0 0" fill="#95A5A6" opacity="0.5"/>

    <!-- Nib -->
    <path d="M 0 0 L -0.5 2 L 0 3 L 0.5 2 Z" fill="#34495E"/>
  </g>

  <!-- Text lines decoration -->
  <g opacity="0.3">
    <line x1="24" y1="46" x2="42" y2="46" stroke="#3498DB" stroke-width="0.5"/>
    <line x1="24" y1="48" x2="40" y2="48" stroke="#3498DB" stroke-width="0.5"/>
  </g>

  <defs>
    <linearGradient id="book-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980B9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="feather-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ECF0F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BDC3C7;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
