<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="16" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Book body -->
  <rect x="18" y="16" width="28" height="36" rx="2" fill="url(#book-gradient)"/>

  <!-- Book spine -->
  <rect x="18" y="16" width="4" height="36" rx="1" fill="#16A085"/>

  <!-- Pages -->
  <rect x="22" y="17" width="23" height="34" fill="#ECF0F1"/>

  <!-- Atom symbol on cover -->
  <g transform="translate(32, 34)">
    <!-- Nucleus -->
    <circle cx="0" cy="0" r="3" fill="#E74C3C"/>

    <!-- Electron orbits -->
    <ellipse cx="0" cy="0" rx="12" ry="5" stroke="#3498DB" stroke-width="1.5" fill="none" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="12" ry="5" stroke="#3498DB" stroke-width="1.5" fill="none" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="12" ry="5" stroke="#3498DB" stroke-width="1.5" fill="none" transform="rotate(120)"/>

    <!-- Electrons -->
    <circle cx="12" cy="0" r="2" fill="#3498DB"/>
    <circle cx="-6" cy="10" r="2" fill="#3498DB"/>
    <circle cx="-6" cy="-10" r="2" fill="#3498DB"/>
  </g>

  <!-- Title bar -->
  <rect x="22" y="22" width="20" height="3" rx="1" fill="#1ABC9C"/>
  <text x="32" y="25" text-anchor="middle" font-size="2.5" fill="white" font-weight="bold">PHYSICS</text>

  <!-- Page edge effect -->
  <line x1="45" y1="17" x2="45" y2="51" stroke="#BDC3C7" stroke-width="0.5"/>
  <line x1="44" y1="17" x2="44" y2="51" stroke="#D5DBDB" stroke-width="0.5"/>

  <!-- Bookmark -->
  <path d="M 28 16 L 28 28 L 30 26 L 32 28 L 32 16 Z" fill="#E74C3C"/>

  <defs>
    <linearGradient id="book-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1ABC9C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16A085;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
