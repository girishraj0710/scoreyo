<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="16" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Book body -->
  <rect x="18" y="16" width="28" height="36" rx="2" fill="url(#book-gradient)"/>

  <!-- Book spine -->
  <rect x="18" y="16" width="4" height="36" rx="1" fill="#117A65"/>

  <!-- Pages -->
  <rect x="22" y="17" width="23" height="34" fill="#ECF0F1"/>

  <!-- Globe/Earth on cover -->
  <g transform="translate(32, 34)">
    <!-- Globe circle -->
    <circle cx="0" cy="0" r="10" fill="url(#globe-gradient)"/>

    <!-- Latitude lines -->
    <ellipse cx="0" cy="-5" rx="8" ry="2" stroke="#2ECC71" stroke-width="0.8" fill="none" opacity="0.6"/>
    <ellipse cx="0" cy="0" rx="10" ry="3" stroke="#2ECC71" stroke-width="0.8" fill="none" opacity="0.6"/>
    <ellipse cx="0" cy="5" rx="8" ry="2" stroke="#2ECC71" stroke-width="0.8" fill="none" opacity="0.6"/>

    <!-- Longitude line -->
    <ellipse cx="0" cy="0" rx="3" ry="10" stroke="#2ECC71" stroke-width="0.8" fill="none" opacity="0.6"/>

    <!-- Continents suggestion -->
    <path d="M -4 -2 Q -2 -4 0 -3 Q 2 -4 4 -2 Q 3 0 4 2 Q 2 3 0 2 Q -2 3 -4 2 Q -3 0 -4 -2"
          fill="#27AE60" opacity="0.4"/>

    <!-- Highlight -->
    <ellipse cx="-3" cy="-3" rx="2" ry="3" fill="white" opacity="0.3"/>
  </g>

  <!-- Title bar -->
  <rect x="22" y="22" width="20" height="3" rx="1" fill="#16A085"/>
  <text x="32" y="25" text-anchor="middle" font-size="2.2" fill="white" font-weight="bold">GEOGRAPHY</text>

  <!-- Page edge effect -->
  <line x1="45" y1="17" x2="45" y2="51" stroke="#BDC3C7" stroke-width="0.5"/>

  <!-- Compass decoration -->
  <g transform="translate(40, 45) scale(0.5)">
    <circle cx="0" cy="0" r="3" stroke="#E74C3C" stroke-width="0.8" fill="none"/>
    <path d="M 0 -2 L 1 0 L 0 2 L -1 0 Z" fill="#E74C3C"/>
    <text x="0" y="-4" text-anchor="middle" font-size="2" fill="#34495E">N</text>
  </g>

  <defs>
    <linearGradient id="book-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1ABC9C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16A085;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="globe-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5DADE2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498DB;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
