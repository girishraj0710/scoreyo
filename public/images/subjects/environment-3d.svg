<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="16" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Book body -->
  <rect x="18" y="16" width="28" height="36" rx="2" fill="url(#book-gradient)"/>

  <!-- Book spine -->
  <rect x="18" y="16" width="4" height="36" rx="1" fill="#2E7D32"/>

  <!-- Pages -->
  <rect x="22" y="17" width="23" height="34" fill="#F1F8E9"/>

  <!-- Tree, earth, and recycling symbols on cover -->
  <g transform="translate(32, 32)">
    <!-- Tree -->
    <g transform="translate(-6, -4)">
      <!-- Trunk -->
      <rect x="-1" y="4" width="2" height="8" rx="0.5" fill="url(#trunk-gradient)"/>

      <!-- Foliage (3 circles forming tree crown) -->
      <circle cx="-3" cy="2" r="3" fill="url(#foliage-gradient)"/>
      <circle cx="3" cy="2" r="3" fill="url(#foliage-gradient)"/>
      <circle cx="0" cy="0" r="3.5" fill="url(#foliage-gradient)"/>

      <!-- Leaves detail -->
      <g opacity="0.6">
        <ellipse cx="-2" cy="1" rx="1" ry="1.5" fill="#66BB6A"/>
        <ellipse cx="2" cy="1" rx="1" ry="1.5" fill="#66BB6A"/>
        <ellipse cx="0" cy="-1" rx="1.2" ry="1.8" fill="#66BB6A"/>
      </g>

      <!-- Roots suggestion -->
      <g opacity="0.3">
        <line x1="-1" y1="12" x2="-2" y2="13" stroke="#795548" stroke-width="0.5"/>
        <line x1="1" y1="12" x2="2" y2="13" stroke="#795548" stroke-width="0.5"/>
      </g>
    </g>

    <!-- Earth/Globe -->
    <g transform="translate(5, -6)">
      <circle cx="0" cy="0" r="5" fill="url(#earth-gradient)"/>

      <!-- Continents (simplified) -->
      <g fill="#4CAF50" opacity="0.9">
        <ellipse cx="-1" cy="-2" rx="2" ry="1.5"/>
        <ellipse cx="1.5" cy="0" rx="1.5" ry="2"/>
        <ellipse cx="-2" cy="2" rx="1.5" ry="1"/>
      </g>

      <!-- Clouds -->
      <g fill="white" opacity="0.7">
        <ellipse cx="-2" cy="-3" rx="1.5" ry="0.8"/>
        <ellipse cx="2" cy="2" rx="1.2" ry="0.6"/>
      </g>
    </g>

    <!-- Recycling symbol -->
    <g transform="translate(6, 5)">
      <circle cx="0" cy="0" r="5.5" fill="none" stroke="url(#recycle-stroke)" stroke-width="0.8" stroke-dasharray="2,1" opacity="0.5"/>

      <!-- Three recycling arrows -->
      <g stroke="url(#recycle-stroke)" stroke-width="1.2" fill="none">
        <!-- Arrow 1 (top) -->
        <path d="M 0 -4 L 2 -2 M 0 -4 L -1.5 -2"/>
        <path d="M 0 -4 Q 3 -3 3.5 0"/>

        <!-- Arrow 2 (bottom right) -->
        <path d="M 3.5 3 L 2 2 M 3.5 3 L 3 4.5"/>
        <path d="M 3.5 3 Q 0 4 -2.5 2"/>

        <!-- Arrow 3 (bottom left) -->
        <path d="M -3.5 2 L -2.5 1 M -3.5 2 L -4.5 3"/>
        <path d="M -3.5 2 Q -2 -2 0 -4"/>
      </g>

      <!-- Recycling arrows filled triangles -->
      <g fill="url(#recycle-fill)">
        <path d="M 0 -4 L 2 -2 L -1.5 -2 Z"/>
        <path d="M 3.5 3 L 2 2 L 3 4.5 Z"/>
        <path d="M -3.5 2 L -2.5 1 L -4.5 3 Z"/>
      </g>
    </g>

    <!-- Water droplet (conservation) -->
    <g transform="translate(-10, 4)" opacity="0.7">
      <path d="M 0 0 Q -2 2 -2 3.5 Q -2 5 0 5 Q 2 5 2 3.5 Q 2 2 0 0 Z" fill="url(#water-gradient)"/>
    </g>

    <!-- Leaf decoration -->
    <g transform="translate(-9, -8)" opacity="0.6">
      <ellipse cx="0" cy="0" rx="1.5" ry="2.5" fill="#81C784" transform="rotate(-30)"/>
      <line x1="0" y1="-2" x2="0" y2="2" stroke="#558B2F" stroke-width="0.3"/>
    </g>

    <!-- Wind/air lines -->
    <g stroke="#BBDEFB" stroke-width="0.5" opacity="0.4">
      <line x1="-10" y1="-10" x2="-6" y2="-10"/>
      <line x1="-11" y1="-8" x2="-7" y2="-8"/>
      <line x1="7" y1="-9" x2="11" y2="-9"/>
    </g>
  </g>

  <!-- Title bar -->
  <rect x="22" y="22" width="20" height="3" rx="1" fill="#43A047"/>
  <text x="32" y="25" font-family="Arial" font-size="1.4" fill="white" text-anchor="middle" font-weight="bold">ENVIRONMENT</text>

  <!-- Page edge effect -->
  <line x1="45" y1="17" x2="45" y2="51" stroke="#DCEDC8" stroke-width="0.5"/>
  <line x1="44" y1="17" x2="44" y2="51" stroke="#C5E1A5" stroke-width="0.5"/>

  <!-- Bookmark -->
  <path d="M 30 16 L 30 28 L 32 26 L 34 28 L 34 16 Z" fill="#66BB6A"/>

  <defs>
    <linearGradient id="book-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#43A047;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="trunk-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8D6E63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D4C41;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="foliage-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81C784;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4CAF50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="earth-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64B5F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#42A5F5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="recycle-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#43A047;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="recycle-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81C784;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66BB6A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="water-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81D4FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4FC3F7;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
