<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="16" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Book body -->
  <rect x="18" y="16" width="28" height="36" rx="2" fill="url(#book-gradient)"/>

  <!-- Book spine -->
  <rect x="18" y="16" width="4" height="36" rx="1" fill="#E67E22"/>

  <!-- Pages -->
  <rect x="22" y="17" width="23" height="34" fill="#FEF5E7"/>

  <!-- Hindi text/Devanagari on cover -->
  <g transform="translate(32, 32)">
    <!-- Stylized Hindi characters -->
    <!-- Line at top (shiro rekha) -->
    <line x1="-10" y1="-6" x2="10" y2="-6" stroke="#E67E22" stroke-width="1.5"/>

    <!-- Character strokes (stylized) -->
    <g stroke="#D35400" stroke-width="2" fill="none">
      <!-- ह -->
      <path d="M -8 -6 L -8 2"/>
      <path d="M -8 -2 Q -6 0 -4 -2"/>

      <!-- िं -->
      <path d="M -2 -6 L -2 2"/>
      <circle cx="-2" cy="-8" r="1" fill="#D35400"/>

      <!-- दी -->
      <path d="M 2 -6 L 2 2"/>
      <path d="M 2 -2 Q 4 0 6 -2"/>
      <line x1="6" y1="-6" x2="6" y2="2"/>
    </g>

    <!-- Decorative element -->
    <g transform="translate(0, 8)">
      <path d="M -6 0 Q 0 -2 6 0" stroke="#F39C12" stroke-width="1" fill="none"/>
    </g>
  </g>

  <!-- Title bar -->
  <rect x="22" y="22" width="20" height="3" rx="1" fill="#E67E22"/>
  <text x="32" y="25" text-anchor="middle" font-size="2.5" fill="white" font-weight="bold">HINDI</text>

  <!-- Page edge effect -->
  <line x1="45" y1="17" x2="45" y2="51" stroke="#BDC3C7" stroke-width="0.5"/>

  <!-- Om symbol decoration -->
  <g transform="translate(26, 46) scale(0.7)">
    <path d="M 0 -2 Q 2 -4 4 -2 Q 6 0 4 2 Q 2 4 0 2 M 0 2 L 0 4 M -2 0 Q -4 2 -2 4"
          stroke="#D35400" stroke-width="1.5" fill="none"/>
  </g>

  <defs>
    <linearGradient id="book-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F39C12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E67E22;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
