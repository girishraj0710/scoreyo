<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="16" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Book body -->
  <rect x="18" y="16" width="28" height="36" rx="2" fill="url(#book-gradient)"/>

  <!-- Book spine -->
  <rect x="18" y="16" width="4" height="36" rx="1" fill="#8B0000"/>

  <!-- Pages -->
  <rect x="22" y="17" width="23" height="34" fill="#FFFAF0"/>

  <!-- Newspaper and breaking news icon on cover -->
  <g transform="translate(32, 32)">
    <!-- Newspaper -->
    <rect x="-10" y="-10" width="20" height="16" rx="0.5" fill="url(#paper-gradient)"/>

    <!-- Newspaper header -->
    <rect x="-9" y="-9" width="18" height="2.5" fill="#C0392B"/>
    <text x="0" y="-6.8" font-family="serif" font-size="1.8" fill="white" text-anchor="middle" font-weight="bold">DAILY NEWS</text>

    <!-- Headline with "BREAKING" banner -->
    <rect x="-9" y="-5.5" width="18" height="2" fill="#E74C3C"/>
    <text x="0" y="-3.8" font-family="Arial" font-size="1.5" fill="white" text-anchor="middle" font-weight="bold">BREAKING</text>

    <!-- News columns -->
    <g opacity="0.6">
      <!-- Left column -->
      <line x1="-8" y1="-2" x2="-1" y2="-2" stroke="#000" stroke-width="0.4"/>
      <line x1="-8" y1="-0.5" x2="-1" y2="-0.5" stroke="#000" stroke-width="0.3"/>
      <line x1="-8" y1="0.5" x2="-1" y2="0.5" stroke="#000" stroke-width="0.3"/>
      <line x1="-8" y1="1.5" x2="-3" y2="1.5" stroke="#000" stroke-width="0.3"/>

      <!-- Right column -->
      <line x1="1" y1="-2" x2="8" y2="-2" stroke="#000" stroke-width="0.4"/>
      <line x1="1" y1="-0.5" x2="8" y2="-0.5" stroke="#000" stroke-width="0.3"/>
      <line x1="1" y1="0.5" x2="8" y2="0.5" stroke="#000" stroke-width="0.3"/>
      <line x1="1" y1="1.5" x2="6" y2="1.5" stroke="#000" stroke-width="0.3"/>
    </g>

    <!-- Image placeholder in newspaper -->
    <rect x="-8" y="3" width="7" height="5" rx="0.3" fill="#BDC3C7"/>
    <rect x="1" y="3" width="7" height="5" rx="0.3" fill="#BDC3C7"/>

    <!-- Breaking news flash icon -->
    <g transform="translate(10, -8)">
      <circle cx="0" cy="0" r="3" fill="url(#flash-gradient)"/>
      <!-- Lightning bolt -->
      <path d="M 1 -2 L -1 0.5 L 0.5 0.5 L -0.5 2.5 L 1.5 0 L 0 0 Z" fill="#FFF" opacity="0.9"/>
    </g>

    <!-- Date stamp -->
    <rect x="-9" y="-12" width="6" height="1.5" rx="0.3" fill="#34495E"/>
    <text x="-6" y="-10.7" font-family="monospace" font-size="1" fill="white" text-anchor="middle">TODAY</text>
  </g>

  <!-- Title bar -->
  <rect x="22" y="22" width="20" height="3" rx="1" fill="#C0392B"/>
  <text x="32" y="25" font-family="Arial" font-size="1.6" fill="white" text-anchor="middle" font-weight="bold">CURRENT</text>

  <!-- Page edge effect -->
  <line x1="45" y1="17" x2="45" y2="51" stroke="#FADBD8" stroke-width="0.5"/>
  <line x1="44" y1="17" x2="44" y2="51" stroke="#F5B7B1" stroke-width="0.5"/>

  <!-- Bookmark -->
  <path d="M 30 16 L 30 28 L 32 26 L 34 28 L 34 16 Z" fill="#E74C3C"/>

  <!-- Date decoration -->
  <g opacity="0.2" font-family="monospace" font-size="2" fill="#8B0000">
    <text x="24" y="48">2026</text>
  </g>

  <defs>
    <linearGradient id="book-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="paper-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ECF0F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flash-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F39C12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E67E22;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
