<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="16" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Book body -->
  <rect x="18" y="16" width="28" height="36" rx="2" fill="url(#book-gradient)"/>

  <!-- Book spine -->
  <rect x="18" y="16" width="4" height="36" rx="1" fill="#0277BD"/>

  <!-- Pages -->
  <rect x="22" y="17" width="23" height="34" fill="#F0F8FF"/>

  <!-- Charts, graphs, and data visualizations on cover -->
  <g transform="translate(32, 32)">
    <!-- Bar chart -->
    <g transform="translate(-8, -2)">
      <rect x="0" y="6" width="2" height="6" fill="url(#bar1-gradient)"/>
      <rect x="3" y="3" width="2" height="9" fill="url(#bar2-gradient)"/>
      <rect x="6" y="5" width="2" height="7" fill="url(#bar3-gradient)"/>
      <rect x="9" y="1" width="2" height="11" fill="url(#bar4-gradient)"/>

      <!-- Axis lines -->
      <line x1="-1" y1="12" x2="12" y2="12" stroke="#01579B" stroke-width="0.5"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="#01579B" stroke-width="0.5"/>
    </g>

    <!-- Pie chart -->
    <g transform="translate(6, -6)">
      <circle cx="0" cy="0" r="5" fill="url(#pie-bg-gradient)"/>
      <!-- Pie slices -->
      <path d="M 0 0 L 0 -5 A 5 5 0 0 1 3.5 3.5 Z" fill="#42A5F5" opacity="0.9"/>
      <path d="M 0 0 L 3.5 3.5 A 5 5 0 0 1 -3.5 3.5 Z" fill="#1E88E5" opacity="0.9"/>
      <path d="M 0 0 L -3.5 3.5 A 5 5 0 0 1 0 -5 Z" fill="#1565C0" opacity="0.9"/>

      <!-- Center circle for donut effect -->
      <circle cx="0" cy="0" r="2" fill="#F0F8FF"/>
    </g>

    <!-- Line graph -->
    <g transform="translate(-8, -12)">
      <polyline points="0,8 2,6 4,7 6,4 8,5 10,2" stroke="#29B6F6" stroke-width="1" fill="none"/>
      <polyline points="0,8 2,6 4,7 6,4 8,5 10,2 10,10 0,10" fill="url(#line-gradient)" opacity="0.3"/>

      <!-- Data points -->
      <circle cx="0" cy="8" r="0.8" fill="#0277BD"/>
      <circle cx="2" cy="6" r="0.8" fill="#0277BD"/>
      <circle cx="4" cy="7" r="0.8" fill="#0277BD"/>
      <circle cx="6" cy="4" r="0.8" fill="#0277BD"/>
      <circle cx="8" cy="5" r="0.8" fill="#0277BD"/>
      <circle cx="10" cy="2" r="0.8" fill="#0277BD"/>
    </g>

    <!-- Data table icon -->
    <g transform="translate(4, 5)" opacity="0.7">
      <rect x="0" y="0" width="8" height="6" rx="0.5" fill="white" stroke="#0288D1" stroke-width="0.5"/>
      <line x1="0" y1="2" x2="8" y2="2" stroke="#0288D1" stroke-width="0.5"/>
      <line x1="4" y1="0" x2="4" y2="6" stroke="#0288D1" stroke-width="0.5"/>
      <line x1="0" y1="4" x2="8" y2="4" stroke="#0288D1" stroke-width="0.5"/>
    </g>

    <!-- Percentage symbol -->
    <g transform="translate(10, 10)">
      <circle cx="0" cy="0" r="1.5" fill="#01579B"/>
      <text x="0" y="0.6" font-family="Arial" font-size="1.8" fill="white" text-anchor="middle" font-weight="bold">%</text>
    </g>
  </g>

  <!-- Title bar -->
  <rect x="22" y="22" width="20" height="3" rx="1" fill="#0288D1"/>
  <text x="32" y="25" font-family="Arial" font-size="1.8" fill="white" text-anchor="middle" font-weight="bold">DILR</text>

  <!-- Page edge effect -->
  <line x1="45" y1="17" x2="45" y2="51" stroke="#E1F5FE" stroke-width="0.5"/>
  <line x1="44" y1="17" x2="44" y2="51" stroke="#B3E5FC" stroke-width="0.5"/>

  <!-- Bookmark -->
  <path d="M 30 16 L 30 28 L 32 26 L 34 28 L 34 16 Z" fill="#03A9F4"/>

  <!-- Data decoration -->
  <g opacity="0.15" font-family="monospace" font-size="2" fill="#0277BD">
    <text x="24" y="48">DATA</text>
  </g>

  <defs>
    <linearGradient id="book-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#03A9F4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288D1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar1-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#42A5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E88E5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar2-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#29B6F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#039BE5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar3-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#42A5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E88E5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar4-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#29B6F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#039BE5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pie-bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="line-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#29B6F6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#29B6F6;stop-opacity:0.1" />
    </linearGradient>
  </defs>
</svg>
