<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="16" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Book body -->
  <rect x="18" y="16" width="28" height="36" rx="2" fill="url(#book-gradient)"/>

  <!-- Book spine -->
  <rect x="18" y="16" width="4" height="36" rx="1" fill="#C2185B"/>

  <!-- Pages -->
  <rect x="22" y="17" width="23" height="34" fill="#FFF0F5"/>

  <!-- Child and learning symbols on cover -->
  <g transform="translate(32, 32)">
    <!-- Child figure -->
    <g transform="translate(-6, -6)">
      <!-- Head -->
      <circle cx="0" cy="0" r="3" fill="url(#skin-gradient)"/>
      <!-- Hair -->
      <path d="M -2.5 -1 Q -3 -3 -1 -3.5 Q 0 -4 1 -3.5 Q 3 -3 2.5 -1 Z" fill="#6D4C41"/>
      <!-- Body -->
      <ellipse cx="0" cy="5" rx="2.5" ry="3" fill="url(#clothes-gradient)"/>
      <!-- Arms -->
      <ellipse cx="-2.5" cy="4" rx="1" ry="2.5" fill="url(#clothes-gradient)"/>
      <ellipse cx="2.5" cy="4" rx="1" ry="2.5" fill="url(#clothes-gradient)"/>
      <!-- Legs -->
      <rect x="-1.5" y="7" width="1.2" height="3" rx="0.6" fill="#5D4037"/>
      <rect x="0.3" y="7" width="1.2" height="3" rx="0.6" fill="#5D4037"/>
      <!-- Happy face -->
      <circle cx="-1" cy="0" r="0.4" fill="#333"/>
      <circle cx="1" cy="0" r="0.4" fill="#333"/>
      <path d="M -1.5 1 Q 0 2 1.5 1" stroke="#333" stroke-width="0.3" fill="none"/>
    </g>

    <!-- Educational toys/blocks -->
    <g transform="translate(4, 2)">
      <!-- Building block -->
      <rect x="0" y="0" width="4" height="4" rx="0.5" fill="url(#block1-gradient)"/>
      <text x="2" y="3" font-family="Arial" font-size="2.5" fill="white" text-anchor="middle" font-weight="bold">A</text>
    </g>

    <g transform="translate(6, -4)">
      <!-- Building block -->
      <rect x="0" y="0" width="3.5" height="3.5" rx="0.5" fill="url(#block2-gradient)"/>
      <text x="1.75" y="2.5" font-family="Arial" font-size="2" fill="white" text-anchor="middle" font-weight="bold">1</text>
    </g>

    <!-- Book/learning icon -->
    <g transform="translate(-8, 4)">
      <rect x="0" y="0" width="6" height="4" rx="0.5" fill="url(#mini-book-gradient)"/>
      <line x1="3" y1="0" x2="3" y2="4" stroke="#E91E63" stroke-width="0.4"/>
    </g>

    <!-- Heart decoration (care/nurture) -->
    <g transform="translate(9, 5)">
      <path d="M 0 1 L -1.5 -0.5 Q -2 -1.5 -1 -2 Q 0 -2 0 -1 Q 0 -2 1 -2 Q 2 -1.5 1.5 -0.5 Z" fill="#EC407A" opacity="0.8"/>
    </g>

    <!-- Stars (achievements/growth) -->
    <g fill="#FFD54F" opacity="0.7">
      <path d="M -10 -8 L -9.5 -6.5 L -8 -6.5 L -9 -5.5 L -8.5 -4 L -10 -5 L -11.5 -4 L -11 -5.5 L -12 -6.5 L -10.5 -6.5 Z" transform="scale(0.6)"/>
      <path d="M 12 -6 L 12.5 -4.5 L 14 -4.5 L 13 -3.5 L 13.5 -2 L 12 -3 L 10.5 -2 L 11 -3.5 L 10 -4.5 L 11.5 -4.5 Z" transform="scale(0.5)"/>
    </g>
  </g>

  <!-- Title bar -->
  <rect x="22" y="22" width="20" height="3" rx="1" fill="#E91E63"/>
  <text x="32" y="25" font-family="Arial" font-size="1.8" fill="white" text-anchor="middle" font-weight="bold">CDP</text>

  <!-- Page edge effect -->
  <line x1="45" y1="17" x2="45" y2="51" stroke="#FCE4EC" stroke-width="0.5"/>
  <line x1="44" y1="17" x2="44" y2="51" stroke="#F8BBD0" stroke-width="0.5"/>

  <!-- Bookmark -->
  <path d="M 30 16 L 30 28 L 32 26 L 34 28 L 34 16 Z" fill="#F06292"/>

  <defs>
    <linearGradient id="book-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC407A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D81B60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skin-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCCBC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFAB91;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clothes-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81C784;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66BB6A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="block1-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42A5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E88E5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="block2-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFA726;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FB8C00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mini-book-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F48FB1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F06292;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
