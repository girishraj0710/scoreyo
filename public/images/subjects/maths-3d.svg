<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="16" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Book/Notebook body -->
  <rect x="18" y="16" width="28" height="36" rx="2" fill="url(#book-gradient)"/>

  <!-- Spiral binding holes -->
  <g fill="#34495E">
    <circle cx="20" cy="20" r="1"/>
    <circle cx="20" cy="26" r="1"/>
    <circle cx="20" cy="32" r="1"/>
    <circle cx="20" cy="38" r="1"/>
    <circle cx="20" cy="44" r="1"/>
    <circle cx="20" cy="50" r="1"/>
  </g>

  <!-- Pages -->
  <rect x="22" y="17" width="23" height="34" fill="#ECF0F1"/>

  <!-- Math symbols and formulas on cover -->
  <g transform="translate(32, 28)">
    <!-- Pi symbol -->
    <text x="0" y="0" text-anchor="middle" font-size="8" fill="#8E44AD" font-weight="bold" font-family="serif">π</text>

    <!-- Square root -->
    <g transform="translate(-8, 8)">
      <path d="M 0 0 L 2 2 L 4 -4 L 16 -4" stroke="#8E44AD" stroke-width="1.5" fill="none"/>
      <text x="6" y="-1" font-size="4" fill="#8E44AD">x</text>
    </g>

    <!-- Plus minus -->
    <g transform="translate(8, 10)">
      <line x1="-3" y1="0" x2="3" y2="0" stroke="#8E44AD" stroke-width="1.5"/>
      <line x1="0" y1="-3" x2="0" y2="3" stroke="#8E44AD" stroke-width="1.5"/>
    </g>

    <!-- Equals -->
    <g transform="translate(-6, 18)">
      <line x1="0" y1="0" x2="6" y2="0" stroke="#8E44AD" stroke-width="1.5"/>
      <line x1="0" y1="3" x2="6" y2="3" stroke="#8E44AD" stroke-width="1.5"/>
    </g>

    <!-- Exponent -->
    <text x="8" y="20" font-size="4" fill="#8E44AD" font-weight="bold">x²</text>
  </g>

  <!-- Title bar -->
  <rect x="22" y="22" width="20" height="3" rx="1" fill="#9B59B6"/>
  <text x="32" y="25" text-anchor="middle" font-size="2.5" fill="white" font-weight="bold">MATHS</text>

  <!-- Page edge effect -->
  <line x1="45" y1="17" x2="45" y2="51" stroke="#BDC3C7" stroke-width="0.5"/>
  <line x1="44" y1="17" x2="44" y2="51" stroke="#D5DBDB" stroke-width="0.5"/>

  <!-- Pencil decoration -->
  <g transform="translate(40, 46) rotate(-30)">
    <rect x="0" y="0" width="2" height="10" rx="1" fill="#F39C12"/>
    <path d="M 0 10 L 1 12 L 2 10 Z" fill="#E67E22"/>
    <rect x="0" y="0" width="2" height="1.5" fill="#34495E"/>
  </g>

  <defs>
    <linearGradient id="book-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8E44AD;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
