<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="16" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Book body -->
  <rect x="18" y="16" width="28" height="36" rx="2" fill="url(#book-gradient)"/>

  <!-- Book spine -->
  <rect x="18" y="16" width="4" height="36" rx="1" fill="#CA6F1E"/>

  <!-- Pages -->
  <rect x="22" y="17" width="23" height="34" fill="#ECF0F1"/>

  <!-- People/Community icon on cover -->
  <g transform="translate(32, 34)">
    <!-- Three people silhouettes -->
    <!-- Person 1 (left) -->
    <g transform="translate(-8, 0)">
      <circle cx="0" cy="-4" r="2.5" fill="#D35400"/>
      <path d="M -3 0 Q -3 -2 0 -2 Q 3 -2 3 0 L 3 6 L -3 6 Z" fill="#D35400"/>
    </g>

    <!-- Person 2 (center) -->
    <g transform="translate(0, -2)">
      <circle cx="0" cy="-4" r="3" fill="#E67E22"/>
      <path d="M -4 0 Q -4 -2 0 -2 Q 4 -2 4 0 L 4 7 L -4 7 Z" fill="#E67E22"/>
    </g>

    <!-- Person 3 (right) -->
    <g transform="translate(8, 0)">
      <circle cx="0" cy="-4" r="2.5" fill="#D35400"/>
      <path d="M -3 0 Q -3 -2 0 -2 Q 3 -2 3 0 L 3 6 L -3 6 Z" fill="#D35400"/>
    </g>

    <!-- Connecting hands -->
    <path d="M -5 2 L -2 0 M 2 0 L 5 2" stroke="#E67E22" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Title bar -->
  <rect x="22" y="22" width="20" height="3" rx="1" fill="#E67E22"/>
  <text x="32" y="25" text-anchor="middle" font-size="1.8" fill="white" font-weight="bold">SOCIAL</text>

  <!-- Page edge effect -->
  <line x1="45" y1="17" x2="45" y2="51" stroke="#BDC3C7" stroke-width="0.5"/>

  <!-- Heart decoration (society/care) -->
  <g transform="translate(28, 46) scale(0.5)">
    <path d="M 0 2 Q -3 -2 -6 0 Q -8 2 -6 6 L 0 10 L 6 6 Q 8 2 6 0 Q 3 -2 0 2 Z" fill="#E74C3C"/>
  </g>

  <defs>
    <linearGradient id="book-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D35400;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
