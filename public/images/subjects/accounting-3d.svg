<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="16" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Book body -->
  <rect x="18" y="16" width="28" height="36" rx="2" fill="url(#book-gradient)"/>

  <!-- Book spine -->
  <rect x="18" y="16" width="4" height="36" rx="1" fill="#8B6914"/>

  <!-- Pages -->
  <rect x="22" y="17" width="23" height="34" fill="#FFF8DC"/>

  <!-- Calculator and rupee symbol on cover -->
  <g transform="translate(32, 32)">
    <!-- Calculator body -->
    <rect x="-7" y="-8" width="14" height="18" rx="1" fill="url(#calc-gradient)"/>

    <!-- Calculator screen -->
    <rect x="-6" y="-7" width="12" height="4" rx="0.5" fill="#2C3E50" opacity="0.8"/>
    <text x="0" y="-4" font-family="monospace" font-size="2.5" fill="#7FFF00" text-anchor="middle">888.88</text>

    <!-- Calculator buttons (grid) -->
    <g opacity="0.7">
      <rect x="-5.5" y="-2" width="2.5" height="2" rx="0.3" fill="#ECF0F1"/>
      <rect x="-2.5" y="-2" width="2.5" height="2" rx="0.3" fill="#ECF0F1"/>
      <rect x="0.5" y="-2" width="2.5" height="2" rx="0.3" fill="#ECF0F1"/>
      <rect x="3.5" y="-2" width="2.5" height="2" rx="0.3" fill="#F39C12"/>

      <rect x="-5.5" y="0.5" width="2.5" height="2" rx="0.3" fill="#ECF0F1"/>
      <rect x="-2.5" y="0.5" width="2.5" height="2" rx="0.3" fill="#ECF0F1"/>
      <rect x="0.5" y="0.5" width="2.5" height="2" rx="0.3" fill="#ECF0F1"/>
      <rect x="3.5" y="0.5" width="2.5" height="2" rx="0.3" fill="#F39C12"/>

      <rect x="-5.5" y="3" width="2.5" height="2" rx="0.3" fill="#ECF0F1"/>
      <rect x="-2.5" y="3" width="2.5" height="2" rx="0.3" fill="#ECF0F1"/>
      <rect x="0.5" y="3" width="2.5" height="2" rx="0.3" fill="#ECF0F1"/>
      <rect x="3.5" y="3" width="2.5" height="2" rx="0.3" fill="#F39C12"/>

      <rect x="-5.5" y="5.5" width="5.5" height="2" rx="0.3" fill="#ECF0F1"/>
      <rect x="0.5" y="5.5" width="2.5" height="2" rx="0.3" fill="#ECF0F1"/>
      <rect x="3.5" y="5.5" width="2.5" height="4" rx="0.3" fill="#2ECC71"/>
    </g>

    <!-- Rupee symbol -->
    <g transform="translate(-10, -10)">
      <circle cx="0" cy="0" r="3.5" fill="url(#rupee-gradient)"/>
      <text x="0" y="1.5" font-family="Arial" font-size="4" font-weight="bold" fill="white" text-anchor="middle">₹</text>
    </g>
  </g>

  <!-- Title bar -->
  <rect x="22" y="22" width="20" height="3" rx="1" fill="#8B6914"/>
  <text x="32" y="25" font-family="Arial" font-size="2" fill="white" text-anchor="middle">ACCOUNTS</text>

  <!-- Page edge effect -->
  <line x1="45" y1="17" x2="45" y2="51" stroke="#D4AF37" stroke-width="0.5"/>
  <line x1="44" y1="17" x2="44" y2="51" stroke="#E5C158" stroke-width="0.5"/>

  <!-- Bookmark -->
  <path d="M 30 16 L 30 28 L 32 26 L 34 28 L 34 16 Z" fill="#D4AF37"/>

  <!-- Ledger lines decoration -->
  <g opacity="0.3">
    <line x1="24" y1="44" x2="42" y2="44" stroke="#8B6914" stroke-width="0.3"/>
    <line x1="24" y1="46" x2="42" y2="46" stroke="#8B6914" stroke-width="0.3"/>
    <line x1="24" y1="48" x2="38" y2="48" stroke="#8B6914" stroke-width="0.3"/>
  </g>

  <defs>
    <linearGradient id="book-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="calc-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34495E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C3E50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rupee-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F39C12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E67E22;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
