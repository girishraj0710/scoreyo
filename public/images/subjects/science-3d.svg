<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="16" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Book body -->
  <rect x="18" y="16" width="28" height="36" rx="2" fill="url(#book-gradient)"/>

  <!-- Book spine -->
  <rect x="18" y="16" width="4" height="36" rx="1" fill="#117A65"/>

  <!-- Pages -->
  <rect x="22" y="17" width="23" height="34" fill="#ECF0F1"/>

  <!-- Microscope on cover -->
  <g transform="translate(32, 34)">
    <!-- Base -->
    <rect x="-8" y="8" width="16" height="2" rx="1" fill="#34495E"/>

    <!-- Stand -->
    <rect x="-1" y="0" width="2" height="10" fill="#7F8C8D"/>

    <!-- Stage -->
    <rect x="-6" y="4" width="12" height="1" fill="#95A5A6"/>

    <!-- Body tube -->
    <rect x="-2" y="-8" width="4" height="8" rx="1" fill="url(#microscope-gradient)"/>

    <!-- Eyepiece -->
    <ellipse cx="0" cy="-9" rx="2" ry="1.5" fill="#34495E"/>

    <!-- Objective lens -->
    <ellipse cx="0" cy="1" rx="3" ry="2" fill="#2C3E50"/>

    <!-- Light reflection -->
    <ellipse cx="-1" cy="-6" rx="1" ry="2" fill="white" opacity="0.3"/>
  </g>

  <!-- Title bar -->
  <rect x="22" y="22" width="20" height="3" rx="1" fill="#16A085"/>
  <text x="32" y="25" text-anchor="middle" font-size="2.5" fill="white" font-weight="bold">SCIENCE</text>

  <!-- Page edge effect -->
  <line x1="45" y1="17" x2="45" y2="51" stroke="#BDC3C7" stroke-width="0.5"/>

  <defs>
    <linearGradient id="book-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16A085;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#138D75;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="microscope-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#95A5A6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7F8C8D;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
