<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="16" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Book body -->
  <rect x="18" y="16" width="28" height="36" rx="2" fill="url(#book-gradient)"/>

  <!-- Book spine -->
  <rect x="18" y="16" width="4" height="36" rx="1" fill="#C0392B"/>

  <!-- Pages -->
  <rect x="22" y="17" width="23" height="34" fill="#FFF5EE"/>

  <!-- Calculator and numbers on cover -->
  <g transform="translate(32, 32)">
    <!-- Mini calculator -->
    <rect x="-6" y="-9" width="12" height="15" rx="1" fill="url(#calc-gradient)"/>
    <rect x="-5" y="-8" width="10" height="3" rx="0.5" fill="#1A1A1A"/>
    <text x="0" y="-5.5" font-family="monospace" font-size="2" fill="#00FF00" text-anchor="middle">123.45</text>

    <!-- Calculator buttons -->
    <g opacity="0.8">
      <circle cx="-3.5" cy="-3" r="1" fill="#ECF0F1"/>
      <circle cx="-0.5" cy="-3" r="1" fill="#ECF0F1"/>
      <circle cx="2.5" cy="-3" r="1" fill="#ECF0F1"/>
      <rect x="4" y="-4" width="1.5" height="3" rx="0.3" fill="#E74C3C"/>

      <circle cx="-3.5" cy="0" r="1" fill="#ECF0F1"/>
      <circle cx="-0.5" cy="0" r="1" fill="#ECF0F1"/>
      <circle cx="2.5" cy="0" r="1" fill="#ECF0F1"/>
      <rect x="4" y="-1" width="1.5" height="3" rx="0.3" fill="#E74C3C"/>

      <circle cx="-3.5" cy="3" r="1" fill="#ECF0F1"/>
      <circle cx="-0.5" cy="3" r="1" fill="#ECF0F1"/>
      <circle cx="2.5" cy="3" r="1" fill="#ECF0F1"/>
      <rect x="4" y="2" width="1.5" height="3" rx="0.3" fill="#2ECC71"/>
    </g>

    <!-- Mathematical symbols floating around -->
    <g font-family="Arial" font-weight="bold" fill="url(#symbol-gradient)">
      <text x="-10" y="-6" font-size="4">+</text>
      <text x="8" y="-8" font-size="4">−</text>
      <text x="-11" y="4" font-size="4">×</text>
      <text x="9" y="10" font-size="4">÷</text>
      <text x="-10" y="12" font-size="3.5">%</text>
    </g>

    <!-- Speed lines to indicate "quick calculation" -->
    <g opacity="0.3">
      <line x1="7" y1="8" x2="11" y2="12" stroke="#E67E22" stroke-width="0.8"/>
      <line x1="8" y1="6" x2="12" y2="8" stroke="#E67E22" stroke-width="0.8"/>
      <line x1="6" y1="10" x2="10" y2="14" stroke="#E67E22" stroke-width="0.8"/>
    </g>
  </g>

  <!-- Title bar -->
  <rect x="22" y="22" width="20" height="3" rx="1" fill="#E67E22"/>
  <text x="32" y="25" font-family="Arial" font-size="1.8" fill="white" text-anchor="middle" font-weight="bold">QUANT</text>

  <!-- Page edge effect -->
  <line x1="45" y1="17" x2="45" y2="51" stroke="#FADBD8" stroke-width="0.5"/>
  <line x1="44" y1="17" x2="44" y2="51" stroke="#F5CBA7" stroke-width="0.5"/>

  <!-- Bookmark -->
  <path d="M 30 16 L 30 28 L 32 26 L 34 28 L 34 16 Z" fill="#E67E22"/>

  <!-- Number pattern decoration -->
  <g opacity="0.2" font-family="monospace" font-size="2.5" fill="#C0392B">
    <text x="24" y="46">1 2 3</text>
    <text x="24" y="49">4 5 6</text>
  </g>

  <defs>
    <linearGradient id="book-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D35400;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="calc-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34495E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C3E50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="symbol-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
