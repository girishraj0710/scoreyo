<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="16" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Book body -->
  <rect x="18" y="16" width="28" height="36" rx="2" fill="url(#book-gradient)"/>

  <!-- Book spine -->
  <rect x="18" y="16" width="4" height="36" rx="1" fill="#FF6F00"/>

  <!-- Pages -->
  <rect x="22" y="17" width="23" height="34" fill="#FFFEF7"/>

  <!-- Constitution and government symbols on cover -->
  <g transform="translate(32, 30)">
    <!-- Ashoka Chakra (Indian emblem) -->
    <g transform="translate(0, -6)">
      <circle cx="0" cy="0" r="5" fill="url(#chakra-gradient)"/>
      <circle cx="0" cy="0" r="4" fill="none" stroke="#1A237E" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="1" fill="#1A237E"/>

      <!-- 24 spokes -->
      <g stroke="#1A237E" stroke-width="0.4">
        <line x1="0" y1="-4" x2="0" y2="-1" transform="rotate(0)"/>
        <line x1="0" y1="-4" x2="0" y2="-1" transform="rotate(15)"/>
        <line x1="0" y1="-4" x2="0" y2="-1" transform="rotate(30)"/>
        <line x1="0" y1="-4" x2="0" y2="-1" transform="rotate(45)"/>
        <line x1="0" y1="-4" x2="0" y2="-1" transform="rotate(60)"/>
        <line x1="0" y1="-4" x2="0" y2="-1" transform="rotate(75)"/>
        <line x1="0" y1="-4" x2="0" y2="-1" transform="rotate(90)"/>
        <line x1="0" y1="-4" x2="0" y2="-1" transform="rotate(105)"/>
        <line x1="0" y1="-4" x2="0" y2="-1" transform="rotate(120)"/>
        <line x1="0" y1="-4" x2="0" y2="-1" transform="rotate(135)"/>
        <line x1="0" y1="-4" x2="0" y2="-1" transform="rotate(150)"/>
        <line x1="0" y1="-4" x2="0" y2="-1" transform="rotate(165)"/>
      </g>
    </g>

    <!-- Government building/Parliament -->
    <g transform="translate(0, 6)">
      <!-- Building base -->
      <rect x="-8" y="4" width="16" height="6" fill="url(#building-gradient)"/>

      <!-- Pillars -->
      <rect x="-7" y="-2" width="1.5" height="6" fill="#FFFEF7"/>
      <rect x="-3" y="-2" width="1.5" height="6" fill="#FFFEF7"/>
      <rect x="1.5" y="-2" width="1.5" height="6" fill="#FFFEF7"/>
      <rect x="5.5" y="-2" width="1.5" height="6" fill="#FFFEF7"/>

      <!-- Dome/Top -->
      <ellipse cx="0" cy="-2" rx="9" ry="3" fill="url(#dome-gradient)"/>
      <path d="M 0 -5 L -1 -2 L 1 -2 Z" fill="#D4AF37"/>
      <circle cx="0" cy="-5" r="0.8" fill="#FF6F00"/>
    </g>

    <!-- Indian flag colors stripe -->
    <g transform="translate(-10, -10)">
      <rect x="0" y="0" width="6" height="1" fill="#FF9933"/>
      <rect x="0" y="1" width="6" height="1" fill="#FFFFFF"/>
      <rect x="0" y="2" width="6" height="1" fill="#138808"/>
    </g>
  </g>

  <!-- Title bar -->
  <rect x="22" y="22" width="20" height="3" rx="1" fill="#FF6F00"/>
  <text x="32" y="25" font-family="Arial" font-size="1.7" fill="white" text-anchor="middle" font-weight="bold">POLITY</text>

  <!-- Page edge effect -->
  <line x1="45" y1="17" x2="45" y2="51" stroke="#FFF3E0" stroke-width="0.5"/>
  <line x1="44" y1="17" x2="44" y2="51" stroke="#FFE0B2" stroke-width="0.5"/>

  <!-- Bookmark with tricolor -->
  <g>
    <path d="M 30 16 L 30 28 L 32 26 L 34 28 L 34 16 Z" fill="#FF9933"/>
    <rect x="30" y="20" width="4" height="2.7" fill="#FFFFFF"/>
    <rect x="30" y="22.7" width="4" height="2.7" fill="#138808"/>
  </g>

  <!-- "We the People" decoration -->
  <g opacity="0.15" font-family="serif" font-size="1.8" fill="#FF6F00" font-style="italic">
    <text x="24" y="48">Constitution</text>
  </g>

  <defs>
    <linearGradient id="book-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB74D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9800;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chakra-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E3F2FD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="building-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFEF7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F5DC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dome-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C5A028;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
