<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White circular background -->
  <circle cx="100" cy="90" r="55" fill="white" opacity="0.95"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="145" rx="45" ry="6" fill="#000000" opacity="0.1"/>

  <!-- Calendar -->
  <rect x="70" y="60" width="60" height="70" rx="4" fill="#1E293B"/>
  <rect x="73" y="75" width="54" height="52" rx="2" fill="white"/>

  <!-- Calendar header -->
  <rect x="70" y="60" width="60" height="15" rx="4" fill="#0EA5E9"/>
  <circle cx="80" cy="67.5" r="3" fill="white" opacity="0.7"/>
  <circle cx="120" cy="67.5" r="3" fill="white" opacity="0.7"/>

  <!-- Calendar dates -->
  <circle cx="82" cy="88" r="5" fill="#10B981"/>
  <path d="M79.5 88 L81.5 90 L84.5 86" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="100" cy="88" r="5" fill="#10B981"/>
  <path d="M97.5 88 L99.5 90 L102.5 86" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="118" cy="88" r="5" fill="#10B981"/>
  <path d="M115.5 88 L117.5 90 L120.5 86" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Current day -->
  <circle cx="82" cy="103" r="6" fill="#0EA5E9"/>
  <text x="82" y="106" font-family="Arial" font-size="9" font-weight="bold" fill="white" text-anchor="middle">15</text>

  <!-- Future dates -->
  <text x="100" y="107" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">16</text>
  <text x="118" y="107" font-family="Arial" font-size="9" fill="#94A3B8" text-anchor="middle">17</text>

  <!-- Flame streak -->
  <path d="M145 80 Q142 86 142 92 Q142 95 140 98 Q138 102 138 106 Q138 112 145 115 Q152 112 152 106 Q152 102 150 98 Q148 95 148 92 Q148 86 145 80 Z" fill="#F97316"/>
  <path d="M145 85 Q143 89 143 93 Q143 95 142 97 Q141 99 141 101 Q141 105 145 107 Q149 105 149 101 Q149 99 148 97 Q147 95 147 93 Q147 89 145 85 Z" fill="#FCD34D"/>
  <text x="145" y="103" font-family="Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">7</text>
</svg>
