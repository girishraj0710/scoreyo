<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Calendar - Simple clean style -->

  <!-- Shadow -->
  <ellipse cx="100" cy="165" rx="45" ry="7" fill="#000000" opacity="0.12"/>

  <!-- Calendar base -->
  <rect x="60" y="60" width="80" height="90" rx="6" fill="#06B6D4"/>
  <rect x="65" y="75" width="70" height="75" rx="4" fill="#FFFFFF"/>

  <!-- Calendar rings/binding -->
  <circle cx="75" cy="62" r="5" fill="#0891B2"/>
  <circle cx="90" cy="62" r="5" fill="#0891B2"/>
  <circle cx="110" cy="62" r="5" fill="#0891B2"/>
  <circle cx="125" cy="62" r="5" fill="#0891B2"/>

  <!-- Header bar -->
  <rect x="70" y="80" width="60" height="12" rx="2" fill="#06B6D4"/>

  <!-- Calendar dates grid -->
  <!-- Row 1 -->
  <circle cx="78" cy="105" r="4" fill="#E0F2FE"/>
  <circle cx="93" cy="105" r="4" fill="#E0F2FE"/>
  <circle cx="108" cy="105" r="4" fill="#E0F2FE"/>
  <circle cx="123" cy="105" r="4" fill="#E0F2FE"/>

  <!-- Row 2 -->
  <circle cx="78" cy="120" r="4" fill="#E0F2FE"/>
  <circle cx="93" cy="120" r="4" fill="#E0F2FE"/>
  <circle cx="108" cy="120" r="4" fill="#22D3EE"/>
  <circle cx="123" cy="120" r="4" fill="#E0F2FE"/>

  <!-- Row 3 -->
  <circle cx="78" cy="135" r="4" fill="#E0F2FE"/>
  <circle cx="93" cy="135" r="4" fill="#22D3EE"/>
  <circle cx="108" cy="135" r="4" fill="#E0F2FE"/>
  <circle cx="123" cy="135" r="4" fill="#E0F2FE"/>

  <!-- Current day highlight (larger, highlighted) -->
  <circle cx="100" cy="105" r="8" fill="#22D3EE"/>
  <text x="100" y="109" font-family="Arial" font-size="10" font-weight="bold" fill="#FFF" text-anchor="middle">15</text>

  <!-- Checkmarks on completed days -->
  <path d="M106 119 L108.5 121.5 L112 118" stroke="#FFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M91 134 L93.5 136.5 L97 133" stroke="#FFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Streak badge -->
  <circle cx="140" cy="75" r="12" fill="#F59E0B"/>
  <text x="140" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">7</text>

  <!-- Sparkles -->
  <circle cx="50" cy="90" r="3" fill="#22D3EE" opacity="0.8"/>
  <circle cx="150" cy="110" r="2.5" fill="#67E8F9" opacity="0.7"/>
</svg>
