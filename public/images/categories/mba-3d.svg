<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="18" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Briefcase body -->
  <rect x="14" y="28" width="36" height="22" rx="3" fill="url(#case-gradient)"/>

  <!-- Top part -->
  <rect x="14" y="26" width="36" height="3" rx="1.5" fill="#6C3483"/>

  <!-- Lock/clasp -->
  <rect x="30" y="24" width="4" height="4" rx="1" fill="#34495E"/>
  <circle cx="32" cy="25" r="1.5" fill="#F39C12"/>

  <!-- Handle -->
  <path d="M 26 24 Q 26 18 32 18 Q 38 18 38 24" stroke="url(#handle-gradient)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Decorative lines -->
  <line x1="16" y1="32" x2="48" y2="32" stroke="#9B59B6" stroke-width="0.5" opacity="0.5"/>
  <line x1="16" y1="44" x2="48" y2="44" stroke="#6C3483" stroke-width="0.5" opacity="0.5"/>

  <!-- Corner details -->
  <circle cx="17" cy="30" r="1.5" fill="#5B2C6F"/>
  <circle cx="47" cy="30" r="1.5" fill="#5B2C6F"/>
  <circle cx="17" cy="47" r="1.5" fill="#5B2C6F"/>
  <circle cx="47" cy="47" r="1.5" fill="#5B2C6F"/>

  <!-- Highlights -->
  <path d="M 18 30 L 18 46" stroke="white" stroke-width="1" opacity="0.2"/>
  <path d="M 20 29 L 44 29" stroke="white" stroke-width="1" opacity="0.15"/>

  <defs>
    <linearGradient id="case-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7D3C98;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="handle-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7D3C98;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6C3483;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7D3C98;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
