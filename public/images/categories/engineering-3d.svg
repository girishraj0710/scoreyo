<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="20" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Gear body -->
  <circle cx="32" cy="30" r="18" fill="url(#gear-gradient)"/>

  <!-- Gear teeth -->
  <g>
    <rect x="30" y="10" width="4" height="6" rx="1" fill="#FF8C42"/>
    <rect x="44" y="14" width="6" height="4" rx="1" fill="#FF8C42" transform="rotate(45 47 16)"/>
    <rect x="50" y="28" width="6" height="4" rx="1" fill="#FF8C42"/>
    <rect x="44" y="42" width="6" height="4" rx="1" fill="#FF8C42" transform="rotate(-45 47 44)"/>
    <rect x="30" y="46" width="4" height="6" rx="1" fill="#FF8C42"/>
    <rect x="14" y="42" width="6" height="4" rx="1" fill="#FF7F3E" transform="rotate(45 17 44)"/>
    <rect x="8" y="28" width="6" height="4" rx="1" fill="#FF7F3E"/>
    <rect x="14" y="14" width="6" height="4" rx="1" fill="#FF7F3E" transform="rotate(-45 17 16)"/>
  </g>

  <!-- Center hole -->
  <circle cx="32" cy="30" r="8" fill="#34495E"/>
  <circle cx="32" cy="30" r="6" fill="#2C3E50"/>

  <!-- Highlights -->
  <path d="M 25 22 Q 28 20 32 20 Q 36 20 39 22" stroke="#FFB380" stroke-width="2" fill="none" opacity="0.6"/>

  <defs>
    <linearGradient id="gear-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFA659;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
