<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="18" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Abacus frame -->
  <rect x="14" y="18" width="36" height="28" rx="2" fill="url(#frame-gradient)"/>

  <!-- Abacus inner -->
  <rect x="16" y="20" width="32" height="24" fill="#2C3E50"/>

  <!-- Rods -->
  <line x1="18" y1="22" x2="46" y2="22" stroke="#7F8C8D" stroke-width="1"/>
  <line x1="18" y1="28" x2="46" y2="28" stroke="#7F8C8D" stroke-width="1"/>
  <line x1="18" y1="34" x2="46" y2="34" stroke="#7F8C8D" stroke-width="1"/>
  <line x1="18" y1="40" x2="46" y2="40" stroke="#7F8C8D" stroke-width="1"/>

  <!-- Beads Row 1 (red) -->
  <circle cx="22" cy="22" r="2" fill="#E74C3C"/>
  <circle cx="28" cy="22" r="2" fill="#E74C3C"/>
  <circle cx="34" cy="22" r="2" fill="#C0392B"/>
  <circle cx="40" cy="22" r="2" fill="#C0392B"/>

  <!-- Beads Row 2 (yellow) -->
  <circle cx="22" cy="28" r="2" fill="#F39C12"/>
  <circle cx="28" cy="28" r="2" fill="#F1C40F"/>
  <circle cx="34" cy="28" r="2" fill="#F1C40F"/>
  <circle cx="40" cy="28" r="2" fill="#F39C12"/>

  <!-- Beads Row 3 (blue) -->
  <circle cx="22" cy="34" r="2" fill="#3498DB"/>
  <circle cx="28" cy="34" r="2" fill="#3498DB"/>
  <circle cx="34" cy="34" r="2" fill="#2980B9"/>
  <circle cx="40" cy="34" r="2" fill="#2980B9"/>

  <!-- Beads Row 4 (green) -->
  <circle cx="22" cy="40" r="2" fill="#2ECC71"/>
  <circle cx="28" cy="40" r="2" fill="#27AE60"/>
  <circle cx="34" cy="40" r="2" fill="#27AE60"/>
  <circle cx="40" cy="40" r="2" fill="#2ECC71"/>

  <!-- Highlights on beads -->
  <circle cx="21" cy="21" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="27" cy="27" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="33" cy="33" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="39" cy="39" r="0.8" fill="white" opacity="0.4"/>

  <!-- Calculator paper roll -->
  <g transform="translate(42, 46)">
    <rect x="0" y="0" width="8" height="10" rx="1" fill="white"/>
    <line x1="1" y1="2" x2="7" y2="2" stroke="#7F8C8D" stroke-width="0.5"/>
    <line x1="1" y1="4" x2="7" y2="4" stroke="#7F8C8D" stroke-width="0.5"/>
    <line x1="1" y1="6" x2="5" y2="6" stroke="#7F8C8D" stroke-width="0.5"/>
  </g>

  <defs>
    <linearGradient id="frame-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8D6E63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D4C41;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
