<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="18" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Pill/Capsule -->
  <g>
    <!-- Left half (red) -->
    <path d="M 32 20 Q 24 20 20 28 Q 20 36 24 44 Q 28 52 32 52 L 32 20 Z" fill="url(#pill-red)"/>

    <!-- Right half (yellow) -->
    <path d="M 32 20 Q 40 20 44 28 Q 44 36 40 44 Q 36 52 32 52 L 32 20 Z" fill="url(#pill-yellow)"/>

    <!-- Center line -->
    <line x1="32" y1="20" x2="32" y2="52" stroke="#34495E" stroke-width="1.5"/>

    <!-- Highlights -->
    <ellipse cx="28" cy="28" rx="3" ry="5" fill="white" opacity="0.3"/>
    <ellipse cx="36" cy="30" rx="3" ry="5" fill="white" opacity="0.3"/>
  </g>

  <!-- Medicine bottle -->
  <g transform="translate(46, 28)">
    <!-- Bottle body -->
    <rect x="0" y="4" width="10" height="18" rx="2" fill="url(#bottle-gradient)"/>

    <!-- Bottle cap -->
    <rect x="1" y="0" width="8" height="5" rx="1" fill="#E74C3C"/>

    <!-- Label -->
    <rect x="1" y="8" width="8" height="8" rx="0.5" fill="white" opacity="0.8"/>
    <line x1="2" y1="10" x2="8" y2="10" stroke="#3498DB" stroke-width="0.5"/>
    <line x1="2" y1="12" x2="7" y2="12" stroke="#3498DB" stroke-width="0.5"/>
    <line x1="2" y1="14" x2="8" y2="14" stroke="#3498DB" stroke-width="0.5"/>

    <!-- Plus sign on bottle -->
    <path d="M 5 19 L 5 21 M 4 20 L 6 20" stroke="white" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Pills scattered -->
  <g>
    <circle cx="14" cy="46" r="3" fill="url(#small-pill-1)"/>
    <circle cx="20" cy="50" r="2.5" fill="url(#small-pill-2)"/>
    <circle cx="16" cy="52" r="2" fill="url(#small-pill-3)"/>
  </g>

  <defs>
    <linearGradient id="pill-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pill-yellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F1C40F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F39C12;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bottle-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2980B9;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="small-pill-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980B9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="small-pill-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27AE60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="small-pill-3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8E44AD;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
