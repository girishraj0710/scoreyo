<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="18" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Office building -->
  <rect x="18" y="18" width="28" height="34" rx="2" fill="url(#building-gradient)"/>

  <!-- Roof -->
  <rect x="16" y="16" width="32" height="3" fill="#E67E22"/>

  <!-- Flag pole -->
  <rect x="31" y="8" width="2" height="10" fill="#7F8C8D"/>

  <!-- Indian flag -->
  <g>
    <rect x="34" y="10" width="10" height="2" fill="#FF9933"/>
    <rect x="34" y="12" width="10" height="2" fill="#FFFFFF"/>
    <rect x="34" y="14" width="10" height="2" fill="#138808"/>
    <circle cx="39" cy="13" r="1" fill="#000080"/>
  </g>

  <!-- Windows grid -->
  <g opacity="0.7">
    <!-- Row 1 -->
    <rect x="22" y="22" width="4" height="5" rx="0.5" fill="#85C1E9"/>
    <rect x="29" y="22" width="4" height="5" rx="0.5" fill="#85C1E9"/>
    <rect x="36" y="22" width="4" height="5" rx="0.5" fill="#85C1E9"/>

    <!-- Row 2 -->
    <rect x="22" y="29" width="4" height="5" rx="0.5" fill="#85C1E9"/>
    <rect x="29" y="29" width="4" height="5" rx="0.5" fill="#85C1E9"/>
    <rect x="36" y="29" width="4" height="5" rx="0.5" fill="#85C1E9"/>

    <!-- Row 3 -->
    <rect x="22" y="36" width="4" height="5" rx="0.5" fill="#85C1E9"/>
    <rect x="29" y="36" width="4" height="5" rx="0.5" fill="#85C1E9"/>
    <rect x="36" y="36" width="4" height="5" rx="0.5" fill="#85C1E9"/>

    <!-- Row 4 -->
    <rect x="22" y="43" width="4" height="5" rx="0.5" fill="#85C1E9"/>
    <rect x="29" y="43" width="4" height="5" rx="0.5" fill="#85C1E9"/>
    <rect x="36" y="43" width="4" height="5" rx="0.5" fill="#85C1E9"/>
  </g>

  <!-- Door -->
  <rect x="28" y="44" width="8" height="8" rx="0.5" fill="#34495E"/>

  <defs>
    <linearGradient id="building-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D35400;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
