<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="20" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Wheat stalk stems -->
  <line x1="24" y1="52" x2="24" y2="20" stroke="url(#stem-gradient)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="52" x2="32" y2="16" stroke="url(#stem-gradient)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="52" x2="40" y2="22" stroke="url(#stem-gradient)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Wheat grains - left stalk -->
  <g>
    <ellipse cx="24" cy="22" rx="3" ry="4" fill="url(#grain-gradient)" transform="rotate(-20 24 22)"/>
    <ellipse cx="22" cy="26" rx="3" ry="4" fill="url(#grain-gradient)" transform="rotate(20 22 26)"/>
    <ellipse cx="26" cy="26" rx="3" ry="4" fill="url(#grain-gradient)" transform="rotate(-20 26 26)"/>
    <ellipse cx="22" cy="30" rx="3" ry="4" fill="url(#grain-gradient)" transform="rotate(20 22 30)"/>
    <ellipse cx="26" cy="30" rx="3" ry="4" fill="url(#grain-gradient)" transform="rotate(-20 26 30)"/>
    <ellipse cx="24" cy="34" rx="3" ry="4" fill="url(#grain-gradient)"/>
  </g>

  <!-- Wheat grains - center stalk (tallest) -->
  <g>
    <ellipse cx="32" cy="18" rx="3" ry="4" fill="url(#grain-gradient)" transform="rotate(-15 32 18)"/>
    <ellipse cx="30" cy="22" rx="3" ry="4" fill="url(#grain-gradient)" transform="rotate(15 30 22)"/>
    <ellipse cx="34" cy="22" rx="3" ry="4" fill="url(#grain-gradient)" transform="rotate(-15 34 22)"/>
    <ellipse cx="30" cy="26" rx="3" ry="4" fill="url(#grain-gradient)" transform="rotate(15 30 26)"/>
    <ellipse cx="34" cy="26" rx="3" ry="4" fill="url(#grain-gradient)" transform="rotate(-15 34 26)"/>
    <ellipse cx="30" cy="30" rx="3" ry="4" fill="url(#grain-gradient)" transform="rotate(15 30 30)"/>
    <ellipse cx="34" cy="30" rx="3" ry="4" fill="url(#grain-gradient)" transform="rotate(-15 34 30)"/>
    <ellipse cx="32" cy="34" rx="3" ry="4" fill="url(#grain-gradient)"/>
  </g>

  <!-- Wheat grains - right stalk -->
  <g>
    <ellipse cx="40" cy="24" rx="3" ry="4" fill="url(#grain-gradient)" transform="rotate(-20 40 24)"/>
    <ellipse cx="38" cy="28" rx="3" ry="4" fill="url(#grain-gradient)" transform="rotate(20 38 28)"/>
    <ellipse cx="42" cy="28" rx="3" ry="4" fill="url(#grain-gradient)" transform="rotate(-20 42 28)"/>
    <ellipse cx="38" cy="32" rx="3" ry="4" fill="url(#grain-gradient)" transform="rotate(20 38 32)"/>
    <ellipse cx="42" cy="32" rx="3" ry="4" fill="url(#grain-gradient)" transform="rotate(-20 42 32)"/>
    <ellipse cx="40" cy="36" rx="3" ry="4" fill="url(#grain-gradient)"/>
  </g>

  <!-- Wheat awns (hair-like extensions) -->
  <g stroke="#D4AC0D" stroke-width="0.5" opacity="0.6">
    <line x1="24" y1="20" x2="22" y2="14"/>
    <line x1="32" y1="16" x2="30" y2="10"/>
    <line x1="40" y1="22" x2="42" y2="16"/>
  </g>

  <defs>
    <linearGradient id="stem-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F1C40F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AC0D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grain-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F39C12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E67E22;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
