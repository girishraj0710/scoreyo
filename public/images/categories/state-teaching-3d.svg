<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="18" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Chalkboard -->
  <rect x="14" y="18" width="36" height="26" rx="2" fill="url(#chalk-gradient)"/>
  <rect x="16" y="20" width="32" height="22" rx="1" fill="#1E8449"/>

  <!-- Stand -->
  <rect x="30" y="44" width="4" height="8" fill="#7F8C8D"/>
  <rect x="24" y="52" width="16" height="2" fill="#7F8C8D"/>

  <!-- Text on board - TET -->
  <text x="32" y="28" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">TET</text>

  <!-- Doodles -->
  <path d="M 20 34 L 22 36 L 24 34" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="42" cy="35" r="3" stroke="white" stroke-width="1.5" fill="none"/>
  <line x1="38" y1="39" x2="46" y2="39" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Chalk pieces -->
  <rect x="18" y="46" width="2" height="8" rx="1" fill="#FFFFFF"/>
  <rect x="22" y="46" width="2" height="8" rx="1" fill="#F1C40F"/>
  <rect x="26" y="46" width="2" height="8" rx="1" fill="#E74C3C"/>

  <!-- Map on side -->
  <g transform="translate(44, 24)">
    <rect x="0" y="0" width="8" height="10" rx="0.5" fill="#F39C12" opacity="0.9"/>
    <path d="M 2 2 L 3 4 L 5 3 L 6 5 L 4 7 L 2 6 Z" fill="white" opacity="0.6"/>
  </g>

  <defs>
    <linearGradient id="chalk-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#229954;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E8449;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
