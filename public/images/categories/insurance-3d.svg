<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="16" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Document -->
  <rect x="18" y="14" width="28" height="36" rx="2" fill="url(#doc-gradient)"/>

  <!-- Folded corner -->
  <path d="M 38 14 L 38 22 L 46 22 Z" fill="#D5DBDB"/>
  <path d="M 38 14 L 38 22 L 46 22" stroke="#95A5A6" stroke-width="0.5" fill="none"/>

  <!-- Text lines -->
  <line x1="22" y1="24" x2="42" y2="24" stroke="#5D6D7E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="28" x2="40" y2="28" stroke="#85929E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="32" x2="42" y2="32" stroke="#85929E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="36" x2="38" y2="36" stroke="#85929E" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Shield icon on document -->
  <g transform="translate(32, 42) scale(0.5)">
