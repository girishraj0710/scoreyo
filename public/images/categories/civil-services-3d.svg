<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="22" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Building base -->
  <rect x="18" y="48" width="28" height="8" fill="#34495E"/>

  <!-- Columns -->
  <rect x="20" y="22" width="5" height="26" fill="url(#column-gradient1)" rx="1"/>
  <rect x="29.5" y="22" width="5" height="26" fill="url(#column-gradient2)" rx="1"/>
  <rect x="39" y="22" width="5" height="26" fill="url(#column-gradient3)" rx="1"/>

  <!-- Pediment (triangular top) -->
  <path d="M 14 22 L 32 8 L 50 22 Z" fill="url(#pediment-gradient)"/>

  <!-- Roof -->
  <rect x="12" y="20" width="40" height="4" fill="#2C3E50" rx="1"/>

  <!-- Highlights -->
  <rect x="20.5" y="23" width="1" height="24" fill="white" opacity="0.2"/>
  <rect x="30" y="23" width="1" height="24" fill="white" opacity="0.2"/>
  <rect x="39.5" y="23" width="1" height="24" fill="white" opacity="0.2"/>

  <defs>
    <linearGradient id="column-gradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ECF0F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BDC3C7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="column-gradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D5DBDB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#AAB7B8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="column-gradient3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ECF0F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BDC3C7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pediment-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#95A5A6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7F8C8D;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
