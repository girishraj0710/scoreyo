<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="20" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Bank building -->
  <rect x="16" y="50" width="32" height="6" fill="#34495E"/>

  <!-- Columns -->
  <rect x="18" y="26" width="4" height="24" fill="url(#bank-col1)" rx="1"/>
  <rect x="24" y="26" width="4" height="24" fill="url(#bank-col2)" rx="1"/>
  <rect x="30" y="26" width="4" height="24" fill="url(#bank-col3)" rx="1"/>
  <rect x="36" y="26" width="4" height="24" fill="url(#bank-col2)" rx="1"/>
  <rect x="42" y="26" width="4" height="24" fill="url(#bank-col1)" rx="1"/>

  <!-- Roof -->
  <path d="M 12 26 L 32 12 L 52 26 Z" fill="url(#bank-roof)"/>
  <rect x="10" y="24" width="44" height="3" fill="#2C3E50" rx="1"/>

  <!-- Dollar sign -->
  <g transform="translate(32, 18)">
    <text x="0" y="0" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="bold" fill="#F39C12">$</text>
  </g>

  <defs>
    <linearGradient id="bank-col1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980B9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bank-col2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5DADE2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498DB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bank-col3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#85C1E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5DADE2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bank-roof" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2980B9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1F618D;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
