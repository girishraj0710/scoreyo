<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="20" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Plate -->
  <ellipse cx="32" cy="36" rx="18" ry="4" fill="#BDC3C7"/>
  <ellipse cx="32" cy="35" rx="18" ry="4" fill="url(#plate-gradient)"/>
  <ellipse cx="32" cy="35" rx="14" ry="3" fill="#ECF0F1"/>

  <!-- Fork (left) -->
  <g transform="translate(12, 20)">
    <rect x="0" y="0" width="2" height="20" rx="1" fill="url(#silverware-gradient)"/>
    <line x1="0.3" y1="0" x2="0.3" y2="6" stroke="#BDC3C7" stroke-width="0.4"/>
    <line x1="1" y1="0" x2="1" y2="6" stroke="#BDC3C7" stroke-width="0.4"/>
    <line x1="1.7" y1="0" x2="1.7" y2="6" stroke="#BDC3C7" stroke-width="0.4"/>
  </g>

  <!-- Knife (right) -->
  <g transform="translate(50, 20)">
    <rect x="0" y="0" width="2" height="20" rx="1" fill="url(#silverware-gradient)"/>
    <path d="M 0 0 L 2 0 L 1.5 4 L 0.5 4 Z" fill="#95A5A6"/>
  </g>

  <!-- Food on plate - dome cover -->
  <g>
    <ellipse cx="32" cy="30" rx="10" ry="2" fill="#7F8C8D" opacity="0.3"/>
    <path d="M 22 30 Q 22 18 32 16 Q 42 18 42 30 Z" fill="url(#dome-gradient)"/>
    <ellipse cx="32" cy="14" rx="3" ry="2" fill="#BDC3C7"/>
    <ellipse cx="32" cy="13.5" rx="2.5" ry="1.5" fill="#ECF0F1"/>

    <!-- Highlight on dome -->
    <path d="M 26 22 Q 28 18 32 17" stroke="white" stroke-width="1.5" opacity="0.3" fill="none"/>
  </g>

  <!-- Chef hat decoration -->
  <g transform="translate(32, 48) scale(0.8)">
    <rect x="-4" y="2" width="8" height="4" rx="0.5" fill="#E74C3C"/>
    <path d="M -5 2 Q -5 -4 0 -5 Q 5 -4 5 2 Z" fill="white"/>
    <circle cx="-3" cy="-1" r="2" fill="white"/>
    <circle cx="3" cy="-1" r="2" fill="white"/>
    <circle cx="0" cy="-3" r="2.5" fill="white"/>
  </g>

  <defs>
    <linearGradient id="plate-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ECF0F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="silverware-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#BDC3C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#95A5A6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dome-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#BDC3C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#95A5A6;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
