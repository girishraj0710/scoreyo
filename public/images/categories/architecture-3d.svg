<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="18" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Blueprint paper -->
  <rect x="12" y="16" width="40" height="32" rx="1" fill="url(#blueprint-gradient)"/>

  <!-- Building sketch -->
  <g stroke="#FFFFFF" stroke-width="1.5" fill="none">
    <!-- Base building -->
    <rect x="20" y="30" width="12" height="14" stroke-opacity="0.8"/>

    <!-- Left wing -->
    <rect x="16" y="34" width="4" height="10" stroke-opacity="0.6"/>

    <!-- Right wing -->
    <rect x="32" y="34" width="4" height="10" stroke-opacity="0.6"/>

    <!-- Tower -->
    <rect x="24" y="24" width="4" height="6" stroke-opacity="0.8"/>
    <path d="M 23 24 L 26 20 L 29 24" stroke-opacity="0.8"/>

    <!-- Windows grid -->
    <line x1="22" y1="32" x2="22" y2="42" opacity="0.5"/>
    <line x1="24" y1="32" x2="24" y2="42" opacity="0.5"/>
    <line x1="26" y1="32" x2="26" y2="42" opacity="0.5"/>
    <line x1="28" y1="32" x2="28" y2="42" opacity="0.5"/>
    <line x1="30" y1="32" x2="30" y2="42" opacity="0.5"/>

    <line x1="20" y1="34" x2="32" y2="34" opacity="0.5"/>
    <line x1="20" y1="37" x2="32" y2="37" opacity="0.5"/>
    <line x1="20" y1="40" x2="32" y2="40" opacity="0.5"/>
  </g>

  <!-- Ruler/scale -->
  <g transform="translate(38, 22)">
    <rect x="0" y="0" width="8" height="22" rx="0.5" fill="#F39C12" opacity="0.9"/>
    <line x1="1" y1="2" x2="7" y2="2" stroke="white" stroke-width="0.5"/>
    <line x1="1" y1="4" x2="5" y2="4" stroke="white" stroke-width="0.5"/>
    <line x1="1" y1="6" x2="7" y2="6" stroke="white" stroke-width="0.5"/>
    <line x1="1" y1="8" x2="5" y2="8" stroke="white" stroke-width="0.5"/>
    <line x1="1" y1="10" x2="7" y2="10" stroke="white" stroke-width="0.5"/>
    <line x1="1" y1="12" x2="5" y2="12" stroke="white" stroke-width="0.5"/>
    <line x1="1" y1="14" x2="7" y2="14" stroke="white" stroke-width="0.5"/>
    <line x1="1" y1="16" x2="5" y2="16" stroke="white" stroke-width="0.5"/>
    <line x1="1" y1="18" x2="7" y2="18" stroke="white" stroke-width="0.5"/>
    <line x1="1" y1="20" x2="5" y2="20" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Pencil -->
  <g transform="translate(16, 38) rotate(-30)">
    <rect x="0" y="0" width="3" height="14" rx="1" fill="url(#pencil-gradient)"/>
    <path d="M 0 14 L 1.5 17 L 3 14 Z" fill="#FFA07A"/>
    <rect x="0" y="0" width="3" height="2" fill="#95A5A6"/>
  </g>

  <!-- Title text on blueprint -->
  <text x="24" y="24" font-size="4" fill="white" opacity="0.7">NATA</text>

  <defs>
    <linearGradient id="blueprint-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2874A6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pencil-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F1C40F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F39C12;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
