<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="18" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Postbox body -->
  <rect x="20" y="24" width="24" height="24" rx="2" fill="url(#postbox-gradient)"/>

  <!-- Postbox top dome -->
  <path d="M 20 24 Q 20 16 32 14 Q 44 16 44 24 Z" fill="url(#dome-gradient)"/>

  <!-- Post slot -->
  <rect x="24" y="32" width="16" height="3" rx="1.5" fill="#1C2833"/>

  <!-- Slot highlight -->
  <rect x="24" y="32" width="16" height="1" rx="0.5" fill="#34495E"/>

  <!-- Collection sign plate -->
  <rect x="22" y="40" width="20" height="6" rx="1" fill="white" opacity="0.9"/>
  <text x="32" y="44.5" text-anchor="middle" font-size="4" fill="#C0392B" font-weight="bold">POST</text>

  <!-- Base stand -->
  <rect x="28" y="48" width="8" height="6" fill="#95A5A6"/>

  <!-- Letter/Envelope decoration -->
  <g transform="translate(46, 28) rotate(15) scale(0.7)">
    <rect x="0" y="0" width="12" height="8" rx="0.5" fill="white"/>
    <path d="M 0 0 L 6 4 L 12 0" stroke="#E74C3C" stroke-width="1" fill="none"/>
    <!-- Stamp -->
    <rect x="8" y="1" width="3" height="2" rx="0.2" fill="#3498DB"/>
  </g>

  <!-- Highlights -->
  <ellipse cx="28" cy="20" rx="4" ry="2" fill="white" opacity="0.2"/>
  <path d="M 24 26 L 24 44" stroke="white" stroke-width="1" opacity="0.15"/>

  <defs>
    <linearGradient id="postbox-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dome-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C0392B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A93226;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
