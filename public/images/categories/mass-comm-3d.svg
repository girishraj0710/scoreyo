<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="20" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Microphone stand base -->
  <ellipse cx="32" cy="52" rx="10" ry="2" fill="#7F8C8D"/>

  <!-- Microphone stand pole -->
  <rect x="30" y="28" width="4" height="24" fill="url(#pole-gradient)" rx="1"/>

  <!-- Microphone body -->
  <g transform="translate(32, 24)">
    <!-- Mic top sphere -->
    <ellipse cx="0" cy="-8" rx="8" ry="10" fill="url(#mic-gradient)"/>

    <!-- Mic grill pattern -->
    <g stroke="#95A5A6" stroke-width="0.5" opacity="0.4">
      <line x1="-6" y1="-10" x2="6" y2="-10"/>
      <line x1="-6" y1="-8" x2="6" y2="-8"/>
      <line x1="-6" y1="-6" x2="6" y2="-6"/>
      <line x1="-6" y1="-4" x2="6" y2="-4"/>
      <line x1="-4" y1="-12" x2="-4" y2="-2"/>
      <line x1="-2" y1="-14" x2="-2" y2="-2"/>
      <line x1="0" y1="-14" x2="0" y2="-2"/>
      <line x1="2" y1="-14" x2="2" y2="-2"/>
      <line x1="4" y1="-12" x2="4" y2="-2"/>
    </g>

    <!-- Mic neck/connector -->
    <rect x="-3" y="0" width="6" height="4" rx="1" fill="#95A5A6"/>

    <!-- Highlight -->
    <ellipse cx="-3" cy="-10" rx="2" ry="3" fill="white" opacity="0.3"/>
  </g>

  <!-- Camera/Broadcasting symbol -->
  <g transform="translate(48, 22) scale(0.7)">
    <!-- Camera body -->
    <rect x="0" y="0" width="10" height="8" rx="1" fill="url(#camera-gradient)"/>

    <!-- Lens -->
    <circle cx="4" cy="4" r="2.5" fill="#34495E"/>
    <circle cx="4" cy="4" r="1.5" fill="#5D6D7E"/>
    <circle cx="3.5" cy="3.5" r="0.8" fill="white" opacity="0.4"/>

    <!-- Viewfinder -->
    <rect x="7" y="1" width="2" height="2" rx="0.3" fill="#E74C3C"/>

    <!-- Record button -->
    <circle cx="8" cy="6" r="0.8" fill="#E74C3C"/>
  </g>

  <!-- Broadcasting waves -->
  <g transform="translate(16, 24)" opacity="0.6">
    <path d="M 0 0 Q -4 -4 -6 -8" stroke="#F39C12" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 0 0 Q -6 -2 -10 -4" stroke="#F39C12" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 0 0 Q -6 2 -10 4" stroke="#F39C12" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- News ticker/text bar -->
  <g transform="translate(16, 44)">
    <rect x="0" y="0" width="32" height="4" rx="1" fill="url(#ticker-gradient)"/>
    <line x1="2" y1="2" x2="6" y2="2" stroke="white" stroke-width="0.5"/>
    <line x1="8" y1="2" x2="14" y2="2" stroke="white" stroke-width="0.5"/>
    <line x1="16" y1="2" x2="20" y2="2" stroke="white" stroke-width="0.5"/>
    <line x1="22" y1="2" x2="28" y2="2" stroke="white" stroke-width="0.5"/>
  </g>

  <defs>
    <linearGradient id="pole-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#95A5A6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7F8C8D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mic-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34495E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C3E50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="camera-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D35400;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ticker-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
