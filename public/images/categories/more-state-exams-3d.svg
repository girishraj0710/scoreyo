<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="20" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Building complex -->
  <!-- Left tower -->
  <rect x="14" y="22" width="10" height="30" rx="1" fill="url(#building1-gradient)"/>

  <!-- Center tower (tallest) -->
  <rect x="26" y="16" width="12" height="36" rx="1" fill="url(#building2-gradient)"/>

  <!-- Right tower -->
  <rect x="40" y="24" width="10" height="28" rx="1" fill="url(#building3-gradient)"/>

  <!-- Windows pattern - Left building -->
  <g opacity="0.6">
    <rect x="16" y="26" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="20" y="26" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="16" y="31" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="20" y="31" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="16" y="36" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="20" y="36" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="16" y="41" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="20" y="41" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="16" y="46" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="20" y="46" width="2" height="3" rx="0.3" fill="#85C1E9"/>
  </g>

  <!-- Windows pattern - Center building -->
  <g opacity="0.6">
    <rect x="28" y="20" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="32" y="20" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="28" y="25" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="32" y="25" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="28" y="30" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="32" y="30" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="28" y="35" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="32" y="35" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="28" y="40" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="32" y="40" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="28" y="45" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="32" y="45" width="2" height="3" rx="0.3" fill="#85C1E9"/>
  </g>

  <!-- Windows pattern - Right building -->
  <g opacity="0.6">
    <rect x="42" y="28" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="46" y="28" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="42" y="33" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="46" y="33" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="42" y="38" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="46" y="38" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="42" y="43" width="2" height="3" rx="0.3" fill="#85C1E9"/>
    <rect x="46" y="43" width="2" height="3" rx="0.3" fill="#85C1E9"/>
  </g>

  <!-- Roofs -->
  <rect x="13" y="20" width="12" height="2" fill="#D35400"/>
  <rect x="25" y="14" width="14" height="2" fill="#E67E22"/>
  <rect x="39" y="22" width="12" height="2" fill="#D35400"/>

  <!-- India map outline overlay -->
  <g transform="translate(48, 12) scale(0.9)" opacity="0.8">
    <path d="M 4 0 L 6 2 L 8 1 L 10 3 L 9 5 L 10 7 L 8 10 L 6 9 L 4 10 L 3 12 L 1 11 L 0 8 L 1 6 L 0 4 L 2 2 Z"
          fill="url(#india-gradient)" stroke="#E67E22" stroke-width="0.5"/>
  </g>

  <!-- Plus sign (for "More") -->
  <g transform="translate(12, 12)">
    <circle cx="0" cy="0" r="4" fill="url(#plus-gradient)"/>
    <path d="M -2 0 L 2 0 M 0 -2 L 0 2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <defs>
    <linearGradient id="building1-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F39C12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E67E22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="building2-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D35400;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="building3-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F39C12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E67E22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="india-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9933;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#138808;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="plus-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27AE60;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
