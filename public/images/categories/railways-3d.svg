<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="22" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Train body -->
  <rect x="14" y="24" width="36" height="22" rx="3" fill="url(#train-gradient)"/>

  <!-- Roof -->
  <rect x="14" y="22" width="36" height="3" rx="1.5" fill="#C0392B"/>

  <!-- Windows -->
  <rect x="18" y="28" width="8" height="8" rx="1" fill="#85C1E9"/>
  <rect x="28" y="28" width="8" height="8" rx="1" fill="#85C1E9"/>
  <rect x="38" y="28" width="8" height="8" rx="1" fill="#85C1E9"/>

  <!-- Window reflections -->
  <rect x="19" y="29" width="3" height="3" rx="0.5" fill="white" opacity="0.4"/>
  <rect x="29" y="29" width="3" height="3" rx="0.5" fill="white" opacity="0.4"/>
  <rect x="39" y="29" width="3" height="3" rx="0.5" fill="white" opacity="0.4"/>

  <!-- Door -->
  <rect x="24" y="38" width="6" height="8" rx="1" fill="#34495E"/>
  <circle cx="28" cy="42" r="0.8" fill="#F39C12"/>

  <!-- Wheels -->
  <g>
    <circle cx="22" cy="48" r="4" fill="#34495E"/>
    <circle cx="22" cy="48" r="2.5" fill="#7F8C8D"/>
    <circle cx="22" cy="48" r="1" fill="#2C3E50"/>

    <circle cx="32" cy="48" r="4" fill="#34495E"/>
    <circle cx="32" cy="48" r="2.5" fill="#7F8C8D"/>
    <circle cx="32" cy="48" r="1" fill="#2C3E50"/>

    <circle cx="42" cy="48" r="4" fill="#34495E"/>
    <circle cx="42" cy="48" r="2.5" fill="#7F8C8D"/>
    <circle cx="42" cy="48" r="1" fill="#2C3E50"/>
  </g>

  <!-- Connecting rods -->
  <line x1="22" y1="50" x2="32" y2="50" stroke="#95A5A6" stroke-width="1.5"/>
  <line x1="32" y1="50" x2="42" y2="50" stroke="#95A5A6" stroke-width="1.5"/>

  <!-- Train number plate -->
  <rect x="36" y="38" width="8" height="4" rx="0.5" fill="white"/>
  <text x="40" y="41" text-anchor="middle" font-size="3" fill="#E74C3C" font-weight="bold">RRB</text>

  <defs>
    <linearGradient id="train-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
