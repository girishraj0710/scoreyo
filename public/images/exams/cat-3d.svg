<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D CAT illustration with briefcase, graph, and MBA elements -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#FEF3C7" opacity="0.4"/>

  <!-- Briefcase shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Briefcase -->
  <rect x="70" y="105" width="60" height="45" rx="6" fill="#F59E0B"/>
  <rect x="70" y="105" width="60" height="45" rx="6" fill="url(#briefcaseGradient)"/>

  <!-- Briefcase handle -->
  <path d="M 85 105 Q 85 95 100 95 Q 115 95 115 105" stroke="#D97706" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Briefcase lock -->
  <circle cx="100" cy="127" r="6" fill="#FEF3C7"/>
  <rect x="98" y="127" width="4" height="8" fill="#FEF3C7"/>

  <!-- Briefcase sections -->
  <line x1="85" y1="115" x2="85" y2="145" stroke="#FCD34D" stroke-width="2" opacity="0.6"/>
  <line x1="115" y1="115" x2="115" y2="145" stroke="#FCD34D" stroke-width="2" opacity="0.6"/>

  <!-- Upward trending graph -->
  <circle cx="145" cy="85" r="24" fill="#10B981"/>
  <circle cx="145" cy="85" r="24" fill="url(#graphGradient)"/>
  <path d="M 133 93 L 138 88 L 143 90 L 148 82 L 153 85" stroke="#D1FAE5" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="148" cy="82" r="2" fill="#D1FAE5"/>
  <path d="M 146 84 L 148 82 L 152 86" stroke="#D1FAE5" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- MBA badge -->
  <circle cx="55" cy="85" r="20" fill="#8B5CF6"/>
  <text x="55" y="88" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">MBA</text>
  <circle cx="55" cy="85" r="17" fill="none" stroke="#C4B5FD" stroke-width="2" opacity="0.5"/>

  <!-- Calculator -->
  <rect x="135" y="125" width="32" height="25" rx="3" fill="#3B82F6"/>
  <rect x="138" y="128" width="26" height="8" rx="2" fill="#1E293B"/>
  <circle cx="143" cy="142" r="2" fill="#DBEAFE"/>
  <circle cx="150" cy="142" r="2" fill="#DBEAFE"/>
  <circle cx="157" cy="142" r="2" fill="#DBEAFE"/>
  <circle cx="143" cy="147" r="2" fill="#DBEAFE"/>
  <circle cx="150" cy="147" r="2" fill="#10B981"/>
  <circle cx="157" cy="147" r="2" fill="#DBEAFE"/>

  <!-- Pie chart -->
  <g transform="translate(45, 130)">
    <circle r="16" fill="#EC4899"/>
    <path d="M 0 -16 A 16 16 0 0 1 11.3 -11.3 L 0 0 Z" fill="#F59E0B"/>
    <path d="M 11.3 -11.3 A 16 16 0 0 1 16 0 L 0 0 Z" fill="#10B981"/>
    <circle r="14" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Document/report -->
  <rect x="42" y="95" width="22" height="28" rx="2" fill="white" stroke="#E5E7EB" stroke-width="2"/>
  <rect x="46" y="100" width="14" height="2" rx="1" fill="#9CA3AF"/>
  <rect x="46" y="106" width="14" height="2" rx="1" fill="#9CA3AF"/>
  <rect x="46" y="112" width="10" height="2" rx="1" fill="#9CA3AF"/>

  <defs>
    <linearGradient id="briefcaseGradient" x1="100" y1="105" x2="100" y2="150">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#B45309" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="graphGradient" x1="145" y1="61" x2="145" y2="109">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#047857" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
</svg>
