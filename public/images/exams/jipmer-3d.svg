<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D JIPMER - Syringe theme (from emoji: 💉) -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#DBEAFE" opacity="0.4"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Large Syringe (center) -->
  <g transform="translate(100, 110)">
    <!-- Barrel -->
    <rect x="-12" y="-20" width="24" height="40" rx="3" fill="#DBEAFE" opacity="0.9"/>
    <rect x="-12" y="-20" width="24" height="40" rx="3" fill="url(#syringeGradient)"/>

    <!-- Liquid inside -->
    <rect x="-10" y="4" width="20" height="16" rx="2" fill="#3B82F6" opacity="0.6"/>

    <!-- Measurement marks -->
    <line x1="-12" y1="-12" x2="-8" y2="-12" stroke="#0369A1" stroke-width="2"/>
    <text x="-6" y="-10" font-family="Arial, sans-serif" font-size="4" fill="#0369A1">10</text>
    <line x1="-12" y1="-4" x2="-8" y2="-4" stroke="#0369A1" stroke-width="2"/>
    <text x="-6" y="-2" font-family="Arial, sans-serif" font-size="4" fill="#0369A1">8</text>
    <line x1="-12" y1="4" x2="-8" y2="4" stroke="#0369A1" stroke-width="2"/>
    <text x="-6" y="6" font-family="Arial, sans-serif" font-size="4" fill="#0369A1">6</text>
    <line x1="-12" y1="12" x2="-8" y2="12" stroke="#0369A1" stroke-width="2"/>
    <text x="-6" y="14" font-family="Arial, sans-serif" font-size="4" fill="#0369A1">4</text>

    <!-- Needle -->
    <rect x="-3" y="20" width="6" height="20" fill="#94A3B8"/>
    <rect x="-3" y="20" width="6" height="20" fill="url(#needleGradient)"/>
    <path d="M -3 40 L 0 46 L 3 40 Z" fill="#64748B"/>

    <!-- Plunger -->
    <rect x="-8" y="-26" width="16" height="6" rx="2" fill="#DC2626"/>
    <circle cy="-26" r="6" fill="#EF4444"/>
    <circle cy="-26" r="4" fill="#FCA5A5"/>

    <!-- Plunger rod -->
    <rect x="-2" y="-20" width="4" height="8" fill="#DC2626"/>

    <!-- Finger grips -->
    <rect x="-16" y="18" width="4" height="4" rx="1" fill="#3B82F6"/>
    <rect x="12" y="18" width="4" height="4" rx="1" fill="#3B82F6"/>
  </g>

  <!-- Medical vials -->
  <g transform="translate(55, 95)">
    <rect x="-6" y="-12" width="12" height="20" rx="2" fill="#DBEAFE" opacity="0.8"/>
    <rect x="-6" y="2" width="12" height="6" fill="#DC2626" opacity="0.7"/>

    <!-- Cap -->
    <rect x="-5" y="-16" width="10" height="4" rx="1" fill="#DC2626"/>
    <ellipse cy="-16" rx="5" ry="2" fill="#EF4444"/>

    <!-- Label -->
    <rect x="-4" y="-4" width="8" height="6" rx="0.5" fill="white"/>
    <text y="0" font-family="Arial, sans-serif" font-size="3" fill="#DC2626" text-anchor="middle">VAX</text>
  </g>

  <g transform="translate(145, 95)">
    <rect x="-6" y="-12" width="12" height="20" rx="2" fill="#DBEAFE" opacity="0.8"/>
    <rect x="-6" y="4" width="12" height="4" fill="#8B5CF6" opacity="0.7"/>

    <!-- Cap -->
    <rect x="-5" y="-16" width="10" height="4" rx="1" fill="#7C3AED"/>
    <ellipse cy="-16" rx="5" ry="2" fill="#8B5CF6"/>

    <!-- Label -->
    <rect x="-4" y="-4" width="8" height="6" rx="0.5" fill="white"/>
    <text y="0" font-family="Arial, sans-serif" font-size="3" fill="#7C3AED" text-anchor="middle">MED</text>
  </g>

  <!-- Blood drop -->
  <g transform="translate(55, 140)">
    <circle r="16" fill="#DC2626" opacity="0.3"/>
    <path d="M 0 -12 Q -8 -4 -8 4 Q -8 12 0 16 Q 8 12 8 4 Q 8 -4 0 -12 Z" fill="#DC2626"/>
    <path d="M 0 -12 Q -8 -4 -8 4 Q -8 12 0 16 Q 8 12 8 4 Q 8 -4 0 -12 Z" fill="url(#bloodGradient)"/>

    <!-- Highlight -->
    <circle cx="-3" cy="-4" r="3" fill="#FCA5A5" opacity="0.7"/>
  </g>

  <!-- Microscope -->
  <g transform="translate(145, 140)">
    <ellipse cy="12" rx="14" ry="4" fill="#94A3B8"/>
    <rect x="-6" y="8" width="12" height="4" fill="#64748B"/>

    <!-- Body -->
    <rect x="-3" y="-10" width="6" height="18" fill="#475569"/>

    <!-- Eyepiece -->
    <rect x="-4" y="-14" width="8" height="5" rx="2" fill="#1E293B"/>

    <!-- Objective lens -->
    <path d="M -2 8 L -4 12 L 4 12 L 2 8 Z" fill="#3B82F6"/>
    <rect x="-5" y="10" width="10" height="2" fill="#DBEAFE"/>
  </g>

  <!-- Bandage/Band-aid -->
  <g transform="translate(55, 65)">
    <rect x="-16" y="-6" width="32" height="12" rx="3" fill="#FEF3C7"/>

    <!-- Center pad -->
    <rect x="-6" y="-4" width="12" height="8" rx="1" fill="white"/>

    <!-- Holes pattern -->
    <circle cx="-12" cy="-2" r="1" fill="#D97706"/>
    <circle cx="-12" cy="2" r="1" fill="#D97706"/>
    <circle cx="12" cy="-2" r="1" fill="#D97706"/>
    <circle cx="12" cy="2" r="1" fill="#D97706"/>
    <circle cx="-8" cy="-2" r="1" fill="#D97706"/>
    <circle cx="-8" cy="2" r="1" fill="#D97706"/>
    <circle cx="8" cy="-2" r="1" fill="#D97706"/>
    <circle cx="8" cy="2" r="1" fill="#D97706"/>
  </g>

  <!-- Medical kit -->
  <g transform="translate(145, 65)">
    <rect x="-14" y="-10" width="28" height="20" rx="2" fill="white" stroke="#DC2626" stroke-width="2"/>

    <!-- Red cross -->
    <rect x="-2" y="-6" width="4" height="12" fill="#DC2626"/>
    <rect x="-6" y="-2" width="12" height="4" fill="#DC2626"/>

    <!-- Handle -->
    <path d="M -8 -10 Q 0 -16 8 -10" stroke="#DC2626" stroke-width="3" fill="none"/>

    <!-- Clasp -->
    <rect x="-2" y="10" width="4" height="2" fill="#FCD34D"/>
  </g>

  <!-- JIPMER Badge -->
  <circle cx="100" cy="70" r="18" fill="#3B82F6"/>
  <text x="100" y="67" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="white" text-anchor="middle">JIPMER</text>
  <text x="100" y="77" font-family="Arial, sans-serif" font-size="6" fill="#DBEAFE" text-anchor="middle">Medical</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#93C5FD" stroke-width="2"/>

  <!-- Medical caduceus symbol -->
  <line x1="100" y1="148" x2="100" y2="152" stroke="#DC2626" stroke-width="2"/>
  <circle cx="100" cy="150" r="3" fill="#DC2626"/>

  <defs>
    <linearGradient id="syringeGradient" x1="100" y1="90" x2="100" y2="130">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#DBEAFE" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="needleGradient" x1="100" y1="130" x2="100" y2="150">
      <stop offset="0%" stop-color="#CBD5E1" stop-opacity="1"/>
      <stop offset="100%" stop-color="#64748B" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="bloodGradient" x1="55" y1="124" x2="55" y2="156">
      <stop offset="0%" stop-color="#FCA5A5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#991B1B" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
</svg>
