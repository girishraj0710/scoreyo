<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D BITSAT - BITS Pilani theme with innovation and technology -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#FEF3C7" opacity="0.4"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- BITS Building -->
  <rect x="80" y="105" width="40" height="40" rx="4" fill="#F59E0B"/>
  <rect x="80" y="105" width="40" height="40" rx="4" fill="url(#bitsGradient)"/>

  <!-- Windows -->
  <rect x="86" y="112" width="6" height="8" rx="1" fill="#FEF3C7" opacity="0.9"/>
  <rect x="97" y="112" width="6" height="8" rx="1" fill="#FEF3C7" opacity="0.9"/>
  <rect x="108" y="112" width="6" height="8" rx="1" fill="#FEF3C7" opacity="0.9"/>
  <rect x="86" y="127" width="6" height="8" rx="1" fill="#FEF3C7" opacity="0.9"/>
  <rect x="97" y="127" width="6" height="8" rx="1" fill="#FEF3C7" opacity="0.9"/>
  <rect x="108" y="127" width="6" height="8" rx="1" fill="#FEF3C7" opacity="0.9"/>

  <!-- Entrance -->
  <rect x="94" y="137" width="12" height="8" rx="1" fill="#92400E"/>

  <!-- BITS sign -->
  <rect x="85" y="100" width="30" height="6" rx="2" fill="#DC2626"/>
  <text x="100" y="105" font-family="Arial, sans-serif" font-size="5" font-weight="bold" fill="white" text-anchor="middle">BITS PILANI</text>

  <!-- Innovation lightbulb -->
  <g transform="translate(55, 100)">
    <circle r="16" fill="#FDE047"/>
    <circle r="16" fill="url(#bulbGradient)"/>

    <!-- Filament -->
    <path d="M -4 -4 L 4 4 M -4 4 L 4 -4" stroke="#F59E0B" stroke-width="2"/>

    <!-- Base -->
    <rect x="-6" y="14" width="12" height="5" rx="2" fill="#94A3B8"/>
    <rect x="-4" y="19" width="8" height="3" rx="1" fill="#64748B"/>

    <!-- Shine -->
    <circle cx="-6" cy="-6" r="4" fill="white" opacity="0.7"/>
  </g>

  <!-- Circuit board -->
  <g transform="translate(145, 100)">
    <rect x="-16" y="-16" width="32" height="32" rx="3" fill="#10B981"/>

    <!-- Circuit traces -->
    <line x1="-10" y1="-8" x2="10" y2="-8" stroke="#D1FAE5" stroke-width="2"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#D1FAE5" stroke-width="2"/>
    <line x1="-10" y1="8" x2="10" y2="8" stroke="#D1FAE5" stroke-width="2"/>
    <line x1="-4" y1="-12" x2="-4" y2="12" stroke="#D1FAE5" stroke-width="2"/>
    <line x1="4" y1="-12" x2="4" y2="12" stroke="#D1FAE5" stroke-width="2"/>

    <!-- Components -->
    <circle cx="-4" cy="-8" r="2" fill="#FBBF24"/>
    <circle cx="4" cy="0" r="2" fill="#FBBF24"/>
    <circle cx="-4" cy="8" r="2" fill="#FBBF24"/>
    <rect x="-10" y="-4" width="4" height="2" fill="#1E293B"/>
    <rect x="6" y="6" width="4" height="2" fill="#1E293B"/>
  </g>

  <!-- Computer/Laptop -->
  <g transform="translate(55, 140)">
    <rect x="-18" y="-8" width="36" height="20" rx="2" fill="#64748B"/>
    <rect x="-16" y="-6" width="32" height="16" rx="1" fill="#1E293B"/>
    <rect x="-14" y="-4" width="28" height="12" rx="1" fill="#3B82F6"/>

    <!-- Screen content -->
    <line x1="-10" y1="-1" x2="10" y2="-1" stroke="#DBEAFE" stroke-width="1"/>
    <line x1="-10" y1="2" x2="10" y2="2" stroke="#DBEAFE" stroke-width="1"/>
    <line x1="-10" y1="5" x2="6" y2="5" stroke="#DBEAFE" stroke-width="1"/>

    <!-- Base -->
    <rect x="-20" y="12" width="40" height="2" fill="#475569"/>
  </g>

  <!-- Gear/Engineering -->
  <g transform="translate(145, 140)">
    <circle r="16" fill="#DC2626"/>
    <circle r="16" fill="url(#gearGradient)"/>
    <circle r="8" fill="#991B1B"/>
    <circle r="4" fill="#7C2D12"/>

    <!-- Gear teeth -->
    <rect x="-2" y="-16" width="4" height="6" fill="#DC2626"/>
    <rect x="-2" y="10" width="4" height="6" fill="#DC2626"/>
    <rect x="-16" y="-2" width="6" height="4" fill="#DC2626"/>
    <rect x="10" y="-2" width="6" height="4" fill="#DC2626"/>
    <rect x="-12" y="-12" width="4" height="4" fill="#DC2626" transform="rotate(45 145 140)"/>
    <rect x="8" y="-12" width="4" height="4" fill="#DC2626" transform="rotate(-45 145 140)"/>
  </g>

  <!-- Test paper -->
  <rect x="75" y="75" width="25" height="20" rx="2" fill="white" stroke="#E5E7EB" stroke-width="2"/>
  <line x1="79" y1="80" x2="96" y2="80" stroke="#3B82F6" stroke-width="1.5"/>
  <line x1="79" y1="85" x2="96" y2="85" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="79" y1="89" x2="90" y2="89" stroke="#9CA3AF" stroke-width="1"/>

  <!-- BITSAT Badge -->
  <circle cx="145" cy="70" r="17" fill="#F59E0B"/>
  <text x="145" y="69" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">BITS</text>
  <text x="145" y="77" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#FEF3C7" text-anchor="middle">SAT</text>
  <circle cx="145" cy="70" r="14" fill="none" stroke="#FCD34D" stroke-width="2"/>

  <!-- Digital/Binary -->
  <g transform="translate(55, 70)">
    <rect x="-12" y="-10" width="24" height="20" rx="2" fill="#1E293B"/>
    <text x="0" y="-2" font-family="Courier, monospace" font-size="6" fill="#10B981" text-anchor="middle">01010</text>
    <text x="0" y="4" font-family="Courier, monospace" font-size="6" fill="#10B981" text-anchor="middle">11001</text>
    <text x="0" y="10" font-family="Courier, monospace" font-size="6" fill="#10B981" text-anchor="middle">10110</text>
  </g>

  <defs>
    <linearGradient id="bitsGradient" x1="100" y1="105" x2="100" y2="145">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="bulbGradient" x1="55" y1="84" x2="55" y2="116">
      <stop offset="0%" stop-color="#FEF9C3" stop-opacity="1"/>
      <stop offset="100%" stop-color="#EAB308" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="gearGradient" x1="145" y1="124" x2="145" y2="156">
      <stop offset="0%" stop-color="#FCA5A5" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#991B1B" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
</svg>
