<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D SSC illustration with government file, badge, and pen -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#DBEAFE" opacity="0.4"/>

  <!-- File shadow -->
  <ellipse cx="100" cy="155" rx="45" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Main file/folder -->
  <rect x="75" y="90" width="50" height="60" rx="4" fill="#3B82F6"/>
  <rect x="75" y="90" width="50" height="60" rx="4" fill="url(#fileGradient)"/>

  <!-- File tab -->
  <path d="M 75 90 L 75 85 L 95 85 L 100 90 Z" fill="#60A5FA"/>

  <!-- File lines -->
  <rect x="82" y="100" width="36" height="3" rx="1" fill="#DBEAFE"/>
  <rect x="82" y="108" width="36" height="3" rx="1" fill="#DBEAFE"/>
  <rect x="82" y="116" width="28" height="3" rx="1" fill="#DBEAFE"/>
  <rect x="82" y="124" width="32" height="3" rx="1" fill="#DBEAFE"/>

  <!-- SSC badge -->
  <circle cx="100" cy="135" r="12" fill="#FBBF24"/>
  <text x="100" y="138" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">SSC</text>

  <!-- Government badge -->
  <circle cx="145" cy="80" r="22" fill="#8B5CF6"/>
  <circle cx="145" cy="80" r="22" fill="url(#badgeGradient)"/>
  <circle cx="145" cy="80" r="14" fill="none" stroke="#F3E8FF" stroke-width="2"/>
  <circle cx="145" cy="80" r="8" fill="#F3E8FF"/>
  <text x="145" cy="83" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#8B5CF6" text-anchor="middle">GOV</text>

  <!-- Pen -->
  <rect x="48" y="100" width="8" height="45" rx="2" fill="#1E293B" transform="rotate(-15 52 122)"/>
  <path d="M 45 140 L 50 145 L 55 140 Z" fill="#1E40AF" transform="rotate(-15 50 142)"/>
  <circle cx="52" cy="105" r="3" fill="#94A3B8" transform="rotate(-15 52 105)"/>

  <!-- Ashoka Chakra -->
  <circle cx="55" cy="80" r="18" fill="#FF9933"/>
  <circle cx="55" cy="80" r="12" fill="white"/>
  <circle cx="55" cy="80" r="8" fill="#000080"/>
  <circle cx="55" cy="80" r="6" fill="none" stroke="white" stroke-width="1"/>
  <line x1="55" y1="74" x2="55" y2="86" stroke="white" stroke-width="1"/>
  <line x1="49" y1="80" x2="61" y2="80" stroke="white" stroke-width="1"/>

  <!-- Certificate/stamp -->
  <g transform="translate(140, 125)">
    <circle r="16" fill="#10B981"/>
    <circle r="13" fill="none" stroke="#D1FAE5" stroke-width="2" stroke-dasharray="2,2"/>
    <text y="5" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#D1FAE5" text-anchor="middle">✓</text>
  </g>

  <!-- Document stack -->
  <rect x="50" y="125" width="18" height="22" rx="2" fill="white" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="47" y="128" width="18" height="22" rx="2" fill="white" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="52" y="132" width="12" height="2" rx="1" fill="#94A3AF"/>
  <rect x="52" y="137" width="12" height="2" rx="1" fill="#94A3AF"/>

  <defs>
    <linearGradient id="fileGradient" x1="100" y1="90" x2="100" y2="150">
      <stop offset="0%" stop-color="#93C5FD" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1E40AF" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="badgeGradient" x1="145" y1="58" x2="145" y2="102">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6B21A8" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
</svg>
