<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D IIFT - Globe theme (International Trade) -->
  <circle cx="100" cy="100" r="65" fill="#E0F2FE" opacity="0.4"/>
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Globe -->
  <g transform="translate(100, 110)">
    <circle r="26" fill="#0369A1"/>
    <circle r="26" fill="url(#globeGrad)"/>

    <!-- Meridians -->
    <ellipse rx="26" ry="26" fill="none" stroke="#BAE6FD" stroke-width="1.5"/>
    <ellipse rx="13" ry="26" fill="none" stroke="#BAE6FD" stroke-width="1.5"/>
    <ellipse rx="26" ry="13" fill="none" stroke="#BAE6FD" stroke-width="1.5"/>

    <!-- Stand -->
    <rect x="-3" y="26" width="6" height="10" fill="#64748B"/>
    <ellipse cy="36" rx="12" ry="3" fill="#94A3B8"/>
  </g>

  <!-- Badge -->
  <circle cx="100" cy="70" r="18" fill="#0369A1"/>
  <text x="100" y="72" font-family="Arial" font-size="9" font-weight="bold" fill="white" text-anchor="middle">IIFT</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#7DD3FC" stroke-width="2"/>

  <defs>
    <linearGradient id="globeGrad" x1="100" y1="84" x2="100" y2="136">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>
  </defs>
</svg>
