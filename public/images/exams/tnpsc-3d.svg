<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D TNPSC - Lotus theme for Tamil Nadu (from emoji: 🪷) -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#FCE7F3" opacity="0.4"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Large Lotus Flower (center) -->
  <g transform="translate(100, 110)">
    <!-- Water base -->
    <ellipse cy="20" rx="32" ry="8" fill="#0369A1" opacity="0.3"/>

    <!-- Outer petals (pink) -->
    <ellipse cx="-20" cy="0" rx="10" ry="20" fill="#EC4899"/>
    <ellipse cx="20" cy="0" rx="10" ry="20" fill="#EC4899"/>
    <ellipse cy="-20" rx="20" ry="10" fill="#EC4899"/>
    <ellipse cy="20" rx="20" ry="10" fill="#EC4899"/>

    <!-- Diagonal outer petals -->
    <ellipse cx="-14" cy="-14" rx="10" ry="20" fill="#F472B6" transform="rotate(-45 86 96)"/>
    <ellipse cx="14" cy="-14" rx="10" ry="20" fill="#F472B6" transform="rotate(45 114 96)"/>
    <ellipse cx="-14" cy="14" rx="10" ry="20" fill="#F472B6" transform="rotate(45 86 124)"/>
    <ellipse cx="14" cy="14" rx="10" ry="20" fill="#F472B6" transform="rotate(-45 114 124)"/>

    <!-- Middle petals (lighter pink) -->
    <ellipse cx="-12" cy="0" rx="8" ry="16" fill="#F9A8D4"/>
    <ellipse cx="12" cy="0" rx="8" ry="16" fill="#F9A8D4"/>
    <ellipse cy="-12" rx="16" ry="8" fill="#F9A8D4"/>
    <ellipse cy="12" rx="16" ry="8" fill="#F9A8D4"/>

    <!-- Inner petals -->
    <ellipse cx="-6" cy="0" rx="6" ry="12" fill="#FDF4FF"/>
    <ellipse cx="6" cy="0" rx="6" ry="12" fill="#FDF4FF"/>
    <ellipse cy="-6" rx="12" ry="6" fill="#FDF4FF"/>
    <ellipse cy="6" rx="12" ry="6" fill="#FDF4FF"/>

    <!-- Center stigma -->
    <circle r="6" fill="#FCD34D"/>
    <circle r="4" fill="#F59E0B"/>

    <!-- Stamens -->
    <circle cx="-3" cy="-3" r="1.5" fill="#D97706"/>
    <circle cx="3" cy="-3" r="1.5" fill="#D97706"/>
    <circle cx="-3" cy="3" r="1.5" fill="#D97706"/>
    <circle cx="3" cy="3" r="1.5" fill="#D97706"/>

    <!-- Stem -->
    <rect x="-2" y="10" width="4" height="10" fill="#059669"/>

    <!-- Lily pad -->
    <ellipse cx="-20" cy="20" rx="12" ry="10" fill="#10B981"/>
    <path d="M -20 20 L -8 20" stroke="#059669" stroke-width="1.5"/>
  </g>

  <!-- Government building -->
  <g transform="translate(55, 95)">
    <rect x="-12" y="-8" width="24" height="16" rx="2" fill="#DC2626"/>

    <!-- Pillars -->
    <rect x="-10" y="-2" width="3" height="10" fill="#FEF3C7"/>
    <rect x="-3" y="-2" width="3" height="10" fill="#FEF3C7"/>
    <rect x="4" y="-2" width="3" height="10" fill="#FEF3C7"/>

    <!-- Dome -->
    <path d="M -14 -8 L 0 -16 L 14 -8 Z" fill="#F59E0B"/>
    <circle cy="-16" r="3" fill="#FCD34D"/>
  </g>

  <!-- Tamil script book -->
  <g transform="translate(145, 95)">
    <rect x="-12" y="-10" width="24" height="20" rx="2" fill="#DC2626"/>
    <rect x="-10" y="-8" width="20" height="16" rx="1" fill="#FEF3C7"/>

    <!-- Tamil script style -->
    <path d="M -6 -4 Q -4 -6 0 -4 Q 4 -6 6 -4" stroke="#DC2626" stroke-width="1.5" fill="none"/>
    <path d="M -6 0 Q -4 -2 0 0 Q 4 -2 6 0" stroke="#DC2626" stroke-width="1.5" fill="none"/>
    <path d="M -6 4 Q -4 2 0 4 Q 4 2 6 4" stroke="#DC2626" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Tamil culture - Kolam pattern -->
  <g transform="translate(55, 140)">
    <circle r="16" fill="#DC2626" opacity="0.2"/>

    <!-- Kolam dots and lines -->
    <circle cy="-10" r="2" fill="#DC2626"/>
    <circle cy="10" r="2" fill="#DC2626"/>
    <circle cx="-10" r="2" fill="#DC2626"/>
    <circle cx="10" r="2" fill="#DC2626"/>
    <circle cx="-7" cy="-7" r="1.5" fill="#F59E0B"/>
    <circle cx="7" cy="-7" r="1.5" fill="#F59E0B"/>
    <circle cx="-7" cy="7" r="1.5" fill="#F59E0B"/>
    <circle cx="7" cy="7" r="1.5" fill="#F59E0B"/>

    <!-- Connecting lines -->
    <circle r="8" fill="none" stroke="#DC2626" stroke-width="2"/>
    <circle r="4" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
  </g>

  <!-- Madurai Meenakshi Temple tower -->
  <g transform="translate(145, 140)">
    <rect x="-8" y="-12" width="16" height="24" rx="2" fill="#F59E0B"/>

    <!-- Temple tiers -->
    <rect x="-10" y="-14" width="20" height="3" fill="#DC2626"/>
    <rect x="-8" y="-17" width="16" height="3" fill="#F59E0B"/>

    <!-- Gopuram top -->
    <circle cy="-18" r="2" fill="#FCD34D"/>

    <!-- Windows -->
    <rect x="-4" y="-6" width="3" height="4" rx="0.5" fill="#FEF3C7"/>
    <rect x="1" y="-6" width="3" height="4" rx="0.5" fill="#FEF3C7"/>
    <rect x="-4" y="2" width="3" height="4" rx="0.5" fill="#FEF3C7"/>
    <rect x="1" y="2" width="3" height="4" rx="0.5" fill="#FEF3C7"/>
  </g>

  <!-- Bharatanatyam dancer -->
  <g transform="translate(55, 65)">
    <circle cy="-8" r="4" fill="#FBBF24"/>

    <!-- Body in dance pose -->
    <path d="M -4 -4 L -6 6 L -8 12" stroke="#DC2626" stroke-width="4" fill="none"/>
    <path d="M 4 -4 L 6 6 L 4 12" stroke="#DC2626" stroke-width="4" fill="none"/>

    <!-- Arms -->
    <path d="M -4 -2 Q -10 -4 -12 0" stroke="#DC2626" stroke-width="3" fill="none"/>
    <path d="M 4 -2 Q 10 -6 14 -4" stroke="#DC2626" stroke-width="3" fill="none"/>

    <!-- Dress -->
    <circle cy="2" r="6" fill="#EC4899" opacity="0.6"/>
  </g>

  <!-- PSC emblem -->
  <g transform="translate(145, 65)">
    <circle r="14" fill="#1E40AF"/>
    <circle r="12" fill="white"/>

    <!-- PSC text -->
    <text y="-2" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#1E40AF" text-anchor="middle">PSC</text>

    <!-- Border -->
    <circle r="10" fill="none" stroke="#1E40AF" stroke-width="2"/>
  </g>

  <!-- TNPSC Badge -->
  <circle cx="100" cy="70" r="18" fill="#DC2626"/>
  <text x="100" y="68" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white" text-anchor="middle">TNPSC</text>
  <text x="100" y="77" font-family="Arial, sans-serif" font-size="5" fill="#FEE2E2" text-anchor="middle">Tamil Nadu</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#FCA5A5" stroke-width="2"/>

  <!-- Tamil Nadu emblem base -->
  <rect x="80" y="148" width="40" height="7" rx="2" fill="#F59E0B"/>
  <text x="100" y="153.5" font-family="Arial, sans-serif" font-size="5" font-weight="bold" fill="white" text-anchor="middle">தமிழ் நாடு</text>
</svg>
