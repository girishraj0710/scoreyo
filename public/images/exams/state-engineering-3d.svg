<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D State Engineering illustration with state map, gear, and building -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#FED7AA" opacity="0.4"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- State outline map (India) -->
  <g transform="translate(100, 100)">
    <circle r="35" fill="#F97316"/>
    <circle r="35" fill="url(#mapGradient)"/>

    <!-- Simplified India map shape -->
    <path d="M -8 -20 L -15 -10 L -18 5 L -15 20 L -5 28 L 8 28 L 18 20 L 20 5 L 15 -10 L 8 -20 Z"
          fill="#FED7AA" opacity="0.6"/>

    <!-- State divisions -->
    <line x1="-10" y1="-5" x2="10" y2="-5" stroke="#FB923C" stroke-width="1" opacity="0.5"/>
    <line x1="-5" y1="10" x2="8" y2="10" stroke="#FB923C" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-15" x2="0" y2="20" stroke="#FB923C" stroke-width="1" opacity="0.5"/>

    <!-- Location pins -->
    <circle cx="-8" cy="-8" r="3" fill="#DC2626"/>
    <circle cx="8" cy="5" r="3" fill="#DC2626"/>
    <circle cx="-5" cy="12" r="3" fill="#DC2626"/>
  </g>

  <!-- Engineering gears -->
  <g transform="translate(55, 85)">
    <circle r="18" fill="#FB923C"/>
    <circle r="18" fill="url(#gearGradient1)"/>
    <circle r="10" fill="#C2410C"/>
    <circle r="5" fill="#7C2D12"/>

    <!-- Gear teeth -->
    <rect x="-2" y="-18" width="4" height="6" fill="#FB923C"/>
    <rect x="-2" y="12" width="4" height="6" fill="#FB923C"/>
    <rect x="-18" y="-2" width="6" height="4" fill="#FB923C"/>
    <rect x="12" y="-2" width="6" height="4" fill="#FB923C"/>
  </g>

  <!-- Institute building -->
  <rect x="130" y="105" width="40" height="40" rx="4" fill="#EA580C"/>
  <rect x="130" y="105" width="40" height="40" rx="4" fill="url(#buildingGradient)"/>

  <!-- Windows -->
  <rect x="136" y="112" width="8" height="10" rx="1" fill="#FED7AA" opacity="0.8"/>
  <rect x="148" y="112" width="8" height="10" rx="1" fill="#FED7AA" opacity="0.8"/>
  <rect x="136" y="127" width="8" height="10" rx="1" fill="#FED7AA" opacity="0.8"/>
  <rect x="148" y="127" width="8" height="10" rx="1" fill="#FED7AA" opacity="0.8"/>

  <!-- Roof -->
  <path d="M 128 105 L 150 92 L 172 105 Z" fill="#C2410C"/>

  <!-- Blueprint/Plan -->
  <rect x="40" y="120" width="35" height="30" rx="3" fill="#3B82F6"/>
  <rect x="42" y="122" width="31" height="26" rx="2" fill="#DBEAFE"/>

  <!-- Grid lines -->
  <line x1="45" y1="128" x2="70" y2="128" stroke="#3B82F6" stroke-width="0.5" opacity="0.5"/>
  <line x1="45" y1="135" x2="70" y2="135" stroke="#3B82F6" stroke-width="0.5" opacity="0.5"/>
  <line x1="45" y1="142" x2="70" y2="142" stroke="#3B82F6" stroke-width="0.5" opacity="0.5"/>
  <line x1="50" y1="125" x2="50" y2="145" stroke="#3B82F6" stroke-width="0.5" opacity="0.5"/>
  <line x1="58" y1="125" x2="58" y2="145" stroke="#3B82F6" stroke-width="0.5" opacity="0.5"/>
  <line x1="66" y1="125" x2="66" y2="145" stroke="#3B82F6" stroke-width="0.5" opacity="0.5"/>

  <!-- Building sketch -->
  <rect x="52" y="130" width="12" height="12" fill="none" stroke="#3B82F6" stroke-width="1.5"/>

  <!-- Compass/Divider tool -->
  <g transform="translate(145, 75) rotate(15)">
    <line x1="-8" y1="5" x2="0" y2="-10" stroke="#64748B" stroke-width="3"/>
    <line x1="8" y1="5" x2="0" y2="-10" stroke="#64748B" stroke-width="3"/>
    <circle cy="-10" r="3" fill="#94A3B8"/>
    <circle cx="-8" cy="5" r="2" fill="#475569"/>
    <circle cx="8" cy="5" r="2" fill="#475569"/>
  </g>

  <!-- Calculator -->
  <rect x="130" y="145" width="25" height="20" rx="3" fill="#1E293B"/>
  <rect x="133" y="148" width="19" height="6" rx="1" fill="#10B981"/>
  <text x="142.5" y="152.5" font-family="Arial, sans-serif" font-size="5" font-weight="bold" fill="white" text-anchor="middle">CET</text>

  <!-- Calculator buttons -->
  <circle cx="137" cy="160" r="2" fill="#64748B"/>
  <circle cx="142.5" cy="160" r="2" fill="#64748B"/>
  <circle cx="148" cy="160" r="2" fill="#64748B"/>

  <!-- Tricolor badge -->
  <rect x="45" y="80" width="20" height="25" rx="2" fill="white"/>
  <rect x="45" y="80" width="20" height="8" fill="#FF9933"/>
  <rect x="45" y="97" width="20" height="8" fill="#138808"/>
  <circle cx="55" cy="92.5" r="3" fill="#000080"/>

  <defs>
    <linearGradient id="mapGradient" x1="100" y1="65" x2="100" y2="135">
      <stop offset="0%" stop-color="#FDBA74" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#EA580C" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="gearGradient1" x1="55" y1="67" x2="55" y2="103">
      <stop offset="0%" stop-color="#FDBA74" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#C2410C" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="buildingGradient" x1="150" y1="105" x2="150" y2="145">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#9A3412" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
</svg>
