<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D AFCAT - Airplane theme -->
  <circle cx="100" cy="100" r="65" fill="#DBEAFE" opacity="0.4"/>
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Airplane -->
  <g transform="translate(100, 110)">
    <!-- Fuselage -->
    <ellipse cx="0" cy="0" rx="35" ry="10" fill="#64748B"/>

    <!-- Wings -->
    <ellipse cx="0" cy="0" rx="50" ry="6" fill="#94A3B8"/>

    <!-- Tail -->
    <path d="M -30 0 L -35 -15 L -30 -12" fill="#64748B"/>

    <!-- Cockpit -->
    <ellipse cx="25" cy="-2" rx="10" ry="8" fill="#3B82F6" opacity="0.6"/>
  </g>

  <!-- Badge -->
  <circle cx="100" cy="70" r="18" fill="#3B82F6"/>
  <text x="100" y="70" font-family="Arial" font-size="8" font-weight="bold" fill="white" text-anchor="middle">AFCAT</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#93C5FD" stroke-width="2"/>
</svg>
