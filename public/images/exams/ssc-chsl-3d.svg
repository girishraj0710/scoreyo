<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D SSC CHSL - File folder theme -->
  <circle cx="100" cy="100" r="65" fill="#FEF3C7" opacity="0.4"/>
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- File folder -->
  <g transform="translate(100, 110)">
    <path d="M -30 -15 L -30 20 L 30 20 L 30 -10 L 15 -15 Z" fill="#F59E0B"/>
    <rect x="-30" y="-18" width="20" height="6" rx="2" fill="#DC2626"/>

    <!-- Paper inside -->
    <rect x="-24" y="-8" width="48" height="2" fill="#FEF3C7" opacity="0.6"/>
    <rect x="-24" y="-2" width="48" height="2" fill="#FEF3C7" opacity="0.6"/>
    <rect x="-24" y="4" width="48" height="2" fill="#FEF3C7" opacity="0.6"/>
  </g>

  <!-- Badge -->
  <circle cx="100" cy="70" r="18" fill="#DC2626"/>
  <text x="100" y="68" font-family="Arial" font-size="7" font-weight="bold" fill="white" text-anchor="middle">SSC</text>
  <text x="100" y="77" font-family="Arial" font-size="6" fill="#FEE2E2" text-anchor="middle">CHSL</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#FCA5A5" stroke-width="2"/>
</svg>
