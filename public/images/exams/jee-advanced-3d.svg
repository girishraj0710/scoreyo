<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D JEE Advanced - Premium with IIT logo, trophy, and research elements -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#DBEAFE" opacity="0.4"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- IIT Building/Campus -->
  <g transform="translate(100, 115)">
    <!-- Main building -->
    <rect x="-25" y="-15" width="50" height="35" rx="4" fill="#1E40AF"/>
    <rect x="-25" y="-15" width="50" height="35" rx="4" fill="url(#iitGradient)"/>

    <!-- Pillars -->
    <rect x="-18" y="-5" width="4" height="25" rx="1" fill="#DBEAFE" opacity="0.9"/>
    <rect x="-8" y="-5" width="4" height="25" rx="1" fill="#DBEAFE" opacity="0.9"/>
    <rect x="2" y="-5" width="4" height="25" rx="1" fill="#DBEAFE" opacity="0.9"/>
    <rect x="12" y="-5" width="4" height="25" rx="1" fill="#DBEAFE" opacity="0.9"/>

    <!-- Dome -->
    <path d="M -28 -15 L 0 -30 L 28 -15 Z" fill="#3B82F6"/>
    <circle cy="-30" r="5" fill="#FBBF24"/>

    <!-- IIT Text -->
    <text y="0" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#DBEAFE" text-anchor="middle">IIT</text>
  </g>

  <!-- Gold Trophy (Excellence) -->
  <g transform="translate(55, 95)">
    <circle r="22" fill="#FBBF24"/>
    <circle r="22" fill="url(#trophyGradient)"/>

    <!-- Cup -->
    <path d="M -10 -6 L -12 6 L -10 12 L 10 12 L 12 6 L 10 -6 Z" fill="#FCD34D"/>

    <!-- Handles -->
    <path d="M -10 -3 Q -16 0 -16 6 Q -16 10 -12 10" stroke="#FEF3C7" stroke-width="2.5" fill="none"/>
    <path d="M 10 -3 Q 16 0 16 6 Q 16 10 12 10" stroke="#FEF3C7" stroke-width="2.5" fill="none"/>

    <!-- Base -->
    <rect x="-8" y="12" width="16" height="5" fill="#F59E0B"/>
    <rect x="-10" y="17" width="20" height="3" fill="#D97706"/>

    <!-- Star on trophy -->
    <text y="-10" font-size="14" fill="#FEF3C7" text-anchor="middle">★</text>

    <!-- Rank 1 -->
    <text y="3" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#92400E" text-anchor="middle">#1</text>
  </g>

  <!-- Advanced Mathematics -->
  <g transform="translate(145, 95)">
    <rect x="-18" y="-18" width="36" height="36" rx="4" fill="#8B5CF6"/>
    <rect x="-16" y="-16" width="32" height="32" rx="3" fill="#F3E8FF"/>

    <!-- Complex equation -->
    <text y="-8" font-family="Georgia, serif" font-size="7" fill="#7C3AED" text-anchor="middle">∫ f(x)dx</text>
    <text y="0" font-family="Georgia, serif" font-size="7" fill="#7C3AED" text-anchor="middle">Σ Δx</text>
    <text y="8" font-family="Georgia, serif" font-size="7" fill="#7C3AED" text-anchor="middle">lim x→∞</text>

    <!-- Advanced badge -->
    <circle cy="12" r="4" fill="#DC2626"/>
    <text y="14.5" font-family="Arial, sans-serif" font-size="5" font-weight="bold" fill="white" text-anchor="middle">ADV</text>
  </g>

  <!-- Research microscope -->
  <g transform="translate(55, 140)">
    <ellipse cy="10" rx="12" ry="4" fill="#94A3B8"/>

    <!-- Base -->
    <rect x="-6" y="6" width="12" height="4" fill="#64748B"/>

    <!-- Body -->
    <rect x="-3" y="-10" width="6" height="16" fill="#475569"/>

    <!-- Eyepiece -->
    <rect x="-4" y="-14" width="8" height="5" rx="2" fill="#1E293B"/>

    <!-- Objective lens -->
    <path d="M -2 6 L -4 10 L 4 10 L 2 6 Z" fill="#3B82F6"/>

    <!-- Sample slide -->
    <rect x="-5" y="8" width="10" height="2" fill="#DBEAFE"/>
  </g>

  <!-- Quantum physics atom -->
  <g transform="translate(145, 140)">
    <circle r="18" fill="#DC2626"/>
    <circle r="18" fill="url(#atomGradient)"/>

    <!-- Nucleus -->
    <circle r="4" fill="#FEF3C7"/>

    <!-- Electron orbits -->
    <ellipse rx="14" ry="6" fill="none" stroke="#FEE2E2" stroke-width="2" opacity="0.8"/>
    <ellipse rx="6" ry="14" fill="none" stroke="#FEE2E2" stroke-width="2" opacity="0.8"/>
    <ellipse rx="10" ry="10" fill="none" stroke="#FEE2E2" stroke-width="2" opacity="0.8" transform="rotate(45)"/>

    <!-- Electrons -->
    <circle cx="14" r="2" fill="#FEF3C7"/>
    <circle cy="14" r="2" fill="#FEF3C7"/>
    <circle cx="-10" cy="-10" r="2" fill="#FEF3C7"/>
  </g>

  <!-- Graph/Analytics -->
  <g transform="translate(55, 70)">
    <rect x="-14" y="-14" width="28" height="28" rx="3" fill="white" stroke="#E5E7EB" stroke-width="2"/>

    <!-- Rising graph line -->
    <path d="M -10 8 L -5 4 L 0 6 L 5 0 L 10 -8" stroke="#10B981" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Dot on peak -->
    <circle cx="10" cy="-8" r="2.5" fill="#10B981"/>

    <!-- Axes -->
    <line x1="-12" y1="10" x2="12" y2="10" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="-10" y1="-12" x2="-10" y2="10" stroke="#9CA3AF" stroke-width="1"/>
  </g>

  <!-- Books stack (Advanced) -->
  <rect x="130" y="130" width="30" height="8" rx="2" fill="#DC2626"/>
  <text x="145" y="136" font-family="Arial, sans-serif" font-size="5" font-weight="bold" fill="white" text-anchor="middle">ADVANCED</text>

  <rect x="130" y="122" width="30" height="8" rx="2" fill="#3B82F6"/>
  <text x="145" y="128" font-family="Arial, sans-serif" font-size="5" font-weight="bold" fill="white" text-anchor="middle">PHYSICS</text>

  <rect x="130" y="114" width="30" height="8" rx="2" fill="#10B981"/>
  <text x="145" y="120" font-family="Arial, sans-serif" font-size="5" font-weight="bold" fill="white" text-anchor="middle">CHEM</text>

  <!-- JEE Advanced Badge -->
  <circle cx="145" cy="65" r="18" fill="#1E40AF"/>
  <text x="145" y="64" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">JEE</text>
  <text x="145" y="72" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#93C5FD" text-anchor="middle">ADV</text>
  <circle cx="145" cy="65" r="15" fill="none" stroke="#60A5FA" stroke-width="2"/>

  <defs>
    <linearGradient id="iitGradient" x1="100" y1="100" x2="100" y2="135">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1E40AF" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="trophyGradient" x1="55" y1="73" x2="55" y2="117">
      <stop offset="0%" stop-color="#FDE047" stop-opacity="1"/>
      <stop offset="100%" stop-color="#CA8A04" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="atomGradient" x1="145" y1="122" x2="145" y2="158">
      <stop offset="0%" stop-color="#FCA5A5" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#991B1B" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
</svg>
