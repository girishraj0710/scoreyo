<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D OJEE - Dharma Wheel/Konark theme for Odisha (from emoji: ☸️) -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#FEF3C7" opacity="0.4"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Large Dharma Wheel / Konark Wheel (center) -->
  <g transform="translate(100, 110)">
    <!-- Outer rim -->
    <circle r="30" fill="#DC2626"/>
    <circle r="30" fill="url(#wheelMainGradient)"/>
    <circle r="28" fill="none" stroke="#FCD34D" stroke-width="3"/>
    <circle r="24" fill="none" stroke="#F59E0B" stroke-width="2"/>

    <!-- Inner hub -->
    <circle r="8" fill="#92400E"/>
    <circle r="8" fill="url(#hubGradient)"/>

    <!-- 8 main spokes -->
    <line x1="0" y1="-24" x2="0" y2="-6" stroke="#FCD34D" stroke-width="3"/>
    <line x1="0" y1="24" x2="0" y2="6" stroke="#FCD34D" stroke-width="3"/>
    <line x1="-24" y1="0" x2="-6" y2="0" stroke="#FCD34D" stroke-width="3"/>
    <line x1="24" y1="0" x2="6" y2="0" stroke="#FCD34D" stroke-width="3"/>

    <line x1="-17" y1="-17" x2="-4" y2="-4" stroke="#FCD34D" stroke-width="3"/>
    <line x1="17" y1="-17" x2="4" y2="-4" stroke="#FCD34D" stroke-width="3"/>
    <line x1="-17" y1="17" x2="-4" y2="4" stroke="#FCD34D" stroke-width="3"/>
    <line x1="17" y1="17" x2="4" y2="4" stroke="#FCD34D" stroke-width="3"/>

    <!-- Decorative elements on rim -->
    <circle cy="-28" r="3" fill="#FDE047"/>
    <circle cy="28" r="3" fill="#FDE047"/>
    <circle cx="-28" r="3" fill="#FDE047"/>
    <circle cx="28" r="3" fill="#FDE047"/>

    <circle cx="-20" cy="-20" r="2.5" fill="#FCD34D"/>
    <circle cx="20" cy="-20" r="2.5" fill="#FCD34D"/>
    <circle cx="-20" cy="20" r="2.5" fill="#FCD34D"/>
    <circle cx="20" cy="20" r="2.5" fill="#FCD34D"/>

    <!-- Center ornament -->
    <circle r="4" fill="#FDE047"/>
    <circle r="2" fill="#DC2626"/>
  </g>

  <!-- Konark Sun Temple Chariot Wheel -->
  <g transform="translate(55, 95)">
    <circle r="16" fill="#F59E0B"/>
    <circle r="16" fill="url(#smallWheelGradient)"/>
    <circle r="14" fill="none" stroke="#FCD34D" stroke-width="2"/>

    <!-- Spokes -->
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#FCD34D" stroke-width="2"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#FCD34D" stroke-width="2"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#FCD34D" stroke-width="2"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#FCD34D" stroke-width="2"/>

    <!-- Hub -->
    <circle r="4" fill="#92400E"/>
  </g>

  <g transform="translate(145, 95)">
    <circle r="16" fill="#F59E0B"/>
    <circle r="16" fill="url(#smallWheelGradient)"/>
    <circle r="14" fill="none" stroke="#FCD34D" stroke-width="2"/>

    <!-- Spokes -->
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#FCD34D" stroke-width="2"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#FCD34D" stroke-width="2"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#FCD34D" stroke-width="2"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#FCD34D" stroke-width="2"/>

    <!-- Hub -->
    <circle r="4" fill="#92400E"/>
  </g>

  <!-- Konark Temple -->
  <g transform="translate(55, 140)">
    <!-- Temple base -->
    <rect x="-14" y="-6" width="28" height="16" rx="2" fill="#D97706"/>

    <!-- Temple tower -->
    <path d="M -10 -6 L -12 -18 L 12 -18 L 10 -6 Z" fill="#F59E0B"/>

    <!-- Top -->
    <path d="M -12 -18 L 0 -26 L 12 -18 Z" fill="#DC2626"/>
    <circle cy="-26" r="3" fill="#FCD34D"/>

    <!-- Windows -->
    <rect x="-8" y="-2" width="5" height="6" rx="1" fill="#FEF3C7"/>
    <rect x="3" y="-2" width="5" height="6" rx="1" fill="#FEF3C7"/>

    <!-- Wheel decoration -->
    <circle cy="-12" r="4" fill="#FCD34D" opacity="0.8"/>
    <circle cy="-12" r="2" fill="#DC2626"/>
  </g>

  <!-- Dancing figure (Odissi dance) -->
  <g transform="translate(145, 140)">
    <circle cy="-10" r="6" fill="#FBBF24"/>

    <!-- Body -->
    <path d="M -4 -4 L -6 6 L -8 12" stroke="#DC2626" stroke-width="4" fill="none"/>
    <path d="M 4 -4 L 6 6 L 4 12" stroke="#DC2626" stroke-width="4" fill="none"/>

    <!-- Arms in dance pose -->
    <path d="M -4 -2 Q -10 -4 -12 0" stroke="#DC2626" stroke-width="3" fill="none"/>
    <path d="M 4 -2 Q 10 -6 14 -4" stroke="#DC2626" stroke-width="3" fill="none"/>

    <!-- Legs -->
    <path d="M -6 6 L -6 12" stroke="#DC2626" stroke-width="3" fill="none"/>
    <path d="M 6 6 L 10 10" stroke="#DC2626" stroke-width="3" fill="none"/>

    <!-- Dress details -->
    <circle cy="2" r="5" fill="#F59E0B" opacity="0.6"/>
  </g>

  <!-- Lotus (state flower) -->
  <g transform="translate(55, 65)">
    <circle r="14" fill="#EC4899" opacity="0.3"/>

    <!-- Petals -->
    <ellipse cy="-10" rx="4" ry="10" fill="#EC4899"/>
    <ellipse cx="-7" cy="-7" rx="4" ry="10" fill="#EC4899" transform="rotate(-45 48 58)"/>
    <ellipse cx="-10" rx="10" ry="4" fill="#EC4899"/>
    <ellipse cx="-7" cy="7" rx="4" ry="10" fill="#EC4899" transform="rotate(45 48 72)"/>
    <ellipse cy="10" rx="4" ry="10" fill="#EC4899"/>
    <ellipse cx="7" cy="7" rx="4" ry="10" fill="#EC4899" transform="rotate(-45 62 72)"/>
    <ellipse cx="10" rx="10" ry="4" fill="#EC4899"/>
    <ellipse cx="7" cy="-7" rx="4" ry="10" fill="#EC4899" transform="rotate(45 62 58)"/>

    <!-- Center -->
    <circle r="5" fill="#FCD34D"/>
    <circle r="3" fill="#F59E0B"/>
  </g>

  <!-- Pattachitra art motif -->
  <g transform="translate(145, 65)">
    <rect x="-14" y="-14" width="28" height="28" rx="3" fill="#DC2626"/>

    <!-- Art pattern -->
    <circle r="10" fill="#FCD34D"/>
    <circle r="6" fill="#F59E0B"/>

    <!-- Decorative dots -->
    <circle cx="-8" cy="-8" r="2" fill="#FCD34D"/>
    <circle cx="8" cy="-8" r="2" fill="#FCD34D"/>
    <circle cx="-8" cy="8" r="2" fill="#FCD34D"/>
    <circle cx="8" cy="8" r="2" fill="#FCD34D"/>
  </g>

  <!-- OJEE Badge -->
  <circle cx="100" cy="70" r="18" fill="#DC2626"/>
  <text x="100" y="72" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">OJEE</text>
  <text x="100" y="80" font-family="Arial, sans-serif" font-size="5" fill="#FEE2E2" text-anchor="middle">Odisha</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#FCA5A5" stroke-width="2"/>

  <defs>
    <linearGradient id="wheelMainGradient" x1="100" y1="80" x2="100" y2="140">
      <stop offset="0%" stop-color="#FCA5A5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#991B1B" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="hubGradient" x1="100" y1="102" x2="100" y2="118">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#92400E" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="smallWheelGradient" x1="0" y1="-16" x2="0" y2="16">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
</svg>
