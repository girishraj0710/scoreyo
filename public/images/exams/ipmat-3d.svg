<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D IPMAT - Rising graph theme -->
  <circle cx="100" cy="100" r="65" fill="#D1FAE5" opacity="0.4"/>
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Rising graph -->
  <g transform="translate(100, 120)">
    <!-- Axis -->
    <line x1="-25" y1="15" x2="25" y2="15" stroke="#64748B" stroke-width="2"/>
    <line x1="-25" y1="-25" x2="-25" y2="15" stroke="#64748B" stroke-width="2"/>

    <!-- Graph line rising -->
    <path d="M -20 10 L -10 4 L 0 -4 L 10 -12 L 20 -20" stroke="#10B981" stroke-width="3" fill="none"/>

    <!-- Data points -->
    <circle cx="-20" cy="10" r="3" fill="#22C55E"/>
    <circle cx="-10" cy="4" r="3" fill="#22C55E"/>
    <circle cx="0" cy="-4" r="3" fill="#22C55E"/>
    <circle cx="10" cy="-12" r="3" fill="#22C55E"/>
    <circle cx="20" cy="-20" r="3" fill="#22C55E"/>

    <!-- Arrow up -->
    <path d="M 20 -20 L 18 -16 L 22 -16 Z" fill="#10B981"/>
  </g>

  <!-- Badge -->
  <circle cx="100" cy="70" r="18" fill="#10B981"/>
  <text x="100" y="72" font-family="Arial" font-size="7" font-weight="bold" fill="white" text-anchor="middle">IPMAT</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#6EE7B7" stroke-width="2"/>
</svg>
