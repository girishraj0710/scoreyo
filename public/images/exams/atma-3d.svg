<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D ATMA - Books stack theme -->
  <circle cx="100" cy="100" r="65" fill="#E0F2FE" opacity="0.4"/>
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Stack of books -->
  <g transform="translate(100, 120)">
    <rect x="-22" y="6" width="44" height="10" rx="2" fill="#DC2626"/>
    <text y="13" font-family="Arial" font-size="5" font-weight="bold" fill="white" text-anchor="middle">FINANCE</text>

    <rect x="-22" y="-6" width="44" height="10" rx="2" fill="#3B82F6"/>
    <text y="1" font-family="Arial" font-size="5" font-weight="bold" fill="white" text-anchor="middle">MARKETING</text>

    <rect x="-22" y="-18" width="44" height="10" rx="2" fill="#10B981"/>
    <text y="-11" font-family="Arial" font-size="5" font-weight="bold" fill="white" text-anchor="middle">MGMT</text>
  </g>

  <!-- Badge -->
  <circle cx="100" cy="70" r="18" fill="#8B5CF6"/>
  <text x="100" y="72" font-family="Arial" font-size="8" font-weight="bold" fill="white" text-anchor="middle">ATMA</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#C4B5FD" stroke-width="2"/>
</svg>
