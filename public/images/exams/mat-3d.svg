<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D MAT - Ledger book theme -->
  <circle cx="100" cy="100" r="65" fill="#D1FAE5" opacity="0.4"/>
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Ledger book -->
  <g transform="translate(100, 110)">
    <rect x="-24" y="-18" width="48" height="36" rx="3" fill="#10B981"/>
    <rect x="-22" y="-16" width="44" height="32" rx="2" fill="#D1FAE5"/>

    <!-- Grid lines -->
    <line x1="-18" y1="-10" x2="18" y2="-10" stroke="#059669" stroke-width="1"/>
    <line x1="-18" y1="-2" x2="18" y2="-2" stroke="#059669" stroke-width="1"/>
    <line x1="-18" y1="6" x2="18" y2="6" stroke="#059669" stroke-width="1"/>

    <!-- Vertical divider -->
    <line x1="0" y1="-16" x2="0" y2="16" stroke="#059669" stroke-width="1.5"/>

    <!-- Bookmark -->
    <rect x="18" y="-18" width="6" height="24" fill="#DC2626"/>
  </g>

  <!-- Badge -->
  <circle cx="100" cy="70" r="18" fill="#10B981"/>
  <text x="100" y="72" font-family="Arial" font-size="10" font-weight="bold" fill="white" text-anchor="middle">MAT</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#6EE7B7" stroke-width="2"/>
</svg>
