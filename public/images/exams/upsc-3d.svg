<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D UPSC illustration with government building, flag, and scale -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#DBEAFE" opacity="0.4"/>

  <!-- Building shadow -->
  <ellipse cx="100" cy="155" rx="55" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Government building -->
  <rect x="70" y="100" width="60" height="50" rx="4" fill="#1E40AF"/>
  <rect x="70" y="100" width="60" height="50" rx="4" fill="url(#buildingGradient)"/>

  <!-- Pillars -->
  <rect x="75" y="110" width="8" height="40" rx="2" fill="#DBEAFE" opacity="0.9"/>
  <rect x="92" y="110" width="8" height="40" rx="2" fill="#DBEAFE" opacity="0.9"/>
  <rect x="109" y="110" width="8" height="40" rx="2" fill="#DBEAFE" opacity="0.9"/>

  <!-- Dome/roof -->
  <ellipse cx="100" cy="100" rx="35" ry="15" fill="#3B82F6"/>
  <ellipse cx="100" cy="97" rx="35" ry="12" fill="#60A5FA"/>
  <circle cx="100" cy="85" r="8" fill="#FBBF24"/>
  <circle cx="100" cy="82" r="3" fill="#FCD34D"/>

  <!-- Indian flag -->
  <rect x="140" y="60" width="30" height="45" rx="2" fill="white"/>
  <rect x="140" y="60" width="30" height="15" fill="#FF9933"/>
  <rect x="140" y="90" width="30" height="15" fill="#138808"/>
  <circle cx="155" cy="82.5" r="6" fill="#000080"/>
  <circle cx="155" cy="82.5" r="5" fill="none" stroke="#000080" stroke-width="1"/>
  <line x1="155" y1="77.5" x2="155" y2="87.5" stroke="#000080" stroke-width="0.5"/>
  <line x1="150" y1="82.5" x2="160" y2="82.5" stroke="#000080" stroke-width="0.5"/>

  <!-- Flag pole -->
  <rect x="137" y="60" width="3" height="60" fill="#78350F"/>

  <!-- Scale/Balance -->
  <g transform="translate(50, 80)">
    <circle r="18" fill="#8B5CF6"/>
    <rect x="-1" y="-8" width="2" height="16" fill="#F3E8FF"/>
    <line x1="-12" y1="-8" x2="12" y2="-8" stroke="#F3E8FF" stroke-width="2"/>
    <rect x="-15" y="-12" width="6" height="4" rx="1" fill="#F3E8FF"/>
    <rect x="9" y="-12" width="6" height="4" rx="1" fill="#F3E8FF"/>
    <line x1="-12" y1="-8" x2="-12" y2="-12" stroke="#F3E8FF" stroke-width="1"/>
    <line x1="12" y1="-8" x2="12" y2="-12" stroke="#F3E8FF" stroke-width="1"/>
  </g>

  <!-- Book/Constitution -->
  <rect x="135" y="120" width="35" height="30" rx="3" fill="#DC2626"/>
  <rect x="135" y="120" width="35" height="30" rx="3" fill="url(#constGradient)"/>
  <rect x="138" y="125" width="29" height="3" rx="1" fill="#FEE2E2"/>
  <rect x="138" y="131" width="29" height="3" rx="1" fill="#FEE2E2"/>
  <rect x="138" y="137" width="22" height="3" rx="1" fill="#FEE2E2"/>
  <text x="152" y="147" font-family="Georgia, serif" font-size="8" font-weight="bold" fill="#FEE2E2" text-anchor="middle">IAS</text>

  <defs>
    <linearGradient id="buildingGradient" x1="100" y1="100" x2="100" y2="150">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1E3A8A" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="constGradient" x1="152" y1="120" x2="152" y2="150">
      <stop offset="0%" stop-color="#F87171" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#991B1B" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
</svg>
