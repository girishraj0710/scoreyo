<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D GMAT - Globe with airplane theme -->
  <circle cx="100" cy="100" r="65" fill="#DBEAFE" opacity="0.4"/>
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Globe -->
  <g transform="translate(100, 115)">
    <circle r="24" fill="#3B82F6" opacity="0.3"/>
    <ellipse rx="24" ry="24" fill="none" stroke="#3B82F6" stroke-width="2"/>
    <ellipse rx="12" ry="24" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
    <ellipse rx="24" ry="12" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
  </g>

  <!-- Airplane circling -->
  <g transform="translate(125, 95)">
    <ellipse cx="0" cy="0" rx="20" ry="8" fill="#60A5FA"/>
    <ellipse cx="0" cy="0" rx="30" ry="3" fill="#93C5FD"/>
    <ellipse cx="12" cy="-2" rx="6" ry="4" fill="#3B82F6" opacity="0.6"/>
  </g>

  <!-- Badge -->
  <circle cx="100" cy="70" r="18" fill="#3B82F6"/>
  <text x="100" y="72" font-family="Arial" font-size="8" font-weight="bold" fill="white" text-anchor="middle">GMAT</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#93C5FD" stroke-width="2"/>
</svg>
