<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D Agriculture illustration with wheat, tractor, and farm -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#FEF3C7" opacity="0.4"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="155" rx="52" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Wheat/Rice sheaf -->
  <g transform="translate(100, 105)">
    <!-- Stems -->
    <line x1="-12" y1="20" x2="-12" y2="-15" stroke="#92400E" stroke-width="2"/>
    <line x1="-6" y1="20" x2="-6" y2="-18" stroke="#92400E" stroke-width="2"/>
    <line x1="0" y1="20" x2="0" y2="-20" stroke="#92400E" stroke-width="2"/>
    <line x1="6" y1="20" x2="6" y2="-18" stroke="#92400E" stroke-width="2"/>
    <line x1="12" y1="20" x2="12" y2="-15" stroke="#92400E" stroke-width="2"/>

    <!-- Wheat heads -->
    <ellipse cx="-12" cy="-18" rx="3" ry="8" fill="#FCD34D"/>
    <ellipse cx="-6" cy="-21" rx="3" ry="8" fill="#FCD34D"/>
    <ellipse cy="-23" rx="3" ry="8" fill="#FBBF24"/>
    <ellipse cx="6" cy="-21" rx="3" ry="8" fill="#FCD34D"/>
    <ellipse cx="12" cy="-18" rx="3" ry="8" fill="#FCD34D"/>

    <!-- Grain details -->
    <circle cx="-12" cy="-20" r="1.5" fill="#F59E0B"/>
    <circle cx="-12" cy="-16" r="1.5" fill="#F59E0B"/>
    <circle cx="0" cy="-25" r="1.5" fill="#D97706"/>
    <circle cx="0" cy="-21" r="1.5" fill="#D97706"/>

    <!-- Bundle tie -->
    <rect x="-15" y="18" width="30" height="4" rx="2" fill="#78350F"/>
  </g>

  <!-- Tractor -->
  <g transform="translate(55, 120)">
    <!-- Body -->
    <rect x="-15" y="-15" width="30" height="20" rx="3" fill="#DC2626"/>
    <rect x="-15" y="-15" width="30" height="20" rx="3" fill="url(#tractorGradient)"/>

    <!-- Cabin -->
    <rect x="-8" y="-22" width="16" height="10" rx="2" fill="#DBEAFE" opacity="0.8"/>

    <!-- Exhaust pipe -->
    <rect x="-12" y="-28" width="3" height="8" fill="#1E293B"/>

    <!-- Front wheel -->
    <circle cx="8" cy="10" r="8" fill="#1E293B"/>
    <circle cx="8" cy="10" r="5" fill="#64748B"/>

    <!-- Back wheel (larger) -->
    <circle cx="-8" cy="15" r="12" fill="#1E293B"/>
    <circle cx="-8" cy="15" r="8" fill="#64748B"/>
    <circle cx="-8" cy="15" r="4" fill="#94A3B8"/>

    <!-- Wheel treads -->
    <line x1="-8" y1="7" x2="-8" y2="23" stroke="#1E293B" stroke-width="2"/>
    <line x1="-16" y1="15" x2="0" y2="15" stroke="#1E293B" stroke-width="2"/>
  </g>

  <!-- Sun -->
  <circle cx="145" cy="75" r="18" fill="#FCD34D"/>
  <circle cx="145" cy="75" r="18" fill="url(#sunGradient)"/>

  <!-- Sun rays -->
  <line x1="145" y1="52" x2="145" y2="58" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="145" y1="92" x2="145" y2="98" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="122" y1="75" x2="128" y2="75" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="162" y1="75" x2="168" y2="75" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="60" x2="134" y2="64" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="156" y1="86" x2="160" y2="90" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>

  <!-- Farm field -->
  <rect x="130" y="125" width="40" height="30" rx="3" fill="#84CC16"/>
  <rect x="130" y="125" width="40" height="30" rx="3" fill="url(#fieldGradient)"/>

  <!-- Crop rows -->
  <line x1="135" y1="130" x2="165" y2="130" stroke="#65A30D" stroke-width="2"/>
  <line x1="135" y1="137" x2="165" y2="137" stroke="#65A30D" stroke-width="2"/>
  <line x1="135" y1="144" x2="165" y2="144" stroke="#65A30D" stroke-width="2"/>
  <line x1="135" y1="151" x2="165" y2="151" stroke="#65A30D" stroke-width="2"/>

  <!-- Plants on field -->
  <path d="M 140 140 L 142 135 L 144 140" stroke="#365314" stroke-width="1.5" fill="none"/>
  <path d="M 155 133 L 157 128 L 159 133" stroke="#365314" stroke-width="1.5" fill="none"/>

  <!-- Barn/Farm building -->
  <g transform="translate(55, 85)">
    <rect x="-15" y="-10" width="30" height="20" rx="2" fill="#DC2626"/>
    <path d="M -17 -10 L 0 -20 L 17 -10 Z" fill="#991B1B"/>

    <!-- Barn door -->
    <rect x="-6" y="2" width="12" height="8" rx="1" fill="#92400E"/>

    <!-- Window -->
    <rect x="-10" y="-5" width="6" height="6" rx="1" fill="#FBBF24"/>
  </g>

  <!-- Cow/Animal -->
  <g transform="translate(145, 145)">
    <ellipse rx="12" ry="8" fill="#A16207"/>
    <ellipse cx="-8" cy="-2" rx="6" ry="5" fill="#92400E"/>

    <!-- Legs -->
    <rect x="-8" y="6" width="3" height="8" fill="#78350F"/>
    <rect x="-2" y="6" width="3" height="8" fill="#78350F"/>
    <rect x="4" y="6" width="3" height="8" fill="#78350F"/>
    <rect x="10" y="6" width="3" height="8" fill="#78350F"/>

    <!-- Ears -->
    <ellipse cx="-10" cy="-5" rx="3" ry="4" fill="#78350F"/>
    <ellipse cx="-6" cy="-5" rx="3" ry="4" fill="#78350F"/>

    <!-- Spots -->
    <circle cx="2" cy="-1" r="2" fill="#78350F"/>
    <circle cx="8" cy="1" r="2" fill="#78350F"/>
  </g>

  <!-- Watering can -->
  <g transform="translate(48, 130)">
    <rect x="-8" y="-8" width="16" height="12" rx="2" fill="#3B82F6"/>

    <!-- Spout -->
    <path d="M 8 -2 L 16 0 L 14 4 L 6 2 Z" fill="#1E40AF"/>

    <!-- Handle -->
    <path d="M -8 -2 Q -12 -6 -8 -10" stroke="#1E40AF" stroke-width="3" fill="none"/>

    <!-- Water drops -->
    <circle cx="16" cy="6" r="1.5" fill="#3B82F6"/>
    <circle cx="18" cy="8" r="1" fill="#60A5FA"/>
  </g>

  <!-- ICAR badge -->
  <circle cx="55" cy="65" r="14" fill="#10B981"/>
  <text x="55" y="69" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white" text-anchor="middle">ICAR</text>
  <circle cx="55" cy="65" r="11" fill="none" stroke="#D1FAE5" stroke-width="1.5"/>

  <defs>
    <linearGradient id="tractorGradient" x1="55" y1="107" x2="55" y2="135">
      <stop offset="0%" stop-color="#FCA5A5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#991B1B" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="sunGradient" x1="145" y1="57" x2="145" y2="93">
      <stop offset="0%" stop-color="#FEF9C3" stop-opacity="1"/>
      <stop offset="100%" stop-color="#EAB308" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="fieldGradient" x1="150" y1="125" x2="150" y2="155">
      <stop offset="0%" stop-color="#BEF264" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4D7C0F" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
</svg>
