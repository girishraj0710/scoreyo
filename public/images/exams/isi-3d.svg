<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D ISI - Statistics chart theme -->
  <circle cx="100" cy="100" r="65" fill="#FEE2E2" opacity="0.4"/>
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Chart decreasing -->
  <g transform="translate(100, 120)">
    <!-- Axis -->
    <line x1="-25" y1="15" x2="25" y2="15" stroke="#64748B" stroke-width="2"/>
    <line x1="-25" y1="-25" x2="-25" y2="15" stroke="#64748B" stroke-width="2"/>

    <!-- Graph line -->
    <path d="M -20 -20 L -10 -15 L 0 -10 L 10 0 L 20 10" stroke="#DC2626" stroke-width="3" fill="none"/>

    <!-- Data points -->
    <circle cx="-20" cy="-20" r="3" fill="#EF4444"/>
    <circle cx="-10" cy="-15" r="3" fill="#EF4444"/>
    <circle cx="0" cy="-10" r="3" fill="#EF4444"/>
    <circle cx="10" cy="0" r="3" fill="#EF4444"/>
    <circle cx="20" cy="10" r="3" fill="#EF4444"/>
  </g>

  <!-- Badge -->
  <circle cx="100" cy="70" r="18" fill="#DC2626"/>
  <text x="100" y="72" font-family="Arial" font-size="10" font-weight="bold" fill="white" text-anchor="middle">ISI</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#FCA5A5" stroke-width="2"/>
</svg>
