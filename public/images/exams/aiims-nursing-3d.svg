<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D AIIMS Nursing - Nurse cap theme -->
  <circle cx="100" cy="100" r="65" fill="#FEE2E2" opacity="0.4"/>
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Nurse cap -->
  <g transform="translate(100, 105)">
    <rect x="-22" y="-8" width="44" height="16" rx="3" fill="white"/>
    <rect x="-20" y="-6" width="40" height="12" fill="#F8FAFC"/>

    <!-- Red cross on cap -->
    <rect x="-3" y="-4" width="6" height="8" fill="#DC2626"/>
    <rect x="-6" y="-1" width="12" height="2" fill="#DC2626"/>

    <!-- Cap fold -->
    <path d="M -22 0 L -18 8 L 18 8 L 22 0" fill="#E0E7EB"/>
  </g>

  <!-- Medical cross -->
  <g transform="translate(100, 130)">
    <circle r="14" fill="#DC2626"/>
    <rect x="-2" y="-10" width="4" height="20" fill="white"/>
    <rect x="-10" y="-2" width="20" height="4" fill="white"/>
  </g>

  <!-- Badge -->
  <circle cx="100" cy="70" r="18" fill="#DC2626"/>
  <text x="100" y="67" font-family="Arial" font-size="6" font-weight="bold" fill="white" text-anchor="middle">AIIMS</text>
  <text x="100" y="76" font-family="Arial" font-size="6" fill="#FEE2E2" text-anchor="middle">Nursing</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#FCA5A5" stroke-width="2"/>
</svg>
