<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D Law illustration with scales, gavel, and law books -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#FEF3C7" opacity="0.4"/>

  <!-- Scales shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Justice scales -->
  <g transform="translate(100, 110)">
    <!-- Base -->
    <rect x="-3" y="30" width="6" height="15" rx="2" fill="#78350F"/>
    <circle cy="45" r="8" fill="#92400E"/>

    <!-- Stand -->
    <rect x="-2" y="-20" width="4" height="50" fill="#A16207"/>
    <circle cy="-20" r="4" fill="#D97706"/>

    <!-- Horizontal beam -->
    <rect x="-35" y="-22" width="70" height="4" rx="2" fill="#FCD34D"/>

    <!-- Left pan -->
    <line x1="-28" y1="-20" x2="-28" y2="-5" stroke="#FBBF24" stroke-width="1.5"/>
    <ellipse cx="-28" cy="-5" rx="12" ry="4" fill="#FEF3C7"/>
    <path d="M -40 -5 Q -28 2 -16 -5 L -18 -7 Q -28 0 -38 -7 Z" fill="#FBBF24"/>

    <!-- Right pan -->
    <line x1="28" y1="-20" x2="28" y2="-5" stroke="#FBBF24" stroke-width="1.5"/>
    <ellipse cx="28" cy="-5" rx="12" ry="4" fill="#FEF3C7"/>
    <path d="M 16 -5 Q 28 2 40 -5 L 38 -7 Q 28 0 18 -7 Z" fill="#FBBF24"/>
  </g>

  <!-- Gavel -->
  <g transform="translate(55, 85) rotate(-25)">
    <!-- Handle -->
    <rect x="-3" y="0" width="6" height="35" rx="2" fill="#92400E"/>
    <!-- Head -->
    <rect x="-8" y="-10" width="16" height="12" rx="2" fill="#78350F"/>
    <rect x="-8" y="-10" width="16" height="8" rx="2" fill="#A16207"/>
    <!-- Impact lines -->
    <line x1="-12" y1="-5" x2="-15" y2="-8" stroke="#F59E0B" stroke-width="2" opacity="0.6"/>
    <line x1="-10" y1="-2" x2="-14" y2="-4" stroke="#F59E0B" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Sound block -->
  <circle cx="45" cy="95" r="10" fill="#1E293B"/>
  <ellipse cx="45" cy="95" rx="8" ry="6" fill="#475569"/>

  <!-- Law books stack -->
  <g transform="translate(140, 105)">
    <!-- Book 1 (bottom) -->
    <rect x="-20" y="15" width="40" height="12" rx="2" fill="#DC2626"/>
    <rect x="-18" y="17" width="36" height="8" rx="1" fill="#FEE2E2" opacity="0.3"/>

    <!-- Book 2 (middle) -->
    <rect x="-20" y="3" width="40" height="12" rx="2" fill="#1E40AF"/>
    <rect x="-18" y="5" width="36" height="8" rx="1" fill="#DBEAFE" opacity="0.3"/>

    <!-- Book 3 (top) -->
    <rect x="-20" y="-9" width="40" height="12" rx="2" fill="#059669"/>
    <rect x="-18" y="-7" width="36" height="8" rx="1" fill="#D1FAE5" opacity="0.3"/>

    <!-- Spine details -->
    <text x="0" y="23" font-family="Georgia, serif" font-size="7" font-weight="bold" fill="#FEE2E2" text-anchor="middle">PENAL</text>
    <text x="0" y="11" font-family="Georgia, serif" font-size="7" font-weight="bold" fill="#DBEAFE" text-anchor="middle">CIVIL</text>
    <text x="0" y="-1" font-family="Georgia, serif" font-size="7" font-weight="bold" fill="#D1FAE5" text-anchor="middle">CODE</text>
  </g>

  <!-- Scroll/Constitution -->
  <g transform="translate(55, 135)">
    <rect x="-18" y="-12" width="36" height="24" rx="2" fill="#FEF3C7"/>
    <rect x="-15" y="-9" width="30" height="18" rx="1" fill="white"/>
    <line x1="-12" y1="-6" x2="12" y2="-6" stroke="#78350F" stroke-width="1.5"/>
    <line x1="-12" y1="-2" x2="12" y2="-2" stroke="#78350F" stroke-width="1.5"/>
    <line x1="-12" y1="2" x2="12" y2="2" stroke="#78350F" stroke-width="1.5"/>
    <line x1="-12" y1="6" x2="8" y2="6" stroke="#78350F" stroke-width="1.5"/>

    <!-- Scroll ends -->
    <circle cx="-18" cy="0" r="4" fill="#D97706"/>
    <circle cx="18" cy="0" r="4" fill="#D97706"/>
  </g>

  <!-- Badge/Seal -->
  <circle cx="140" cy="145" r="16" fill="#8B5CF6"/>
  <circle cx="140" cy="145" r="13" fill="none" stroke="#F3E8FF" stroke-width="2"/>
  <text x="140" y="150" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#F3E8FF" text-anchor="middle">LAW</text>

  <!-- Paragraph symbol -->
  <circle cx="145" cy="65" r="18" fill="#3B82F6"/>
  <text x="145" y="73" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#DBEAFE" text-anchor="middle">§</text>

  <defs>
    <linearGradient id="scaleGradient" x1="100" y1="85" x2="100" y2="145">
      <stop offset="0%" stop-color="#FDE047" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#CA8A04" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
</svg>
