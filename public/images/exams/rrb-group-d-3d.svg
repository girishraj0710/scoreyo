<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D RRB Group D - Railway track theme -->
  <circle cx="100" cy="100" r="65" fill="#E0E7EB" opacity="0.4"/>
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Railway track -->
  <g transform="translate(100, 110)">
    <!-- Rails -->
    <rect x="-30" y="-5" width="60" height="6" rx="2" fill="#475569"/>
    <rect x="-30" y="10" width="60" height="6" rx="2" fill="#475569"/>

    <!-- Sleepers -->
    <rect x="-25" y="-8" width="3" height="24" fill="#92400E"/>
    <rect x="-15" y="-8" width="3" height="24" fill="#92400E"/>
    <rect x="-5" y="-8" width="3" height="24" fill="#92400E"/>
    <rect x="5" y="-8" width="3" height="24" fill="#92400E"/>
    <rect x="15" y="-8" width="3" height="24" fill="#92400E"/>

    <!-- Ballast (gravel) -->
    <ellipse cx="-20" cy="20" rx="3" ry="2" fill="#64748B" opacity="0.6"/>
    <ellipse cy="20" rx="3" ry="2" fill="#64748B" opacity="0.6"/>
    <ellipse cx="20" cy="20" rx="3" ry="2" fill="#64748B" opacity="0.6"/>
  </g>

  <!-- Badge -->
  <circle cx="100" cy="70" r="18" fill="#475569"/>
  <text x="100" y="67" font-family="Arial" font-size="6" font-weight="bold" fill="white" text-anchor="middle">RRB</text>
  <text x="100" y="76" font-family="Arial" font-size="6" fill="#CBD5E1" text-anchor="middle">Group D</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#94A3B8" stroke-width="2"/>
</svg>
