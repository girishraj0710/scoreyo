<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D Defense illustration with military helmet, shield, and wings -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#FEE2E2" opacity="0.4"/>

  <!-- Shield shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Main shield -->
  <path d="M 100 80 L 130 95 L 130 120 Q 130 145 100 155 Q 70 145 70 120 L 70 95 Z" fill="#DC2626"/>
  <path d="M 100 80 L 130 95 L 130 120 Q 130 145 100 155 Q 70 145 70 120 L 70 95 Z" fill="url(#shieldGradient)"/>

  <!-- Shield emblem -->
  <circle cx="100" cy="115" r="20" fill="#FEE2E2"/>
  <path d="M 95 115 L 98 120 L 105 110" stroke="#DC2626" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="100" cy="115" r="18" fill="none" stroke="#DC2626" stroke-width="2"/>

  <!-- Military helmet -->
  <g transform="translate(145, 80)">
    <ellipse cx="0" cy="0" rx="20" ry="16" fill="#78350F"/>
    <ellipse cx="0" cy="0" rx="20" ry="16" fill="url(#helmetGradient)"/>
    <ellipse cx="0" cy="-5" rx="18" ry="12" fill="#92400E"/>
    <path d="M -15 0 Q -20 8 -18 12 L -12 10 Z" fill="#A16207"/>
    <path d="M 15 0 Q 20 8 18 12 L 12 10 Z" fill="#A16207"/>
    <circle cx="-5" cy="-5" r="2" fill="#FEF3C7"/>
  </g>

  <!-- Crossed swords -->
  <g transform="translate(55, 85)">
    <rect x="-2" y="-20" width="4" height="35" rx="1" fill="#94A3B8" transform="rotate(-30)"/>
    <rect x="-2" y="-20" width="4" height="35" rx="1" fill="#94A3B8" transform="rotate(30)"/>
    <path d="M -8 -18 L -4 -24 L 0 -22 L 4 -24 L 8 -18 L 0 -15 Z" fill="#475569" transform="rotate(-30)"/>
    <path d="M -8 -18 L -4 -24 L 0 -22 L 4 -24 L 8 -18 L 0 -15 Z" fill="#475569" transform="rotate(30)"/>
    <circle r="18" fill="#991B1B"/>
    <circle r="14" fill="none" stroke="#FEE2E2" stroke-width="2"/>
    <text y="6" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FEE2E2" text-anchor="middle">NDA</text>
  </g>

  <!-- Air force wings -->
  <g transform="translate(145, 125)">
    <circle r="16" fill="#1E40AF"/>
    <!-- Left wing -->
    <path d="M -16 0 Q -25 -5 -30 -2 Q -28 2 -20 3 Z" fill="#60A5FA"/>
    <!-- Right wing -->
    <path d="M 16 0 Q 25 -5 30 -2 Q 28 2 20 3 Z" fill="#60A5FA"/>
    <!-- Center circle -->
    <circle r="8" fill="#DBEAFE"/>
    <text y="4" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#1E40AF" text-anchor="middle">AF</text>
  </g>

  <!-- Indian tricolor flag ribbon -->
  <rect x="40" y="125" width="30" height="30" rx="3" fill="white"/>
  <rect x="40" y="125" width="30" height="10" fill="#FF9933"/>
  <rect x="40" y="145" width="30" height="10" fill="#138808"/>
  <circle cx="55" cy="140" r="4" fill="#000080"/>

  <!-- Anchor (Navy) -->
  <g transform="translate(145, 145)">
    <path d="M 0 -12 L 0 8" stroke="#0369A1" stroke-width="3"/>
    <circle cy="-12" r="3" fill="#0369A1"/>
    <path d="M -8 0 Q -10 8 -6 12 L -4 10 L 0 8" fill="#0369A1"/>
    <path d="M 8 0 Q 10 8 6 12 L 4 10 L 0 8" fill="#0369A1"/>
    <path d="M -8 0 L 8 0" stroke="#0369A1" stroke-width="3"/>
  </g>

  <!-- Star badge -->
  <circle cx="55" cy="135" r="12" fill="#FBBF24"/>
  <text x="55" y="140" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">★</text>

  <defs>
    <linearGradient id="shieldGradient" x1="100" y1="80" x2="100" y2="155">
      <stop offset="0%" stop-color="#FCA5A5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#991B1B" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="helmetGradient" x1="0" y1="-16" x2="0" y2="16">
      <stop offset="0%" stop-color="#D97706" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#78350F" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
</svg>
