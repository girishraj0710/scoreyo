<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D AIIMS - Hospital theme (from emoji: 🏥) -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#FEE2E2" opacity="0.4"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Hospital Building (center) -->
  <g transform="translate(100, 115)">
    <!-- Main building -->
    <rect x="-30" y="-20" width="60" height="40" rx="4" fill="#DC2626"/>
    <rect x="-30" y="-20" width="60" height="40" rx="4" fill="url(#hospitalGradient)"/>

    <!-- Red cross -->
    <rect x="-4" y="-12" width="8" height="24" rx="1" fill="white"/>
    <rect x="-12" y="-4" width="24" height="8" rx="1" fill="white"/>

    <!-- Windows -->
    <rect x="-24" y="-14" width="6" height="6" rx="1" fill="#FEF3C7" opacity="0.9"/>
    <rect x="18" y="-14" width="6" height="6" rx="1" fill="#FEF3C7" opacity="0.9"/>
    <rect x="-24" y="8" width="6" height="6" rx="1" fill="#FEF3C7" opacity="0.9"/>
    <rect x="18" y="8" width="6" height="6" rx="1" fill="#FEF3C7" opacity="0.9"/>

    <!-- Entrance -->
    <rect x="-10" y="12" width="20" height="8" rx="2" fill="#7C2D12"/>

    <!-- AIIMS sign -->
    <rect x="-20" y="-25" width="40" height="6" rx="2" fill="white"/>
    <text y="-20" font-family="Arial, sans-serif" font-size="5" font-weight="bold" fill="#DC2626" text-anchor="middle">AIIMS</text>
  </g>

  <!-- Ambulance -->
  <g transform="translate(55, 95)">
    <rect x="-16" y="-8" width="32" height="16" rx="3" fill="white"/>
    <rect x="-16" y="-8" width="32" height="16" rx="3" fill="url(#ambulanceGradient)"/>

    <!-- Red stripe -->
    <rect x="-16" y="0" width="32" height="4" fill="#DC2626"/>

    <!-- Cross -->
    <rect x="-2" y="-4" width="4" height="8" fill="#DC2626"/>
    <rect x="-6" y="-2" width="12" height="4" fill="#DC2626"/>

    <!-- Windows -->
    <rect x="-10" y="-6" width="6" height="4" rx="1" fill="#DBEAFE" opacity="0.8"/>
    <rect x="4" y="-6" width="8" height="4" rx="1" fill="#DBEAFE" opacity="0.8"/>

    <!-- Wheels -->
    <circle cx="-10" cy="8" r="4" fill="#1E293B"/>
    <circle cx="-10" cy="8" r="2" fill="#94A3B8"/>
    <circle cx="10" cy="8" r="4" fill="#1E293B"/>
    <circle cx="10" cy="8" r="2" fill="#94A3B8"/>

    <!-- Light -->
    <circle cx="-14" cy="-6" r="2" fill="#F59E0B" opacity="0.8"/>
  </g>

  <!-- Medical equipment - Stethoscope -->
  <g transform="translate(145, 95)">
    <circle cy="-10" r="6" fill="#DC2626"/>
    <circle cy="-10" r="4" fill="#FCA5A5"/>

    <!-- Tubes -->
    <path d="M -4 -8 Q -8 0 -6 10" stroke="#DC2626" stroke-width="3" fill="none"/>
    <path d="M 4 -8 Q 8 0 6 10" stroke="#DC2626" stroke-width="3" fill="none"/>

    <!-- Ear pieces -->
    <ellipse cx="-6" cy="10" rx="3" ry="4" fill="#1E293B"/>
    <ellipse cx="6" cy="10" rx="3" ry="4" fill="#1E293B"/>
  </g>

  <!-- Medical cross symbol -->
  <g transform="translate(55, 140)">
    <circle r="16" fill="#DC2626"/>
    <rect x="-3" y="-12" width="6" height="24" rx="1" fill="white"/>
    <rect x="-12" y="-3" width="24" height="6" rx="1" fill="white"/>
  </g>

  <!-- Syringe -->
  <g transform="translate(145, 140)">
    <rect x="-14" y="-4" width="28" height="8" rx="2" fill="#DBEAFE" opacity="0.8"/>
    <rect x="-14" y="-2" width="20" height="4" fill="#3B82F6" opacity="0.6"/>

    <!-- Needle -->
    <rect x="14" y="-1" width="8" height="2" fill="#94A3B8"/>
    <path d="M 22 -1 L 26 0 L 22 1 Z" fill="#64748B"/>

    <!-- Plunger -->
    <rect x="-18" y="-3" width="4" height="6" fill="#DC2626"/>
    <circle cx="-18" r="3" fill="#EF4444"/>

    <!-- Measurement marks -->
    <line x1="-10" y1="-4" x2="-10" y2="4" stroke="#0369A1" stroke-width="1"/>
    <line x1="-4" y1="-4" x2="-4" y2="4" stroke="#0369A1" stroke-width="1"/>
    <line x1="2" y1="-4" x2="2" y2="4" stroke="#0369A1" stroke-width="1"/>
  </g>

  <!-- Medical chart -->
  <g transform="translate(55, 65)">
    <rect x="-14" y="-14" width="28" height="28" rx="2" fill="white" stroke="#E5E7EB" stroke-width="2"/>

    <!-- ECG line -->
    <path d="M -10 0 L -6 0 L -4 -8 L -2 8 L 0 0 L 10 0" stroke="#DC2626" stroke-width="2" fill="none"/>

    <!-- Title -->
    <line x1="-10" y1="-8" x2="10" y2="-8" stroke="#9CA3AF" stroke-width="1.5"/>
    <text y="-4" font-family="Arial, sans-serif" font-size="4" fill="#64748B" text-anchor="middle">ECG</text>

    <!-- Lines -->
    <line x1="-10" y1="6" x2="10" y2="6" stroke="#E5E7EB" stroke-width="1"/>
    <line x1="-10" y1="10" x2="6" y2="10" stroke="#E5E7EB" stroke-width="1"/>
  </g>

  <!-- Medicine bottle -->
  <g transform="translate(145, 65)">
    <rect x="-8" y="-12" width="16" height="24" rx="3" fill="white" stroke="#DC2626" stroke-width="2"/>

    <!-- Label -->
    <rect x="-6" y="-4" width="12" height="10" rx="1" fill="#FEE2E2"/>
    <text y="0" font-family="Arial, sans-serif" font-size="4" fill="#DC2626" text-anchor="middle">Rx</text>

    <!-- Cap -->
    <rect x="-6" y="-16" width="12" height="4" rx="1" fill="#DC2626"/>
    <ellipse cy="-16" rx="6" ry="2" fill="#EF4444"/>

    <!-- Pills visible -->
    <circle cx="-3" cy="8" r="2" fill="#3B82F6"/>
    <circle cx="3" cy="9" r="2" fill="#3B82F6"/>
  </g>

  <!-- AIIMS Badge -->
  <circle cx="100" cy="70" r="18" fill="#DC2626"/>
  <text x="100" y="68" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">AIIMS</text>
  <text x="100" y="77" font-family="Arial, sans-serif" font-size="6" fill="#FEE2E2" text-anchor="middle">Medical</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#FCA5A5" stroke-width="2"/>

  <defs>
    <linearGradient id="hospitalGradient" x1="100" y1="95" x2="100" y2="135">
      <stop offset="0%" stop-color="#FCA5A5" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#991B1B" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="ambulanceGradient" x1="55" y1="87" x2="55" y2="103">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FEE2E2" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
</svg>
