<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D GUJCET - Lion theme for Gujarat (from emoji: 🦁) -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#FEF3C7" opacity="0.4"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Asiatic Lion (center) -->
  <g transform="translate(100, 110)">
    <!-- Body -->
    <ellipse cy="8" rx="26" ry="20" fill="#F59E0B"/>
    <ellipse cy="8" rx="26" ry="20" fill="url(#lionBodyGradient)"/>

    <!-- Head -->
    <circle cy="-12" r="20" fill="#F59E0B"/>

    <!-- Majestic mane -->
    <circle cx="-18" cy="-12" r="12" fill="#D97706"/>
    <circle cx="18" cy="-12" r="12" fill="#D97706"/>
    <circle cx="-14" cy="-22" r="10" fill="#D97706"/>
    <circle cx="14" cy="-22" r="10" fill="#D97706"/>
    <circle cy="-26" r="10" fill="#D97706"/>
    <circle cx="-20" cy="-4" r="10" fill="#D97706"/>
    <circle cx="20" cy="-4" r="10" fill="#D97706"/>
    <circle cx="-10" cy="0" r="8" fill="#D97706"/>
    <circle cx="10" cy="0" r="8" fill="#D97706"/>

    <!-- Face details -->
    <ellipse cy="-10" rx="16" ry="14" fill="#FCD34D"/>

    <!-- Eyes -->
    <circle cx="-6" cy="-14" r="3" fill="#1E293B"/>
    <circle cx="6" cy="-14" r="3" fill="#1E293B"/>
    <circle cx="-5" cy="-15" r="1" fill="white"/>
    <circle cx="7" cy="-15" r="1" fill="white"/>

    <!-- Nose -->
    <ellipse cy="-8" rx="4" ry="3" fill="#92400E"/>

    <!-- Whiskers -->
    <line x1="-16" y1="-10" x2="-22" y2="-12" stroke="#7C2D12" stroke-width="1.5"/>
    <line x1="-16" y1="-8" x2="-22" y2="-8" stroke="#7C2D12" stroke-width="1.5"/>
    <line x1="-16" y1="-6" x2="-22" y2="-4" stroke="#7C2D12" stroke-width="1.5"/>

    <line x1="16" y1="-10" x2="22" y2="-12" stroke="#7C2D12" stroke-width="1.5"/>
    <line x1="16" y1="-8" x2="22" y2="-8" stroke="#7C2D12" stroke-width="1.5"/>
    <line x1="16" y1="-6" x2="22" y2="-4" stroke="#7C2D12" stroke-width="1.5"/>

    <!-- Mouth -->
    <path d="M -4 -5 Q 0 -3 4 -5" stroke="#92400E" stroke-width="1.5" fill="none"/>

    <!-- Legs -->
    <rect x="-20" y="20" width="8" height="16" rx="2" fill="#F59E0B"/>
    <rect x="-6" y="20" width="8" height="16" rx="2" fill="#F59E0B"/>
    <rect x="6" y="20" width="8" height="16" rx="2" fill="#FCD34D"/>
    <rect x="20" y="20" width="8" height="16" rx="2" fill="#FCD34D"/>

    <!-- Paws -->
    <ellipse cx="-16" cy="36" rx="5" ry="2" fill="#D97706"/>
    <ellipse cx="-2" cy="36" rx="5" ry="2" fill="#D97706"/>
    <ellipse cx="10" cy="36" rx="5" ry="2" fill="#D97706"/>
    <ellipse cx="24" cy="36" rx="5" ry="2" fill="#D97706"/>

    <!-- Tail -->
    <path d="M 26 10 Q 32 8 36 12 Q 38 16 36 20" stroke="#F59E0B" stroke-width="5" fill="none"/>
    <circle cx="36" cy="22" r="4" fill="#D97706"/>
  </g>

  <!-- Rann of Kutch landscape -->
  <g transform="translate(55, 140)">
    <rect x="-20" y="0" width="40" height="8" rx="2" fill="#E0E7EB"/>

    <!-- Salt crystals -->
    <circle cx="-12" cy="4" r="2" fill="white" opacity="0.8"/>
    <circle cx="-4" cy="4" r="2" fill="white" opacity="0.8"/>
    <circle cx="4" cy="4" r="2" fill="white" opacity="0.8"/>
    <circle cx="12" cy="4" r="2" fill="white" opacity="0.8"/>

    <!-- Small vegetation -->
    <line x1="-8" y1="8" x2="-8" y2="2" stroke="#10B981" stroke-width="1.5"/>
    <line x1="8" y1="8" x2="8" y2="2" stroke="#10B981" stroke-width="1.5"/>
  </g>

  <!-- Traditional Patola pattern -->
  <g transform="translate(145, 140)">
    <rect x="-16" y="-10" width="32" height="20" rx="2" fill="#DC2626"/>

    <!-- Geometric pattern -->
    <circle cx="-8" cy="-4" r="3" fill="#FCD34D"/>
    <circle cy="-4" r="3" fill="#FCD34D"/>
    <circle cx="8" cy="-4" r="3" fill="#FCD34D"/>

    <circle cx="-8" cy="4" r="3" fill="#10B981"/>
    <circle cy="4" r="3" fill="#10B981"/>
    <circle cx="8" cy="4" r="3" fill="#10B981"/>

    <!-- Border -->
    <rect x="-14" y="-8" width="28" height="16" rx="1" fill="none" stroke="#FCD34D" stroke-width="1.5"/>
  </g>

  <!-- Stepwell (Vav) architecture -->
  <g transform="translate(55, 75)">
    <rect x="-14" y="-12" width="28" height="24" rx="2" fill="#94A3B8"/>

    <!-- Steps -->
    <rect x="-12" y="-8" width="24" height="4" fill="#CBD5E1"/>
    <rect x="-10" y="-4" width="20" height="4" fill="#CBD5E1"/>
    <rect x="-8" y="0" width="16" height="4" fill="#CBD5E1"/>
    <rect x="-6" y="4" width="12" height="4" fill="#CBD5E1"/>

    <!-- Water at bottom -->
    <rect x="-4" y="8" width="8" height="4" fill="#0369A1" opacity="0.6"/>

    <!-- Pillars -->
    <rect x="-12" y="-10" width="2" height="16" fill="#64748B"/>
    <rect x="10" y="-10" width="2" height="16" fill="#64748B"/>
  </g>

  <!-- Garba dancers -->
  <g transform="translate(145, 75)">
    <circle r="14" fill="#EC4899" opacity="0.3"/>

    <!-- Dandiya sticks -->
    <line x1="-8" y1="-8" x2="-12" y2="-12" stroke="#F59E0B" stroke-width="3"/>
    <line x1="8" y1="-8" x2="12" y2="-12" stroke="#F59E0B" stroke-width="3"/>

    <!-- Simplified dancers -->
    <circle cx="-6" cy="-6" r="3" fill="#FBBF24"/>
    <path d="M -6 -3 L -6 4" stroke="#DC2626" stroke-width="3"/>

    <circle cx="6" cy="-6" r="3" fill="#FBBF24"/>
    <path d="M 6 -3 L 6 4" stroke="#DC2626" stroke-width="3"/>

    <!-- Decorative dots -->
    <circle cy="-12" r="2" fill="#F59E0B"/>
    <circle cx="-8" cy="8" r="2" fill="#EC4899"/>
    <circle cx="8" cy="8" r="2" fill="#8B5CF6"/>
  </g>

  <!-- GUJCET Badge -->
  <circle cx="100" cy="70" r="18" fill="#F59E0B"/>
  <text x="100" y="68" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="white" text-anchor="middle">GUJCET</text>
  <text x="100" y="77" font-family="Arial, sans-serif" font-size="5" fill="#FEF3C7" text-anchor="middle">Gujarat</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#FCD34D" stroke-width="2"/>

  <!-- Ashoka Chakra emblem -->
  <g transform="translate(100, 150)">
    <circle r="5" fill="#1E40AF"/>
    <circle r="4" fill="none" stroke="white" stroke-width="0.5"/>
    <circle r="1" fill="white"/>
  </g>

  <defs>
    <linearGradient id="lionBodyGradient" x1="100" y1="98" x2="100" y2="128">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
</svg>
