<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D MPPSC - Tiger theme for Madhya Pradesh (from emoji: 🐯) -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#FEF3C7" opacity="0.4"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Tiger (center) -->
  <g transform="translate(100, 115)">
    <!-- Body -->
    <ellipse cy="4" rx="26" ry="20" fill="#F59E0B"/>
    <ellipse cy="4" rx="26" ry="20" fill="url(#tigerGradient)"/>

    <!-- Stripes on body -->
    <ellipse cx="-12" cy="4" rx="3" ry="12" fill="#1E293B" opacity="0.8"/>
    <ellipse cx="-4" cy="4" rx="2" ry="10" fill="#1E293B" opacity="0.8"/>
    <ellipse cx="4" cy="4" rx="2" ry="10" fill="#1E293B" opacity="0.8"/>
    <ellipse cx="12" cy="4" rx="3" ry="12" fill="#1E293B" opacity="0.8"/>

    <!-- Head -->
    <circle cy="-16" r="18" fill="#F59E0B"/>

    <!-- Face marking - white -->
    <ellipse cy="-14" rx="14" ry="12" fill="white"/>

    <!-- Ears -->
    <ellipse cx="-12" cy="-22" rx="6" ry="8" fill="#F59E0B"/>
    <ellipse cx="-12" cy="-22" rx="4" ry="6" fill="white"/>
    <ellipse cx="12" cy="-22" rx="6" ry="8" fill="#F59E0B"/>
    <ellipse cx="12" cy="-22" rx="4" ry="6" fill="white"/>

    <!-- Stripes on face -->
    <ellipse cx="-8" cy="-18" rx="1.5" ry="6" fill="#1E293B" transform="rotate(-20 92 99)"/>
    <ellipse cx="8" cy="-18" rx="1.5" ry="6" fill="#1E293B" transform="rotate(20 108 99)"/>

    <!-- Eyes -->
    <circle cx="-6" cy="-18" r="3" fill="#1E293B"/>
    <circle cx="6" cy="-18" r="3" fill="#1E293B"/>
    <circle cx="-5" cy="-19" r="1" fill="white"/>
    <circle cx="7" cy="-19" r="1" fill="white"/>

    <!-- Nose -->
    <path d="M -3 -12 L 0 -10 L 3 -12 Q 3 -14 0 -14 Q -3 -14 -3 -12" fill="#1E293B"/>

    <!-- Whiskers -->
    <line x1="-14" y1="-14" x2="-20" y2="-16" stroke="#1E293B" stroke-width="1.5"/>
    <line x1="-14" y1="-12" x2="-20" y2="-12" stroke="#1E293B" stroke-width="1.5"/>
    <line x1="-14" y1="-10" x2="-20" y2="-8" stroke="#1E293B" stroke-width="1.5"/>
    <line x1="14" y1="-14" x2="20" y2="-16" stroke="#1E293B" stroke-width="1.5"/>
    <line x1="14" y1="-12" x2="20" y2="-12" stroke="#1E293B" stroke-width="1.5"/>
    <line x1="14" y1="-10" x2="20" y2="-8" stroke="#1E293B" stroke-width="1.5"/>

    <!-- Legs -->
    <rect x="-20" y="18" width="6" height="14" rx="2" fill="#F59E0B"/>
    <ellipse cx="-17" cy="18" rx="2" ry="1" fill="#1E293B"/>
    <rect x="-6" y="18" width="6" height="14" rx="2" fill="#F59E0B"/>
    <ellipse cx="-3" cy="18" rx="2" ry="1" fill="#1E293B"/>
    <rect x="4" y="18" width="6" height="14" rx="2" fill="#FCD34D"/>
    <ellipse cx="7" cy="18" rx="2" ry="1" fill="#1E293B"/>
    <rect x="18" y="18" width="6" height="14" rx="2" fill="#FCD34D"/>
    <ellipse cx="21" cy="18" rx="2" ry="1" fill="#1E293B"/>

    <!-- Paws -->
    <ellipse cx="-17" cy="32" rx="4" ry="2" fill="#D97706"/>
    <ellipse cx="-3" cy="32" rx="4" ry="2" fill="#D97706"/>
    <ellipse cx="7" cy="32" rx="4" ry="2" fill="#D97706"/>
    <ellipse cx="21" cy="32" rx="4" ry="2" fill="#D97706"/>

    <!-- Tail -->
    <path d="M 26 6 Q 32 4 36 8 Q 38 12 36 16" stroke="#F59E0B" stroke-width="6" fill="none"/>
    <ellipse cx="36" cy="18" rx="3" ry="5" fill="#1E293B" opacity="0.8"/>
  </g>

  <!-- Forest/jungle -->
  <g transform="translate(55, 95)">
    <rect x="-4" y="-12" width="8" height="20" fill="#92400E"/>

    <!-- Leaves -->
    <circle cx="-8" cy="-14" r="6" fill="#059669"/>
    <circle cy="-16" r="6" fill="#10B981"/>
    <circle cx="8" cy="-14" r="6" fill="#059669"/>
  </g>

  <!-- Khajuraho temple -->
  <g transform="translate(145, 95)">
    <rect x="-10" y="-8" width="20" height="16" rx="2" fill="#D97706"/>

    <!-- Temple spire -->
    <path d="M -8 -8 L 0 -18 L 8 -8 Z" fill="#F59E0B"/>
    <circle cy="-18" r="2" fill="#FCD34D"/>

    <!-- Windows -->
    <rect x="-6" y="-2" width="4" height="5" rx="0.5" fill="#FEF3C7"/>
    <rect x="2" y="-2" width="4" height="5" rx="0.5" fill="#FEF3C7"/>
  </g>

  <!-- PSC emblem -->
  <g transform="translate(55, 140)">
    <circle r="14" fill="#1E40AF"/>
    <circle r="12" fill="white"/>
    <text y="2" font-family="Arial, sans-serif" font-size="5" font-weight="bold" fill="#1E40AF" text-anchor="middle">MPPSC</text>
    <circle r="10" fill="none" stroke="#1E40AF" stroke-width="1.5"/>
  </g>

  <!-- Sanchi Stupa -->
  <g transform="translate(145, 140)">
    <ellipse cy="8" rx="16" ry="4" fill="#D97706"/>
    <ellipse cy="-4" rx="14" ry="12" fill="#F59E0B"/>

    <!-- Top -->
    <rect x="-2" y="-16" width="4" height="12" fill="#92400E"/>
    <circle cy="-16" r="3" fill="#FCD34D"/>
  </g>

  <!-- Government file -->
  <g transform="translate(55, 65)">
    <rect x="-12" y="-12" width="24" height="24" rx="2" fill="white" stroke="#94A3B8" stroke-width="2"/>

    <!-- Lines -->
    <line x1="-8" y1="-6" x2="8" y2="-6" stroke="#64748B" stroke-width="1.5"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#64748B" stroke-width="1.5"/>
    <line x1="-8" y1="6" x2="4" y2="6" stroke="#64748B" stroke-width="1.5"/>

    <!-- MP stamp -->
    <circle cx="6" cy="8" r="4" fill="#F59E0B" opacity="0.6"/>
  </g>

  <!-- Bandhavgarh Fort -->
  <g transform="translate(145, 65)">
    <rect x="-12" y="-8" width="24" height="16" rx="2" fill="#92400E"/>

    <!-- Battlements -->
    <rect x="-12" y="-12" width="4" height="4" fill="#D97706"/>
    <rect x="-4" y="-12" width="4" height="4" fill="#D97706"/>
    <rect x="4" y="-12" width="4" height="4" fill="#D97706"/>
  </g>

  <!-- MPPSC Badge -->
  <circle cx="100" cy="70" r="18" fill="#F59E0B"/>
  <text x="100" y="68" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="white" text-anchor="middle">MPPSC</text>
  <text x="100" y="77" font-family="Arial, sans-serif" font-size="5" fill="#FEF3C7" text-anchor="middle">Madhya Pradesh</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#FCD34D" stroke-width="2"/>

  <defs>
    <linearGradient id="tigerGradient" x1="100" y1="95" x2="100" y2="135">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
</svg>
