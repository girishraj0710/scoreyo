<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D NEET SS - Surgical tools theme -->
  <circle cx="100" cy="100" r="65" fill="#FEE2E2" opacity="0.4"/>
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Surgical mask -->
  <g transform="translate(100, 110)">
    <rect x="-25" y="-12" width="50" height="24" rx="6" fill="#3B82F6"/>
    <rect x="-23" y="-10" width="46" height="20" rx="5" fill="#60A5FA"/>

    <!-- Pleats -->
    <line x1="-20" y1="-6" x2="20" y2="-6" stroke="#3B82F6" stroke-width="1.5"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#3B82F6" stroke-width="1.5"/>
    <line x1="-20" y1="6" stroke="#3B82F6" stroke-width="1.5"/>

    <!-- Ear loops -->
    <path d="M -25 0 Q -30 -8 -32 -12" stroke="#60A5FA" stroke-width="3" fill="none"/>
    <path d="M 25 0 Q 30 -8 32 -12" stroke="#60A5FA" stroke-width="3" fill="none"/>
  </g>

  <!-- Scalpel -->
  <g transform="translate(70, 95)">
    <rect x="-3" y="-15" width="6" height="25" rx="1" fill="#64748B"/>
    <path d="M -2 -15 L 0 -22 L 2 -15" fill="#94A3B8"/>
  </g>

  <!-- Syringe -->
  <g transform="translate(130, 95)">
    <rect x="-3" y="-12" width="6" height="20" rx="1" fill="#DBEAFE"/>
    <rect x="-2" y="-8" width="4" height="2" fill="#3B82F6"/>
    <rect x="-1" y="8" width="2" height="4" fill="#94A3B8"/>
  </g>

  <!-- Badge -->
  <circle cx="100" cy="70" r="18" fill="#DC2626"/>
  <text x="100" y="67" font-family="Arial" font-size="7" font-weight="bold" fill="white" text-anchor="middle">NEET</text>
  <text x="100" y="76" font-family="Arial" font-size="6" fill="#FEE2E2" text-anchor="middle">SS</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#FCA5A5" stroke-width="2"/>
</svg>
