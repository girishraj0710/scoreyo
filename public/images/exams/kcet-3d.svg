<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D KCET - Mage/Wizard theme for Karnataka (from emoji: 🧙) -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#F3E8FF" opacity="0.4"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Wizard with pointed hat (center) -->
  <g transform="translate(100, 110)">
    <!-- Wizard robe body -->
    <path d="M -16 0 L -20 30 L 20 30 L 16 0 Z" fill="#7C3AED"/>
    <path d="M -16 0 L -20 30 L 20 30 L 16 0 Z" fill="url(#robeGradient)"/>

    <!-- Arms -->
    <path d="M -16 8 L -26 20 L -22 22 L -14 12 Z" fill="#6D28D9"/>
    <path d="M 16 8 L 26 20 L 22 22 L 14 12 Z" fill="#6D28D9"/>

    <!-- Magic wand in hand -->
    <line x1="22" y1="22" x2="32" y2="28" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
    <circle cx="32" cy="28" r="4" fill="#FDE047"/>

    <!-- Sparkles from wand -->
    <circle cx="35" cy="24" r="2" fill="#FDE047"/>
    <circle cx="30" cy="32" r="1.5" fill="#FDE047"/>
    <circle cx="36" cy="30" r="1.5" fill="#FDE047"/>

    <!-- Wizard hat -->
    <path d="M -14 0 L 0 -32 L 14 0 Z" fill="#5B21B6"/>
    <ellipse cy="0" rx="14" ry="4" fill="#6D28D9"/>

    <!-- Moon and stars on hat -->
    <circle cx="-2" cy="-18" r="3" fill="#FCD34D" opacity="0.9"/>
    <circle cx="-1" cy="-18" r="2.5" fill="#5B21B6"/>
    <text x="4" y="-12" font-size="6" fill="#FCD34D">★</text>
    <text x="2" y="-24" font-size="5" fill="#FCD34D">★</text>

    <!-- Face -->
    <circle cy="-4" r="8" fill="#FBBF24"/>

    <!-- Beard -->
    <path d="M -6 0 Q -6 6 0 8 Q 6 6 6 0" fill="#E0E7FF"/>

    <!-- Eyes -->
    <circle cx="-3" cy="-5" r="1.5" fill="#1E293B"/>
    <circle cx="3" cy="-5" r="1.5" fill="#1E293B"/>

    <!-- Belt with Karnataka emblem -->
    <rect x="-12" y="14" width="24" height="4" fill="#DC2626"/>
    <circle cy="16" r="4" fill="#FCD34D"/>
    <text y="18" font-family="Arial, sans-serif" font-size="4" font-weight="bold" fill="#DC2626" text-anchor="middle">KA</text>
  </g>

  <!-- Magic spell book -->
  <g transform="translate(55, 95)">
    <rect x="-14" y="-12" width="28" height="24" rx="2" fill="#5B21B6"/>
    <rect x="-12" y="-10" width="24" height="20" rx="1" fill="#F3E8FF"/>

    <!-- Mystical text -->
    <text y="-3" font-family="Georgia, serif" font-size="6" fill="#7C3AED" text-anchor="middle">∫ Σ ∞</text>
    <text y="5" font-family="Georgia, serif" font-size="6" fill="#7C3AED" text-anchor="middle">√ π α</text>

    <!-- Mystical symbol -->
    <circle cy="-6" r="2" fill="#8B5CF6"/>
    <circle cy="8" r="2" fill="#8B5CF6"/>
  </g>

  <!-- Crystal ball -->
  <g transform="translate(145, 95)">
    <circle r="18" fill="#3B82F6"/>
    <circle r="18" fill="url(#crystalGradient)"/>

    <!-- Inner glow -->
    <circle r="14" fill="#BAE6FD" opacity="0.6"/>
    <circle cx="-6" cy="-6" r="8" fill="white" opacity="0.5"/>

    <!-- Vision inside -->
    <text y="0" font-size="12" fill="#1E40AF" text-anchor="middle">★</text>
    <text y="-8" font-size="8" fill="#60A5FA" text-anchor="middle">★</text>
    <text y="8" font-size="8" fill="#60A5FA" text-anchor="middle">★</text>

    <!-- Stand -->
    <path d="M -10 18 L -6 22 L 6 22 L 10 18 Z" fill="#6D28D9"/>
    <ellipse cy="22" rx="6" ry="2" fill="#7C3AED"/>
  </g>

  <!-- Potion bottle -->
  <g transform="translate(55, 140)">
    <rect x="-6" y="-14" width="12" height="4" rx="1" fill="#92400E"/>
    <rect x="-8" y="-10" width="16" height="20" rx="3" fill="#DBEAFE" opacity="0.8"/>

    <!-- Potion liquid -->
    <rect x="-8" y="2" width="16" height="8" rx="3" fill="#8B5CF6" opacity="0.8"/>

    <!-- Cork/stopper -->
    <ellipse cy="-14" rx="6" ry="2" fill="#D97706"/>

    <!-- Label -->
    <rect x="-6" y="-2" width="12" height="6" rx="1" fill="#FEF3C7"/>
    <text y="2.5" font-family="Arial, sans-serif" font-size="3" fill="#7C2D12" text-anchor="middle">POWER</text>

    <!-- Bubbles -->
    <circle cx="-3" cy="6" r="1.5" fill="#DDD6FE" opacity="0.7"/>
    <circle cx="3" cy="4" r="1.5" fill="#DDD6FE" opacity="0.7"/>
  </g>

  <!-- Magic portal -->
  <g transform="translate(145, 140)">
    <circle r="16" fill="#5B21B6"/>
    <circle r="16" fill="url(#portalGradient)"/>
    <circle r="12" fill="#7C3AED"/>
    <circle r="8" fill="#8B5CF6"/>
    <circle r="4" fill="#A78BFA"/>

    <!-- Swirling energy -->
    <path d="M 0 -14 Q 6 -10 8 0 Q 6 10 0 14" stroke="#DDD6FE" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M 0 -14 Q -6 -10 -8 0 Q -6 10 0 14" stroke="#DDD6FE" stroke-width="2" fill="none" opacity="0.6"/>

    <!-- Sparkles -->
    <circle cx="-10" cy="-10" r="1.5" fill="#FDE047"/>
    <circle cx="10" cy="-10" r="1.5" fill="#FDE047"/>
    <circle cx="10" cy="10" r="1.5" fill="#FDE047"/>
    <circle cx="-10" cy="10" r="1.5" fill="#FDE047"/>
  </g>

  <!-- Magic scroll -->
  <g transform="translate(55, 65)">
    <rect x="-14" y="-10" width="28" height="20" rx="2" fill="#FEF3C7"/>

    <!-- Scroll handles -->
    <rect x="-16" y="-10" width="2" height="20" fill="#92400E"/>
    <rect x="14" y="-10" width="2" height="20" fill="#92400E"/>

    <!-- Ancient writing -->
    <line x1="-10" y1="-5" x2="10" y2="-5" stroke="#7C2D12" stroke-width="1"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#7C2D12" stroke-width="1"/>
    <line x1="-10" y1="5" x2="6" y2="5" stroke="#7C2D12" stroke-width="1"/>

    <!-- Seal -->
    <circle cx="8" cy="6" r="3" fill="#DC2626"/>
    <text x="8" y="8" font-family="Arial, sans-serif" font-size="3" font-weight="bold" fill="#FEF3C7" text-anchor="middle">KA</text>
  </g>

  <!-- Shooting stars -->
  <g transform="translate(145, 65)">
    <line x1="-8" y1="-10" x2="8" y2="10" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
    <circle cx="8" cy="10" r="4" fill="#FDE047"/>
    <circle cx="6" cy="8" r="2" fill="#FCD34D"/>
    <circle cx="10" cy="12" r="2" fill="#FCD34D"/>

    <line x1="-12" y1="4" x2="4" y2="-8" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="4" cy="-8" r="3" fill="#C4B5FD"/>
    <circle cx="2" cy="-6" r="1.5" fill="#A78BFA"/>

    <!-- Sparkle effects -->
    <text x="-4" y="0" font-size="8" fill="#FCD34D">★</text>
    <text x="0" y="-4" font-size="6" fill="#A78BFA">★</text>
  </g>

  <!-- KCET Badge -->
  <circle cx="100" cy="70" r="18" fill="#7C3AED"/>
  <text x="100" y="72" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">KCET</text>
  <text x="100" y="80" font-family="Arial, sans-serif" font-size="5" fill="#E9D5FF" text-anchor="middle">Karnataka</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#C4B5FD" stroke-width="2"/>

  <defs>
    <linearGradient id="robeGradient" x1="100" y1="110" x2="100" y2="140">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#5B21B6" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="crystalGradient" x1="145" y1="77" x2="145" y2="113">
      <stop offset="0%" stop-color="#DBEAFE" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0369A1" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="portalGradient" x1="145" y1="124" x2="145" y2="156">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#5B21B6" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
</svg>
