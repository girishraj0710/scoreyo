<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D TS EAMCET - Mosque/Islamic Architecture theme for Telangana (from emoji: 🕌) -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#FAF5FF" opacity="0.4"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Mosque (center) -->
  <g transform="translate(100, 120)">
    <!-- Main dome -->
    <ellipse cy="-10" rx="22" ry="18" fill="#8B5CF6"/>
    <ellipse cy="-10" rx="22" ry="18" fill="url(#domeGradient)"/>
    <ellipse cy="-10" rx="18" ry="14" fill="#A78BFA" opacity="0.6"/>

    <!-- Crescent on top -->
    <circle cy="-28" r="5" fill="#FCD34D"/>
    <circle cx="2" cy="-28" r="4" fill="#8B5CF6"/>

    <!-- Main building -->
    <rect x="-24" y="-8" width="48" height="28" rx="3" fill="#E0E7FF"/>
    <rect x="-22" y="-6" width="44" height="24" fill="#C4B5FD" opacity="0.8"/>

    <!-- Central archway -->
    <path d="M -12 10 Q -12 0 0 -2 Q 12 0 12 10 L 12 20 L -12 20 Z" fill="#7C3AED"/>
    <path d="M -10 10 Q -10 2 0 0 Q 10 2 10 10 L 10 18 L -10 18 Z" fill="#5B21B6"/>

    <!-- Side windows (arched) -->
    <path d="M -20 6 Q -20 0 -16 -2 Q -12 0 -12 6 L -12 12 L -20 12 Z" fill="#DDD6FE"/>
    <path d="M 12 6 Q 12 0 16 -2 Q 20 0 20 6 L 20 12 L 12 12 Z" fill="#DDD6FE"/>

    <!-- Geometric patterns -->
    <circle cx="-16" cy="14" r="2" fill="#8B5CF6"/>
    <circle cx="16" cy="14" r="2" fill="#8B5CF6"/>
  </g>

  <!-- Minaret left -->
  <g transform="translate(55, 110)">
    <rect x="-4" y="-20" width="8" height="40" fill="#A78BFA"/>
    <rect x="-4" y="-20" width="8" height="40" fill="url(#minaretGradient)"/>

    <!-- Top dome -->
    <ellipse cy="-20" rx="6" ry="8" fill="#7C3AED"/>

    <!-- Crescent -->
    <circle cy="-28" r="3" fill="#FCD34D"/>
    <circle cx="1.5" cy="-28" r="2.5" fill="#7C3AED"/>

    <!-- Balcony -->
    <rect x="-6" y="2" width="12" height="3" fill="#8B5CF6"/>
    <rect x="-5" y="0" width="10" height="2" fill="#C4B5FD"/>

    <!-- Base -->
    <rect x="-6" y="20" width="12" height="4" fill="#6D28D9"/>
  </g>

  <!-- Minaret right -->
  <g transform="translate(145, 110)">
    <rect x="-4" y="-20" width="8" height="40" fill="#A78BFA"/>
    <rect x="-4" y="-20" width="8" height="40" fill="url(#minaretGradient)"/>

    <!-- Top dome -->
    <ellipse cy="-20" rx="6" ry="8" fill="#7C3AED"/>

    <!-- Crescent -->
    <circle cy="-28" r="3" fill="#FCD34D"/>
    <circle cx="1.5" cy="-28" r="2.5" fill="#7C3AED"/>

    <!-- Balcony -->
    <rect x="-6" y="2" width="12" height="3" fill="#8B5CF6"/>
    <rect x="-5" y="0" width="10" height="2" fill="#C4B5FD"/>

    <!-- Base -->
    <rect x="-6" y="20" width="12" height="4" fill="#6D28D9"/>
  </g>

  <!-- Islamic geometric pattern tile -->
  <g transform="translate(55, 65)">
    <rect x="-16" y="-16" width="32" height="32" rx="3" fill="#8B5CF6"/>

    <!-- Star pattern -->
    <circle r="12" fill="#C4B5FD"/>
    <text y="6" font-size="18" fill="#7C3AED" text-anchor="middle">✦</text>

    <!-- Corner decorations -->
    <circle cx="-10" cy="-10" r="3" fill="#FCD34D"/>
    <circle cx="10" cy="-10" r="3" fill="#FCD34D"/>
    <circle cx="-10" cy="10" r="3" fill="#FCD34D"/>
    <circle cx="10" cy="10" r="3" fill="#FCD34D"/>
  </g>

  <!-- Prayer mat/carpet -->
  <g transform="translate(145, 65)">
    <rect x="-14" y="-16" width="28" height="32" rx="2" fill="#DC2626"/>

    <!-- Arch design -->
    <path d="M -8 8 Q -8 -4 0 -8 Q 8 -4 8 8 L 8 12 L -8 12 Z" fill="#FCD34D"/>

    <!-- Geometric border -->
    <rect x="-12" y="-14" width="24" height="2" fill="#F59E0B"/>
    <rect x="-12" y="12" width="24" height="2" fill="#F59E0B"/>

    <!-- Pattern dots -->
    <circle cx="-8" cy="0" r="1.5" fill="#FCD34D"/>
    <circle cx="8" cy="0" r="1.5" fill="#FCD34D"/>
  </g>

  <!-- Lantern -->
  <g transform="translate(55, 145)">
    <rect x="-6" y="-10" width="12" height="20" rx="2" fill="#FBBF24" opacity="0.3"/>
    <rect x="-5" y="-8" width="10" height="16" fill="#FDE047" opacity="0.5"/>

    <!-- Top cap -->
    <path d="M -6 -10 L 0 -16 L 6 -10 Z" fill="#92400E"/>
    <circle cy="-16" r="2" fill="#D97706"/>

    <!-- Bottom -->
    <ellipse cy="10" rx="6" ry="2" fill="#D97706"/>

    <!-- Glow -->
    <circle cy="0" r="6" fill="#FDE047" opacity="0.7"/>

    <!-- Flame -->
    <ellipse cy="-2" rx="2" ry="4" fill="#F59E0B"/>
  </g>

  <!-- Book (Quran) -->
  <g transform="translate(145, 145)">
    <rect x="-14" y="-10" width="28" height="20" rx="2" fill="#10B981"/>
    <rect x="-12" y="-8" width="24" height="16" rx="1" fill="#D1FAE5"/>

    <!-- Arabic-style text -->
    <path d="M -8 -4 Q -4 -6 0 -4 Q 4 -6 8 -4" stroke="#059669" stroke-width="1.5" fill="none"/>
    <path d="M -8 0 Q -4 -2 0 0 Q 4 -2 8 0" stroke="#059669" stroke-width="1.5" fill="none"/>
    <path d="M -8 4 Q -4 2 0 4 Q 4 2 8 4" stroke="#059669" stroke-width="1.5" fill="none"/>

    <!-- Bookmark -->
    <rect x="-2" y="-10" width="4" height="14" fill="#DC2626"/>

    <!-- Decorative border -->
    <rect x="-11" y="-7" width="22" height="1" fill="#10B981"/>
    <rect x="-11" y="6" width="22" height="1" fill="#10B981"/>
  </g>

  <!-- Islamic calligraphy frame -->
  <g transform="translate(100, 70)">
    <circle r="18" fill="#7C3AED"/>
    <circle r="16" fill="#E0E7FF"/>

    <!-- Stylized text -->
    <text y="-2" font-family="Georgia, serif" font-size="8" font-weight="bold" fill="#5B21B6" text-anchor="middle">TS</text>
    <text y="8" font-family="Georgia, serif" font-size="6" fill="#8B5CF6" text-anchor="middle">EAMCET</text>

    <!-- Decorative border -->
    <circle r="14" fill="none" stroke="#A78BFA" stroke-width="2"/>
  </g>

  <!-- Telangana emblem elements -->
  <rect x="75" y="148" width="50" height="7" rx="2" fill="#F59E0B"/>
  <text x="100" y="153.5" font-family="Arial, sans-serif" font-size="5" font-weight="bold" fill="white" text-anchor="middle">TELANGANA</text>

  <defs>
    <linearGradient id="domeGradient" x1="100" y1="102" x2="100" y2="128">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="minaretGradient" x1="0" y1="-20" x2="0" y2="20">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
</svg>
