<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D Nursing - Clipboard with heart -->
  <circle cx="100" cy="100" r="65" fill="#FEE2E2" opacity="0.4"/>
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Clipboard -->
  <g transform="translate(100, 110)">
    <rect x="-20" y="-25" width="40" height="50" rx="3" fill="#F59E0B"/>
    <rect x="-18" y="-23" width="36" height="46" rx="2" fill="white"/>

    <!-- Clip -->
    <rect x="-8" y="-28" width="16" height="6" rx="2" fill="#94A3B8"/>

    <!-- Heart symbol -->
    <path d="M 0 -8 Q -6 -14 -12 -8 Q -14 -4 -12 2 L 0 12 L 12 2 Q 14 -4 12 -8 Q 6 -14 0 -8" fill="#DC2626"/>

    <!-- Pulse line -->
    <path d="M -14 8 L -10 8 L -8 2 L -4 14 L 0 8 L 14 8" stroke="#10B981" stroke-width="2" fill="none"/>
  </g>

  <!-- Badge -->
  <circle cx="100" cy="65" r="18" fill="#DC2626"/>
  <text x="100" y="70" font-family="Arial" font-size="8" font-weight="bold" fill="white" text-anchor="middle">RN</text>
  <circle cx="100" cy="65" r="15" fill="none" stroke="#FCA5A5" stroke-width="2"/>
</svg>
