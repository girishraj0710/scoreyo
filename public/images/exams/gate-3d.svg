<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D GATE illustration with chip, circuit, and engineering elements -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#E0E7FF" opacity="0.4"/>

  <!-- Microchip shadow -->
  <ellipse cx="100" cy="155" rx="48" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Main microchip -->
  <rect x="75" y="95" width="50" height="50" rx="4" fill="#6366F1"/>
  <rect x="75" y="95" width="50" height="50" rx="4" fill="url(#chipGradient)"/>

  <!-- Chip pins (left) -->
  <rect x="68" y="100" width="7" height="3" fill="#C7D2FE"/>
  <rect x="68" y="110" width="7" height="3" fill="#C7D2FE"/>
  <rect x="68" y="120" width="7" height="3" fill="#C7D2FE"/>
  <rect x="68" y="130" width="7" height="3" fill="#C7D2FE"/>
  <rect x="68" y="140" width="7" height="3" fill="#C7D2FE"/>

  <!-- Chip pins (right) -->
  <rect x="125" y="100" width="7" height="3" fill="#C7D2FE"/>
  <rect x="125" y="110" width="7" height="3" fill="#C7D2FE"/>
  <rect x="125" y="120" width="7" height="3" fill="#C7D2FE"/>
  <rect x="125" y="130" width="7" height="3" fill="#C7D2FE"/>
  <rect x="125" y="140" width="7" height="3" fill="#C7D2FE"/>

  <!-- Chip center -->
  <rect x="85" y="105" width="30" height="30" rx="2" fill="#312E81"/>
  <rect x="88" y="108" width="24" height="24" rx="1" fill="#4F46E5"/>

  <!-- Circuit lines on chip -->
  <line x1="92" y1="115" x2="108" y2="115" stroke="#C7D2FE" stroke-width="1.5"/>
  <line x1="92" y1="120" x2="108" y2="120" stroke="#C7D2FE" stroke-width="1.5"/>
  <line x1="92" y1="125" x2="108" y2="125" stroke="#C7D2FE" stroke-width="1.5"/>
  <circle cx="95" cy="115" r="1.5" fill="#C7D2FE"/>
  <circle cx="105" cy="120" r="1.5" fill="#C7D2FE"/>

  <!-- Gear -->
  <circle cx="145" cy="85" r="22" fill="#F59E0B"/>
  <circle cx="145" cy="85" r="22" fill="url(#gearGradient)"/>
  <circle cx="145" cy="85" r="10" fill="#92400E"/>
  <circle cx="145" cy="85" r="5" fill="#78350F"/>

  <!-- Gear teeth -->
  <rect x="143" y="63" width="4" height="8" fill="#F59E0B"/>
  <rect x="143" y="99" width="4" height="8" fill="#F59E0B"/>
  <rect x="161" y="83" width="8" height="4" fill="#F59E0B"/>
  <rect x="125" y="83" width="8" height="4" fill="#F59E0B"/>

  <!-- Circuit board -->
  <circle cx="55" cy="85" r="20" fill="#10B981"/>
  <line x1="45" y1="80" x2="65" y2="80" stroke="#D1FAE5" stroke-width="2"/>
  <line x1="45" y1="90" x2="65" y2="90" stroke="#D1FAE5" stroke-width="2"/>
  <line x1="50" y1="75" x2="50" y2="95" stroke="#D1FAE5" stroke-width="2"/>
  <line x1="60" y1="75" x2="60" y2="95" stroke="#D1FAE5" stroke-width="2"/>
  <circle cx="50" cy="80" r="2" fill="#D1FAE5"/>
  <circle cx="60" cy="90" r="2" fill="#D1FAE5"/>

  <!-- Binary code -->
  <rect x="135" y="120" width="35" height="30" rx="3" fill="#1E293B"/>
  <text x="137" y="132" font-family="Courier, monospace" font-size="7" fill="#10B981">1010</text>
  <text x="137" y="140" font-family="Courier, monospace" font-size="7" fill="#10B981">1101</text>
  <text x="137" y="148" font-family="Courier, monospace" font-size="7" fill="#10B981">0110</text>

  <!-- Engineering ruler/compass -->
  <g transform="translate(50, 130)">
    <circle r="16" fill="#EC4899"/>
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#FCE7F3" stroke-width="2"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#FCE7F3" stroke-width="2"/>
    <circle r="3" fill="#FCE7F3"/>
  </g>

  <defs>
    <linearGradient id="chipGradient" x1="100" y1="95" x2="100" y2="145">
      <stop offset="0%" stop-color="#A5B4FC" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4338CA" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="gearGradient" x1="145" y1="63" x2="145" y2="107">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#B45309" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
</svg>
