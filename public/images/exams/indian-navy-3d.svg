<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D Indian Navy - Ship theme -->
  <circle cx="100" cy="100" r="65" fill="#DBEAFE" opacity="0.4"/>
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Ship -->
  <g transform="translate(100, 120)">
    <!-- Hull -->
    <path d="M -30 0 L -25 15 L 25 15 L 30 0 Z" fill="#64748B"/>
    <rect x="-25" y="-15" width="50" height="15" rx="2" fill="#94A3B8"/>

    <!-- Windows -->
    <rect x="-18" y="-8" width="8" height="6" rx="1" fill="#3B82F6" opacity="0.6"/>
    <rect x="-6" y="-8" width="8" height="6" rx="1" fill="#3B82F6" opacity="0.6"/>
    <rect x="6" y="-8" width="8" height="6" rx="1" fill="#3B82F6" opacity="0.6"/>

    <!-- Mast -->
    <rect x="-2" y="-30" width="4" height="15" fill="#475569"/>

    <!-- Flag -->
    <rect x="2" y="-28" width="12" height="8" fill="#F59E0B"/>

    <!-- Water -->
    <path d="M -35 15 Q -30 18 -20 15 Q -10 12 0 15 Q 10 18 20 15 Q 30 12 35 15" stroke="#0369A1" stroke-width="2" fill="none"/>
  </g>

  <!-- Badge -->
  <circle cx="100" cy="70" r="18" fill="#0369A1"/>
  <text x="100" y="70" font-family="Arial" font-size="7" font-weight="bold" fill="white" text-anchor="middle">NAVY</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#7DD3FC" stroke-width="2"/>
</svg>
