<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D NEET illustration with stethoscope, heart, and medical cross -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#D1FAE5" opacity="0.4"/>

  <!-- Stethoscope shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Stethoscope chest piece -->
  <circle cx="100" cy="130" r="20" fill="#10B981"/>
  <circle cx="100" cy="130" r="20" fill="url(#stethoGradient)"/>
  <circle cx="100" cy="130" r="12" fill="#047857"/>
  <circle cx="100" cy="130" r="8" fill="#064E3B"/>

  <!-- Stethoscope tube -->
  <path d="M 100 110 Q 85 90 80 70" stroke="#10B981" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 100 110 Q 115 90 120 70" stroke="#10B981" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Earpieces -->
  <circle cx="80" cy="70" r="8" fill="#047857"/>
  <circle cx="120" cy="70" r="8" fill="#047857"/>

  <!-- Heart with pulse -->
  <circle cx="145" cy="90" r="22" fill="#EF4444"/>
  <circle cx="145" cy="90" r="22" fill="url(#heartGradient)"/>
  <path d="M 145 100 L 140 92 L 145 94 L 150 88 L 155 96" stroke="#FEE2E2" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Medical cross -->
  <circle cx="55" cy="90" r="18" fill="#3B82F6"/>
  <rect x="51" y="80" width="8" height="20" rx="2" fill="white"/>
  <rect x="45" y="86" width="20" height="8" rx="2" fill="white"/>

  <!-- DNA helix -->
  <g transform="translate(140, 130)">
    <circle r="16" fill="#8B5CF6"/>
    <path d="M -8 -10 Q 0 -8 8 -10 M -8 0 Q 0 2 8 0 M -8 10 Q 0 8 8 10" stroke="#F3E8FF" stroke-width="2" fill="none"/>
    <circle cx="-8" cy="-10" r="2" fill="#F3E8FF"/>
    <circle cx="8" cy="-10" r="2" fill="#F3E8FF"/>
    <circle cx="-8" cy="10" r="2" fill="#F3E8FF"/>
    <circle cx="8" cy="10" r="2" fill="#F3E8FF"/>
  </g>

  <!-- Medical book -->
  <rect x="40" y="125" width="30" height="35" rx="3" fill="#F59E0B"/>
  <rect x="40" y="125" width="30" height="35" rx="3" fill="url(#bookGradient)"/>
  <rect x="43" y="130" width="24" height="3" rx="1" fill="#FEF3C7"/>
  <rect x="43" y="137" width="24" height="3" rx="1" fill="#FEF3C7"/>
  <rect x="43" y="144" width="18" height="3" rx="1" fill="#FEF3C7"/>

  <defs>
    <linearGradient id="stethoGradient" x1="100" y1="110" x2="100" y2="150">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#047857" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="heartGradient" x1="145" y1="68" x2="145" y2="112">
      <stop offset="0%" stop-color="#FCA5A5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#B91C1C" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="bookGradient" x1="55" y1="125" x2="55" y2="160">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
</svg>
