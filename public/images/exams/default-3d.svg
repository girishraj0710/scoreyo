<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D Default exam illustration with book, graduation cap, and trophy -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#E0E7FF" opacity="0.4"/>

  <!-- Book shadow -->
  <ellipse cx="100" cy="155" rx="48" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Open book -->
  <path d="M50 125 L50 85 C50 80 53 75 58 75 L100 80 L142 75 C147 75 150 80 150 85 L150 125 L100 130 Z"
        fill="#6366F1"/>
  <path d="M50 125 L50 85 C50 80 53 75 58 75 L100 80 L142 75 C147 75 150 80 150 85 L150 125 L100 130 Z"
        fill="url(#bookGradient)"/>

  <!-- Book pages (left) -->
  <path d="M53 87 L98 91 L98 127 L53 123 Z" fill="#E0E7FF"/>
  <line x1="60" y1="95" x2="91" y2="97" stroke="#6366F1" stroke-width="1.5" opacity="0.5"/>
  <line x1="60" y1="100" x2="91" y2="102" stroke="#6366F1" stroke-width="1.5" opacity="0.5"/>
  <line x1="60" y1="105" x2="91" y2="107" stroke="#6366F1" stroke-width="1.5" opacity="0.5"/>
  <line x1="60" y1="110" x2="91" y2="112" stroke="#6366F1" stroke-width="1.5" opacity="0.5"/>

  <!-- Book pages (right) -->
  <path d="M102 91 L147 87 L147 123 L102 127 Z" fill="#E0E7FF"/>
  <line x1="109" y1="97" x2="140" y2="95" stroke="#6366F1" stroke-width="1.5" opacity="0.5"/>
  <line x1="109" y1="102" x2="140" y2="100" stroke="#6366F1" stroke-width="1.5" opacity="0.5"/>
  <line x1="109" y1="107" x2="140" y2="105" stroke="#6366F1" stroke-width="1.5" opacity="0.5"/>
  <line x1="109" y1="112" x2="140" y2="110" stroke="#6366F1" stroke-width="1.5" opacity="0.5"/>

  <!-- Book spine -->
  <rect x="98" y="80" width="4" height="50" fill="#4338CA"/>

  <!-- Graduation cap -->
  <g transform="translate(100, 65)">
    <!-- Cap board -->
    <path d="M -30 0 L 0 -10 L 30 0 L 0 10 Z" fill="#1E293B"/>
    <path d="M -30 0 L 0 -10 L 30 0 L 0 10 Z" fill="url(#capGradient)"/>
    <!-- Cap top -->
    <circle r="8" fill="#475569"/>
    <!-- Tassel -->
    <rect x="-2" y="-8" width="4" height="15" fill="#FBBF24"/>
    <circle cy="7" r="4" fill="#F59E0B"/>
  </g>

  <!-- Trophy -->
  <g transform="translate(145, 95)">
    <circle r="18" fill="#FBBF24"/>
    <circle r="18" fill="url(#trophyGradient)"/>
    <!-- Cup -->
    <path d="M -8 -5 L -10 5 L -8 10 L 8 10 L 10 5 L 8 -5 Z" fill="#FCD34D"/>
    <!-- Handles -->
    <path d="M -8 -2 Q -14 0 -14 5 Q -14 8 -10 8" stroke="#FEF3C7" stroke-width="2" fill="none"/>
    <path d="M 8 -2 Q 14 0 14 5 Q 14 8 10 8" stroke="#FEF3C7" stroke-width="2" fill="none"/>
    <!-- Base -->
    <rect x="-5" y="10" width="10" height="4" fill="#F59E0B"/>
    <rect x="-7" y="14" width="14" height="2" fill="#D97706"/>
    <!-- Star -->
    <text y="-8" font-size="10" fill="#FEF3C7" text-anchor="middle">★</text>
  </g>

  <!-- Pencil -->
  <g transform="translate(55, 95) rotate(-25)">
    <rect x="-4" y="-25" width="8" height="40" rx="2" fill="#F59E0B"/>
    <rect x="-4" y="-25" width="8" height="35" rx="2" fill="#FBBF24"/>
    <!-- Pencil tip -->
    <path d="M -4 15 L 0 20 L 4 15 Z" fill="#78350F"/>
    <!-- Eraser -->
    <rect x="-4" y="-25" width="8" height="5" rx="1" fill="#EC4899"/>
    <!-- Metal band -->
    <rect x="-4" y="-20" width="8" height="2" fill="#94A3B8"/>
  </g>

  <!-- Light bulb (idea) -->
  <g transform="translate(145, 135)">
    <circle r="12" fill="#FDE047"/>
    <circle r="12" fill="url(#bulbGradient)"/>
    <!-- Base -->
    <rect x="-5" y="10" width="10" height="4" rx="1" fill="#94A3B8"/>
    <rect x="-3" y="14" width="6" height="2" rx="1" fill="#64748B"/>
    <!-- Shine -->
    <circle cx="-4" cy="-4" r="3" fill="white" opacity="0.6"/>
  </g>

  <defs>
    <linearGradient id="bookGradient" x1="100" y1="75" x2="100" y2="130">
      <stop offset="0%" stop-color="#C7D2FE" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4338CA" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="capGradient" x1="0" y1="-10" x2="0" y2="10">
      <stop offset="0%" stop-color="#64748B" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="trophyGradient" x1="0" y1="-18" x2="0" y2="18">
      <stop offset="0%" stop-color="#FDE047" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#CA8A04" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="bulbGradient" x1="0" y1="-12" x2="0" y2="12">
      <stop offset="0%" stop-color="#FEF9C3" stop-opacity="1"/>
      <stop offset="100%" stop-color="#EAB308" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
</svg>
