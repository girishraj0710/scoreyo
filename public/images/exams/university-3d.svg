<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D University entrance illustration with university building, graduation cap, books -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#F3E8FF" opacity="0.4"/>

  <!-- Building shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- University building -->
  <rect x="75" y="95" width="50" height="50" rx="4" fill="#8B5CF6"/>
  <rect x="75" y="95" width="50" height="50" rx="4" fill="url(#buildingGradient)"/>

  <!-- Columns -->
  <rect x="80" y="105" width="6" height="40" rx="1" fill="#F3E8FF" opacity="0.9"/>
  <rect x="97" y="105" width="6" height="40" rx="1" fill="#F3E8FF" opacity="0.9"/>
  <rect x="114" y="105" width="6" height="40" rx="1" fill="#F3E8FF" opacity="0.9"/>

  <!-- Entrance -->
  <rect x="92" y="125" width="16" height="20" rx="2" fill="#6B21A8"/>

  <!-- Roof/Pediment -->
  <path d="M 70 95 L 100 75 L 130 95 Z" fill="#7C3AED"/>
  <path d="M 73 95 L 100 78 L 127 95 Z" fill="#A78BFA"/>

  <!-- Clock tower -->
  <rect x="96" y="75" width="8" height="20" fill="#7C3AED"/>
  <circle cx="100" cy="75" r="6" fill="#F3E8FF"/>
  <circle cx="100" cy="75" r="5" fill="white"/>
  <line x1="100" y1="75" x2="100" y2="72" stroke="#7C3AED" stroke-width="1.5"/>
  <line x1="100" y1="75" x2="102" y2="75" stroke="#7C3AED" stroke-width="1.5"/>

  <!-- CUET Badge -->
  <circle cx="145" cy="85" r="20" fill="#3B82F6"/>
  <circle cx="145" cy="85" r="20" fill="url(#cuetGradient)"/>
  <text x="145" y="88" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">CUET</text>
  <circle cx="145" cy="85" r="16" fill="none" stroke="#DBEAFE" stroke-width="2"/>

  <!-- Graduation caps -->
  <g transform="translate(55, 90)">
    <!-- Cap board -->
    <path d="M -18 0 L 0 -7 L 18 0 L 0 7 Z" fill="#1E293B"/>
    <path d="M -18 0 L 0 -7 L 18 0 L 0 7 Z" fill="url(#capGradient)"/>
    <!-- Cap top -->
    <circle r="5" fill="#475569"/>
    <!-- Tassel -->
    <rect x="-1.5" y="-5" width="3" height="10" fill="#FBBF24"/>
    <circle cy="5" r="2.5" fill="#F59E0B"/>
  </g>

  <!-- Books stack -->
  <g transform="translate(55, 135)">
    <rect x="-15" y="8" width="30" height="8" rx="2" fill="#DC2626"/>
    <rect x="-15" y="0" width="30" height="8" rx="2" fill="#3B82F6"/>
    <rect x="-15" y="-8" width="30" height="8" rx="2" fill="#10B981"/>

    <text x="0" y="14" font-family="Arial, sans-serif" font-size="5" font-weight="bold" fill="white" text-anchor="middle">SCIENCE</text>
    <text x="0" y="6" font-family="Arial, sans-serif" font-size="5" font-weight="bold" fill="white" text-anchor="middle">MATH</text>
    <text x="0" y="-2" font-family="Arial, sans-serif" font-size="5" font-weight="bold" fill="white" text-anchor="middle">ENGLISH</text>
  </g>

  <!-- Scroll/Certificate -->
  <g transform="translate(145, 135)">
    <rect x="-16" y="-10" width="32" height="20" rx="2" fill="#FEF3C7"/>
    <rect x="-14" y="-8" width="28" height="16" rx="1" fill="white"/>

    <!-- Seal/stamp -->
    <circle cy="0" r="6" fill="#DC2626"/>
    <circle cy="0" r="4" fill="#FCA5A5"/>

    <!-- Ribbon -->
    <rect x="-2" y="6" width="4" height="8" fill="#DC2626"/>
  </g>

  <!-- Pen -->
  <g transform="translate(40, 125) rotate(-25)">
    <rect x="-2" y="-15" width="4" height="25" fill="#3B82F6"/>
    <rect x="-2" y="-15" width="4" height="22" fill="#60A5FA"/>
    <path d="M -2 10 L 0 13 L 2 10 Z" fill="#1E293B"/>
    <rect x="-2" y="-18" width="4" height="3" fill="#94A3B8"/>
  </g>

  <!-- Light bulb (knowledge) -->
  <circle cx="145" cy="125" r="12" fill="#FDE047"/>
  <circle cx="145" cy="125" r="12" fill="url(#bulbGradient)"/>
  <rect x="142" y="135" width="6" height="4" rx="1" fill="#94A3B8"/>
  <rect x="143" y="139" width="4" height="2" rx="1" fill="#64748B"/>
  <circle cx="141" cy="121" r="3" fill="white" opacity="0.6"/>

  <!-- Trophy -->
  <g transform="translate(40, 95)">
    <circle r="14" fill="#FBBF24"/>
    <path d="M -6 -3 L -8 4 L -6 8 L 6 8 L 8 4 L 6 -3 Z" fill="#FCD34D"/>
    <path d="M -6 -1 Q -10 0 -10 4 Q -10 6 -8 6" stroke="#FEF3C7" stroke-width="1.5" fill="none"/>
    <path d="M 6 -1 Q 10 0 10 4 Q 10 6 8 6" stroke="#FEF3C7" stroke-width="1.5" fill="none"/>
    <rect x="-4" y="8" width="8" height="3" fill="#F59E0B"/>
    <rect x="-5" y="11" width="10" height="2" fill="#D97706"/>
    <text y="-6" font-size="8" fill="#FEF3C7" text-anchor="middle">★</text>
  </g>

  <defs>
    <linearGradient id="buildingGradient" x1="100" y1="95" x2="100" y2="145">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="cuetGradient" x1="145" y1="65" x2="145" y2="105">
      <stop offset="0%" stop-color="#93C5FD" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1E40AF" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="capGradient" x1="0" y1="-7" x2="0" y2="7">
      <stop offset="0%" stop-color="#64748B" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="bulbGradient" x1="145" y1="113" x2="145" y2="137">
      <stop offset="0%" stop-color="#FEF9C3" stop-opacity="1"/>
      <stop offset="100%" stop-color="#EAB308" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
</svg>
