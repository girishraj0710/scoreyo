<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D CMAT - Clipboard theme -->
  <circle cx="100" cy="100" r="65" fill="#FEF3C7" opacity="0.4"/>
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Clipboard -->
  <g transform="translate(100, 110)">
    <rect x="-20" y="-25" width="40" height="50" rx="3" fill="#1E40AF"/>
    <rect x="-18" y="-23" width="36" height="46" rx="2" fill="white"/>

    <!-- Clip -->
    <rect x="-8" y="-28" width="16" height="6" rx="2" fill="#64748B"/>

    <!-- Checkboxes -->
    <rect x="-12" y="-14" width="6" height="6" rx="1" fill="#10B981"/>
    <text x="-9" y="-8" font-size="5" fill="white" text-anchor="middle">✓</text>

    <rect x="-12" y="-4" width="6" height="6" rx="1" fill="#10B981"/>
    <text x="-9" y="2" font-size="5" fill="white" text-anchor="middle">✓</text>

    <rect x="-12" y="6" width="6" height="6" rx="1" fill="#E5E7EB"/>

    <!-- Lines -->
    <line x1="-2" y1="-11" x2="12" y2="-11" stroke="#9CA3AF" stroke-width="1.5"/>
    <line x1="-2" y1="-1" x2="12" y2="-1" stroke="#9CA3AF" stroke-width="1.5"/>
    <line x1="-2" y1="9" x2="12" y2="9" stroke="#9CA3AF" stroke-width="1.5"/>
  </g>

  <!-- Badge -->
  <circle cx="100" cy="70" r="18" fill="#1E40AF"/>
  <text x="100" y="72" font-family="Arial" font-size="8" font-weight="bold" fill="white" text-anchor="middle">CMAT</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#60A5FA" stroke-width="2"/>
</svg>
