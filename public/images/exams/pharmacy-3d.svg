<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D Pharmacy illustration with medicine bottle, pills, and mortar -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#D1FAE5" opacity="0.4"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Medicine bottle -->
  <g transform="translate(100, 110)">
    <!-- Bottle body -->
    <rect x="-18" y="-10" width="36" height="45" rx="4" fill="#10B981"/>
    <rect x="-18" y="-10" width="36" height="45" rx="4" fill="url(#bottleGradient)"/>

    <!-- Bottle neck -->
    <rect x="-8" y="-18" width="16" height="10" rx="2" fill="#059669"/>

    <!-- Cap -->
    <rect x="-10" y="-22" width="20" height="5" rx="2" fill="#DC2626"/>

    <!-- Label -->
    <rect x="-14" y="0" width="28" height="25" rx="2" fill="white"/>
    <line x1="-10" y1="5" x2="10" y2="5" stroke="#10B981" stroke-width="1.5"/>
    <line x1="-10" y1="10" x2="10" y2="10" stroke="#10B981" stroke-width="1"/>
    <line x1="-10" y1="14" x2="5" y2="14" stroke="#10B981" stroke-width="1"/>

    <!-- Rx symbol -->
    <text x="0" y="23" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#10B981" text-anchor="middle">Rx</text>
  </g>

  <!-- Pills/Capsules -->
  <g transform="translate(55, 100)">
    <!-- Capsule 1 (red-white) -->
    <ellipse cx="-5" cy="-5" rx="8" ry="5" fill="#DC2626"/>
    <path d="M -5 -10 A 8 5 0 0 1 -5 0" fill="#DC2626"/>
    <path d="M -5 0 A 8 5 0 0 1 -5 10" fill="white"/>
    <ellipse cx="-5" cy="5" rx="8" ry="5" fill="white"/>

    <!-- Capsule 2 (blue-yellow) -->
    <ellipse cx="6" cy="0" rx="8" ry="5" fill="#3B82F6"/>
    <path d="M 6 -10 A 8 5 0 0 1 6 0" fill="#3B82F6"/>
    <path d="M 6 0 A 8 5 0 0 1 6 10" fill="#FCD34D"/>
    <ellipse cx="6" cy="5" rx="8" ry="5" fill="#FCD34D"/>

    <!-- Round pill -->
    <circle cx="0" cy="12" r="5" fill="#EC4899"/>
    <circle cx="0" cy="12" r="4" fill="#F9A8D4" opacity="0.6"/>
  </g>

  <!-- Mortar and Pestle -->
  <g transform="translate(145, 105)">
    <!-- Mortar (bowl) -->
    <ellipse cy="10" rx="18" ry="6" fill="#64748B"/>
    <path d="M -18 10 L -15 -5 L 15 -5 L 18 10 Z" fill="#94A3B8"/>
    <ellipse cy="-5" rx="15" ry="5" fill="#CBD5E1"/>

    <!-- Herbs/powder inside -->
    <ellipse cy="-2" rx="10" ry="3" fill="#10B981" opacity="0.6"/>

    <!-- Pestle -->
    <g transform="rotate(-25)">
      <rect x="8" y="-20" width="6" height="25" rx="2" fill="#78350F"/>
      <ellipse cx="11" cy="-20" rx="4" ry="3" fill="#92400E"/>
      <ellipse cx="11" cy="5" rx="5" ry="4" fill="#A16207"/>
    </g>
  </g>

  <!-- Syringe -->
  <g transform="translate(55, 135)">
    <!-- Barrel -->
    <rect x="-15" y="-4" width="25" height="8" rx="2" fill="#DBEAFE"/>
    <rect x="-13" y="-3" width="21" height="6" rx="1" fill="#F0F9FF"/>

    <!-- Plunger -->
    <rect x="-18" y="-2" width="4" height="4" fill="#3B82F6"/>

    <!-- Needle -->
    <path d="M 10 -1 L 18 0 L 10 1 Z" fill="#94A3B8"/>

    <!-- Measurement marks -->
    <line x1="-8" y1="-4" x2="-8" y2="4" stroke="#3B82F6" stroke-width="0.5"/>
    <line x1="-3" y1="-4" x2="-3" y2="4" stroke="#3B82F6" stroke-width="0.5"/>
    <line x1="2" y1="-4" x2="2" y2="4" stroke="#3B82F6" stroke-width="0.5"/>
  </g>

  <!-- Medical cross -->
  <circle cx="145" cy="140" r="14" fill="#DC2626"/>
  <rect x="141" y="132" width="8" height="16" rx="2" fill="white"/>
  <rect x="137" y="136" width="16" height="8" rx="2" fill="white"/>

  <!-- Test tubes -->
  <g transform="translate(55, 80)">
    <!-- Tube 1 -->
    <rect x="-8" y="-15" width="6" height="25" rx="2" fill="#DBEAFE" opacity="0.8"/>
    <rect x="-8" y="5" width="6" height="5" fill="#3B82F6" opacity="0.7"/>

    <!-- Tube 2 -->
    <rect x="2" y="-15" width="6" height="25" rx="2" fill="#FEE2E2" opacity="0.8"/>
    <rect x="2" y="5" width="6" height="5" fill="#DC2626" opacity="0.7"/>

    <!-- Rack -->
    <rect x="-10" y="10" width="20" height="3" fill="#78350F"/>
  </g>

  <!-- Medicine box/packet -->
  <rect x="130" y="130" width="30" height="25" rx="3" fill="white" stroke="#E5E7EB" stroke-width="2"/>
  <rect x="133" y="133" width="24" height="19" rx="2" fill="#D1FAE5"/>
  <line x1="137" y1="138" x2="153" y2="138" stroke="#10B981" stroke-width="1.5"/>
  <line x1="137" y1="143" x2="153" y2="143" stroke="#10B981" stroke-width="1"/>
  <line x1="137" y1="147" x2="148" y2="147" stroke="#10B981" stroke-width="1"/>

  <!-- GPAT/Pharmacy badge -->
  <circle cx="145" cy="70" r="16" fill="#8B5CF6"/>
  <text x="145" y="73" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">GPAT</text>
  <circle cx="145" cy="70" r="13" fill="none" stroke="#F3E8FF" stroke-width="2"/>

  <!-- Dropper -->
  <g transform="translate(48, 95) rotate(15)">
    <rect x="-1.5" y="0" width="3" height="20" fill="#DBEAFE" opacity="0.8"/>
    <rect x="-2" y="-8" width="4" height="8" fill="#DC2626"/>
    <circle cy="-8" r="3" fill="#FCA5A5"/>
    <path d="M -1.5 20 L 0 24 L 1.5 20 Z" fill="#94A3B8"/>
  </g>

  <defs>
    <linearGradient id="bottleGradient" x1="100" y1="92" x2="100" y2="145">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#047857" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
</svg>
