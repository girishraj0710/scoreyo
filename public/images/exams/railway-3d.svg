<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D Railway illustration with train, tracks, and signal -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#FEE2E2" opacity="0.4"/>

  <!-- Train shadow -->
  <ellipse cx="100" cy="155" rx="55" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Train engine -->
  <rect x="70" y="100" width="60" height="40" rx="6" fill="#DC2626"/>
  <rect x="70" y="100" width="60" height="40" rx="6" fill="url(#trainGradient)"/>

  <!-- Train windows -->
  <rect x="78" y="108" width="18" height="16" rx="3" fill="#DBEAFE" opacity="0.9"/>
  <rect x="104" y="108" width="18" height="16" rx="3" fill="#DBEAFE" opacity="0.9"/>
  <line x1="87" y1="108" x2="87" y2="124" stroke="#1E40AF" stroke-width="1.5"/>
  <line x1="113" y1="108" x2="113" y2="124" stroke="#1E40AF" stroke-width="1.5"/>

  <!-- Train roof -->
  <path d="M 68 100 L 75 90 L 125 90 L 132 100 Z" fill="#991B1B"/>

  <!-- Train wheels -->
  <circle cx="85" cy="140" r="8" fill="#1E293B"/>
  <circle cx="85" cy="140" r="5" fill="#64748B"/>
  <circle cx="115" cy="140" r="8" fill="#1E293B"/>
  <circle cx="115" cy="140" r="5" fill="#64748B"/>

  <!-- Connecting rod -->
  <rect x="83" y="138" width="34" height="4" fill="#475569"/>

  <!-- Railway tracks -->
  <g transform="translate(100, 148)">
    <!-- Rail 1 -->
    <rect x="-45" y="0" width="90" height="3" rx="1" fill="#78350F"/>
    <!-- Rail 2 -->
    <rect x="-45" y="8" width="90" height="3" rx="1" fill="#78350F"/>

    <!-- Sleepers -->
    <rect x="-40" y="-2" width="6" height="15" fill="#92400E"/>
    <rect x="-20" y="-2" width="6" height="15" fill="#92400E"/>
    <rect x="0" y="-2" width="6" height="15" fill="#92400E"/>
    <rect x="20" y="-2" width="6" height="15" fill="#92400E"/>
    <rect x="35" y="-2" width="6" height="15" fill="#92400E"/>
  </g>

  <!-- Railway signal -->
  <g transform="translate(145, 100)">
    <!-- Pole -->
    <rect x="-2" y="0" width="4" height="50" fill="#64748B"/>

    <!-- Signal box -->
    <rect x="-10" y="-20" width="20" height="22" rx="2" fill="#1E293B"/>

    <!-- Signal lights -->
    <circle cx="0" cy="-16" r="4" fill="#10B981"/>
    <circle cx="0" cy="-16" r="3" fill="#34D399" opacity="0.8"/>

    <circle cx="0" cy="-8" r="4" fill="#1E293B" stroke="#FCD34D" stroke-width="1.5"/>

    <circle cx="0" cy="0" r="4" fill="#1E293B" stroke="#DC2626" stroke-width="1.5"/>
  </g>

  <!-- RRB Logo/Badge -->
  <circle cx="55" cy="90" r="20" fill="#1E40AF"/>
  <circle cx="55" cy="90" r="20" fill="url(#badgeGradient)"/>
  <text x="55" y="92" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">RRB</text>
  <circle cx="55" cy="90" r="16" fill="none" stroke="#DBEAFE" stroke-width="2"/>

  <!-- Station building -->
  <rect x="135" y="130" width="35" height="25" rx="3" fill="#8B5CF6"/>
  <rect x="135" y="130" width="35" height="25" rx="3" fill="url(#stationGradient)"/>

  <!-- Station windows -->
  <rect x="140" y="136" width="8" height="10" rx="1" fill="#F3E8FF" opacity="0.8"/>
  <rect x="152" y="136" width="8" height="10" rx="1" fill="#F3E8FF" opacity="0.8"/>

  <!-- Station roof -->
  <path d="M 133 130 L 152.5 120 L 172 130 Z" fill="#7C3AED"/>

  <!-- Platform -->
  <rect x="130" y="155" width="45" height="4" fill="#D97706"/>

  <!-- Ticket -->
  <g transform="translate(50, 130)">
    <rect x="-12" y="-8" width="24" height="16" rx="2" fill="#FCD34D"/>
    <rect x="-10" y="-6" width="20" height="12" rx="1" fill="white"/>
    <line x1="-8" y1="-3" x2="8" y2="-3" stroke="#78350F" stroke-width="1"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#78350F" stroke-width="1"/>
    <line x1="-8" y1="3" x2="5" y2="3" stroke="#78350F" stroke-width="1"/>

    <!-- Ticket notches -->
    <circle cx="-12" cy="0" r="2" fill="#F8F9FA"/>
    <circle cx="12" cy="0" r="2" fill="#F8F9FA"/>
  </g>

  <!-- Speed indicator -->
  <circle cx="145" cy="65" r="14" fill="#FBBF24"/>
  <text x="145" y="70" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">⚡</text>

  <defs>
    <linearGradient id="trainGradient" x1="100" y1="100" x2="100" y2="140">
      <stop offset="0%" stop-color="#FCA5A5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#991B1B" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="badgeGradient" x1="55" y1="70" x2="55" y2="110">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1E40AF" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="stationGradient" x1="152" y1="130" x2="152" y2="155">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
</svg>
