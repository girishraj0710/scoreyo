<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D XAT - Briefcase theme -->
  <circle cx="100" cy="100" r="65" fill="#FEF3C7" opacity="0.4"/>
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Briefcase -->
  <g transform="translate(100, 110)">
    <rect x="-28" y="-12" width="56" height="32" rx="4" fill="#92400E"/>
    <rect x="-26" y="-10" width="52" height="28" rx="3" fill="#D97706"/>

    <!-- Handle -->
    <path d="M -12 -12 Q 0 -20 12 -12" stroke="#92400E" stroke-width="4" fill="none"/>

    <!-- Lock -->
    <rect x="-3" y="8" width="6" height="8" rx="2" fill="#FCD34D"/>
    <circle cy="8" r="3" fill="#F59E0B"/>

    <!-- Clasps -->
    <rect x="-26" y="2" width="4" height="6" rx="1" fill="#F59E0B"/>
    <rect x="22" y="2" width="4" height="6" rx="1" fill="#F59E0B"/>
  </g>

  <!-- Badge -->
  <circle cx="100" cy="70" r="18" fill="#D97706"/>
  <text x="100" y="72" font-family="Arial" font-size="10" font-weight="bold" fill="white" text-anchor="middle">XAT</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#FCD34D" stroke-width="2"/>
</svg>
