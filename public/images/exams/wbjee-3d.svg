<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D WBJEE - Book/Education theme for West Bengal (from emoji: 📖) -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#FEF3C7" opacity="0.4"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Large Open Book (center) -->
  <g transform="translate(100, 110)">
    <!-- Left page -->
    <path d="M -30 -20 L -30 20 Q -25 24 0 24 L 0 -20 Z" fill="#FEF3C7"/>
    <path d="M -30 -20 L -30 20 Q -25 24 0 24 L 0 -20 Z" fill="url(#bookLeftGradient)"/>

    <!-- Right page -->
    <path d="M 0 -20 L 0 24 Q 25 24 30 20 L 30 -20 Z" fill="#FEF3C7"/>
    <path d="M 0 -20 L 0 24 Q 25 24 30 20 L 30 -20 Z" fill="url(#bookRightGradient)"/>

    <!-- Page lines (left page) -->
    <line x1="-24" y1="-12" x2="-6" y2="-12" stroke="#D97706" stroke-width="1"/>
    <line x1="-24" y1="-6" x2="-6" y2="-6" stroke="#D97706" stroke-width="1"/>
    <line x1="-24" y1="0" x2="-6" y2="0" stroke="#D97706" stroke-width="1"/>
    <line x1="-24" y1="6" x2="-6" y2="6" stroke="#D97706" stroke-width="1"/>
    <line x1="-24" y1="12" x2="-18" y2="12" stroke="#D97706" stroke-width="1"/>

    <!-- Math formulas (right page) -->
    <text x="15" y="-8" font-family="Georgia, serif" font-size="6" fill="#7C2D12" text-anchor="middle">E=mc²</text>
    <text x="15" y="0" font-family="Georgia, serif" font-size="6" fill="#7C2D12" text-anchor="middle">∫f(x)dx</text>
    <text x="15" y="8" font-family="Georgia, serif" font-size="6" fill="#7C2D12" text-anchor="middle">a²+b²=c²</text>

    <!-- Spine shadow -->
    <line x1="0" y1="-20" x2="0" y2="24" stroke="#92400E" stroke-width="2"/>

    <!-- Page curl -->
    <path d="M 28 16 Q 26 18 24 18 L 24 20 Q 28 20 30 18" fill="#E0E7EB" opacity="0.8"/>
  </g>

  <!-- Stack of books -->
  <g transform="translate(55, 95)">
    <rect x="-14" y="6" width="28" height="8" rx="2" fill="#DC2626"/>
    <text y="12" font-family="Arial, sans-serif" font-size="5" font-weight="bold" fill="white" text-anchor="middle">PHYSICS</text>

    <rect x="-14" y="-2" width="28" height="8" rx="2" fill="#3B82F6"/>
    <text y="4" font-family="Arial, sans-serif" font-size="5" font-weight="bold" fill="white" text-anchor="middle">CHEMISTRY</text>

    <rect x="-14" y="-10" width="28" height="8" rx="2" fill="#10B981"/>
    <text y="-4" font-family="Arial, sans-serif" font-size="5" font-weight="bold" fill="white" text-anchor="middle">MATH</text>
  </g>

  <!-- Quill pen -->
  <g transform="translate(145, 95)">
    <!-- Feather -->
    <ellipse cx="-2" cy="-4" rx="8" ry="20" fill="#8B5CF6" transform="rotate(25 145 95)"/>
    <ellipse cx="-2" cy="-4" rx="6" ry="18" fill="#A78BFA" transform="rotate(25 145 95)"/>

    <!-- Feather details -->
    <path d="M 0 -18 Q -4 -10 -6 0" stroke="#C4B5FD" stroke-width="1" fill="none" transform="rotate(25 145 95)"/>
    <path d="M 0 -18 Q 2 -10 4 0" stroke="#C4B5FD" stroke-width="1" fill="none" transform="rotate(25 145 95)"/>

    <!-- Quill tip -->
    <path d="M 8 12 L 10 18 L 6 16 Z" fill="#1E293B"/>

    <!-- Ink drop -->
    <circle cx="10" cy="20" r="1.5" fill="#1E293B"/>
  </g>

  <!-- Scroll/Certificate -->
  <g transform="translate(55, 140)">
    <rect x="-16" y="-10" width="32" height="20" rx="2" fill="#FEF3C7"/>

    <!-- Scroll handles -->
    <rect x="-18" y="-10" width="2" height="20" fill="#92400E"/>
    <rect x="16" y="-10" width="2" height="20" fill="#92400E"/>

    <!-- Text -->
    <line x1="-12" y1="-5" x2="12" y2="-5" stroke="#7C2D12" stroke-width="1"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#7C2D12" stroke-width="1"/>
    <line x1="-12" y1="5" x2="8" y2="5" stroke="#7C2D12" stroke-width="1"/>

    <!-- WB seal -->
    <circle cx="10" cy="6" r="3" fill="#10B981"/>
    <text x="10" y="8" font-family="Arial, sans-serif" font-size="3" font-weight="bold" fill="white" text-anchor="middle">WB</text>
  </g>

  <!-- Inkwell -->
  <g transform="translate(145, 140)">
    <ellipse cy="12" rx="10" ry="4" fill="#1E293B"/>
    <path d="M -10 12 L -8 -4 Q -6 -8 0 -8 Q 6 -8 8 -4 L 10 12 Z" fill="#475569"/>

    <!-- Ink -->
    <ellipse cy="8" rx="8" ry="3" fill="#1E40AF"/>

    <!-- Quill in inkwell -->
    <line x1="0" y1="-8" x2="-4" y2="-16" stroke="#8B5CF6" stroke-width="2"/>
    <ellipse cx="-4" cy="-16" rx="3" ry="6" fill="#A78BFA" transform="rotate(-30 141 124)"/>
  </g>

  <!-- Magnifying glass (knowledge/research) -->
  <g transform="translate(55, 65)">
    <circle r="12" fill="none" stroke="#64748B" stroke-width="3"/>
    <circle r="10" fill="#DBEAFE" opacity="0.5"/>

    <!-- Highlight -->
    <circle cx="-4" cy="-4" r="4" fill="white" opacity="0.7"/>

    <!-- Handle -->
    <rect x="8" y="8" width="3" height="12" rx="1.5" fill="#64748B" transform="rotate(45 55 65)"/>
  </g>

  <!-- Graduation cap -->
  <g transform="translate(145, 65)">
    <circle r="14" fill="#1E40AF" opacity="0.3"/>

    <!-- Cap board -->
    <rect x="-16" y="-4" width="32" height="3" fill="#1E293B"/>
    <path d="M -16 -4 L -18 -6 L 18 -6 L 16 -4 Z" fill="#475569"/>

    <!-- Cap top -->
    <circle cy="-6" r="7" fill="#1E40AF"/>

    <!-- Tassel -->
    <line x1="8" y1="-6" x2="8" y2="2" stroke="#FCD34D" stroke-width="2"/>
    <circle cx="8" cy="4" r="2.5" fill="#F59E0B"/>
  </g>

  <!-- WBJEE Badge -->
  <circle cx="100" cy="70" r="18" fill="#10B981"/>
  <text x="100" y="68" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white" text-anchor="middle">WB</text>
  <text x="100" y="77" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#D1FAE5" text-anchor="middle">JEE</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#6EE7B7" stroke-width="2"/>

  <!-- Knowledge lamp -->
  <rect x="75" y="148" width="50" height="7" rx="2" fill="#F59E0B"/>
  <text x="100" y="153.5" font-family="Arial, sans-serif" font-size="5" font-weight="bold" fill="white" text-anchor="middle">WEST BENGAL</text>

  <defs>
    <linearGradient id="bookLeftGradient" x1="70" y1="90" x2="100" y2="134">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FEF3C7" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="bookRightGradient" x1="130" y1="90" x2="100" y2="134">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FEF3C7" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
</svg>
