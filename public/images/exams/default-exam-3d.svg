<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="16" ry="3" fill="#000000" opacity="0.1"/>

  <!-- Certificate/Diploma -->
  <g transform="translate(32, 32)">
    <!-- Certificate paper -->
    <rect x="-16" y="-14" width="32" height="28" rx="1" fill="url(#paper-gradient)"/>

    <!-- Border decoration -->
    <rect x="-15" y="-13" width="30" height="26" rx="0.5" stroke="url(#border-gradient)" stroke-width="1" fill="none"/>

    <!-- Ribbon/Seal -->
    <g transform="translate(0, 8)">
      <!-- Seal circle -->
      <circle cx="0" cy="0" r="5" fill="url(#seal-gradient)"/>

      <!-- Star in seal -->
      <path d="M 0 -3 L 1 -1 L 3 -1 L 1.5 0.5 L 2 3 L 0 1.5 L -2 3 L -1.5 0.5 L -3 -1 L -1 -1 Z" fill="#F1C40F"/>

      <!-- Ribbon tails -->
      <path d="M -3 4 L -4 10 L -2 8 L 0 10 L 2 8 L 4 10 L 3 4" fill="url(#ribbon-gradient)"/>
    </g>

    <!-- Text lines -->
    <line x1="-12" y1="-8" x2="12" y2="-8" stroke="#7F8C8D" stroke-width="1" opacity="0.3"/>
    <line x1="-10" y1="-4" x2="10" y2="-4" stroke="#7F8C8D" stroke-width="1" opacity="0.3"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#7F8C8D" stroke-width="1" opacity="0.3"/>

    <!-- Highlight -->
    <ellipse cx="-8" cy="-10" rx="4" ry="2" fill="white" opacity="0.15"/>
  </g>

  <defs>
    <linearGradient id="paper-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ECF0F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="border-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2874A6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="seal-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ribbon-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C0392B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A93226;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
