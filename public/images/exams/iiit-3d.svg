<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D IIIT - Desktop Computer theme (from emoji: 🖥️) -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#E0F2FE" opacity="0.4"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Desktop Computer Monitor (center) -->
  <g transform="translate(100, 105)">
    <!-- Monitor frame -->
    <rect x="-32" y="-26" width="64" height="42" rx="3" fill="#1E293B"/>
    <rect x="-30" y="-24" width="60" height="38" rx="2" fill="#0F172A"/>

    <!-- Screen -->
    <rect x="-28" y="-22" width="56" height="34" rx="1" fill="#0369A1"/>
    <rect x="-28" y="-22" width="56" height="34" rx="1" fill="url(#screenGradient)"/>

    <!-- Code on screen -->
    <text x="-24" y="-14" font-family="Courier, monospace" font-size="4" fill="#10B981">{'<html>'}</text>
    <text x="-24" y="-8" font-family="Courier, monospace" font-size="4" fill="#FCD34D">{'  <body>'}</text>
    <text x="-24" y="-2" font-family="Courier, monospace" font-size="4" fill="#FCD34D">{'    code'}</text>
    <text x="-24" y="4" font-family="Courier, monospace" font-size="4" fill="#FCD34D">{'  </body>'}</text>
    <text x="-24" y="10" font-family="Courier, monospace" font-size="4" fill="#10B981">{'</html>'}</text>

    <!-- Screen reflection -->
    <rect x="-26" y="-20" width="20" height="10" rx="2" fill="white" opacity="0.1"/>

    <!-- Stand -->
    <rect x="-6" y="16" width="12" height="8" fill="#475569"/>
    <path d="M -6 24 L -16 28 L 16 28 L 6 24 Z" fill="#64748B"/>

    <!-- Power indicator -->
    <circle cx="-26" cy="14" r="1.5" fill="#10B981"/>
  </g>

  <!-- Keyboard -->
  <g transform="translate(100, 145)">
    <rect x="-28" y="-6" width="56" height="12" rx="2" fill="#1E293B"/>

    <!-- Keys -->
    <rect x="-24" y="-4" width="4" height="3" rx="0.5" fill="#475569"/>
    <rect x="-18" y="-4" width="4" height="3" rx="0.5" fill="#475569"/>
    <rect x="-12" y="-4" width="4" height="3" rx="0.5" fill="#475569"/>
    <rect x="-6" y="-4" width="4" height="3" rx="0.5" fill="#475569"/>
    <rect x="0" y="-4" width="4" height="3" rx="0.5" fill="#475569"/>
    <rect x="6" y="-4" width="4" height="3" rx="0.5" fill="#475569"/>
    <rect x="12" y="-4" width="4" height="3" rx="0.5" fill="#475569"/>
    <rect x="18" y="-4" width="4" height="3" rx="0.5" fill="#475569"/>

    <rect x="-24" y="1" width="4" height="3" rx="0.5" fill="#475569"/>
    <rect x="-18" y="1" width="4" height="3" rx="0.5" fill="#475569"/>
    <rect x="-12" y="1" width="10" height="3" rx="0.5" fill="#475569"/>
    <rect x="0" y="1" width="4" height="3" rx="0.5" fill="#475569"/>
    <rect x="6" y="1" width="4" height="3" rx="0.5" fill="#475569"/>
    <rect x="12" y="1" width="4" height="3" rx="0.5" fill="#475569"/>
    <rect x="18" y="1" width="4" height="3" rx="0.5" fill="#475569"/>
  </g>

  <!-- Mouse -->
  <g transform="translate(55, 95)">
    <ellipse cy="0" rx="10" ry="14" fill="#1E293B"/>
    <ellipse cy="-2" rx="9" ry="12" fill="#475569"/>

    <!-- Scroll wheel -->
    <rect x="-1" y="-8" width="2" height="6" rx="1" fill="#94A3B8"/>

    <!-- Buttons -->
    <path d="M -8 -2 L -8 -10 Q -8 -12 -6 -12 L -1 -12 L -1 -2" fill="none" stroke="#64748B" stroke-width="1"/>
    <path d="M 8 -2 L 8 -10 Q 8 -12 6 -12 L 1 -12 L 1 -2" fill="none" stroke="#64748B" stroke-width="1"/>
  </g>

  <!-- Binary code -->
  <g transform="translate(145, 95)">
    <rect x="-14" y="-14" width="28" height="28" rx="2" fill="#1E293B"/>

    <text x="0" y="-8" font-family="Courier, monospace" font-size="5" fill="#10B981" text-anchor="middle">101010</text>
    <text x="0" y="-2" font-family="Courier, monospace" font-size="5" fill="#10B981" text-anchor="middle">110011</text>
    <text x="0" y="4" font-family="Courier, monospace" font-size="5" fill="#10B981" text-anchor="middle">001101</text>
    <text x="0" y="10" font-family="Courier, monospace" font-size="5" fill="#10B981" text-anchor="middle">111000</text>
  </g>

  <!-- Laptop -->
  <g transform="translate(55, 140)">
    <!-- Screen -->
    <rect x="-16" y="-14" width="32" height="20" rx="2" fill="#1E293B"/>
    <rect x="-14" y="-12" width="28" height="16" rx="1" fill="#0369A1"/>

    <!-- Code symbol on screen -->
    <text y="-2" font-family="Courier, monospace" font-size="6" fill="#10B981" text-anchor="middle">{'</>'}  </text>

    <!-- Keyboard base -->
    <rect x="-18" y="-14" width="36" height="2" fill="#475569"/>
    <rect x="-20" y="-12" width="40" height="4" fill="#64748B"/>
  </g>

  <!-- Server rack -->
  <g transform="translate(145, 140)">
    <rect x="-12" y="-12" width="24" height="24" rx="2" fill="#1E293B"/>

    <!-- Server units -->
    <rect x="-10" y="-10" width="20" height="5" rx="1" fill="#475569"/>
    <circle cx="-6" cy="-7.5" r="1" fill="#10B981"/>
    <circle cx="-2" cy="-7.5" r="1" fill="#10B981"/>

    <rect x="-10" y="-4" width="20" height="5" rx="1" fill="#475569"/>
    <circle cx="-6" cy="-1.5" r="1" fill="#F59E0B"/>
    <circle cx="-2" cy="-1.5" r="1" fill="#10B981"/>

    <rect x="-10" y="2" width="20" height="5" rx="1" fill="#475569"/>
    <circle cx="-6" cy="4.5" r="1" fill="#10B981"/>
    <circle cx="-2" cy="4.5" r="1" fill="#10B981"/>

    <rect x="-10" y="8" width="20" height="5" rx="1" fill="#475569"/>
    <circle cx="-6" cy="10.5" r="1" fill="#DC2626"/>
    <circle cx="-2" cy="10.5" r="1" fill="#10B981"/>
  </g>

  <!-- Circuit board -->
  <g transform="translate(55, 65)">
    <rect x="-14" y="-14" width="28" height="28" rx="2" fill="#059669"/>

    <!-- Circuit traces -->
    <line x1="-10" y1="-8" x2="10" y2="-8" stroke="#D1FAE5" stroke-width="2"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#D1FAE5" stroke-width="2"/>
    <line x1="-10" y1="8" x2="10" y2="8" stroke="#D1FAE5" stroke-width="2"/>
    <line x1="-4" y1="-10" x2="-4" y2="10" stroke="#D1FAE5" stroke-width="2"/>
    <line x1="4" y1="-10" x2="4" y2="10" stroke="#D1FAE5" stroke-width="2"/>

    <!-- Components -->
    <circle cx="-4" cy="-8" r="2" fill="#FCD34D"/>
    <circle cx="4" cy="0" r="2" fill="#FCD34D"/>
    <circle cx="-4" cy="8" r="2" fill="#FCD34D"/>
    <rect x="-10" y="-3" width="4" height="2" fill="#1E293B"/>
    <rect x="6" y="6" width="4" height="2" fill="#1E293B"/>
  </g>

  <!-- Wi-Fi symbol -->
  <g transform="translate(145, 65)">
    <circle r="14" fill="#3B82F6" opacity="0.2"/>

    <path d="M -10 0 Q 0 -14 10 0" stroke="#3B82F6" stroke-width="2" fill="none"/>
    <path d="M -6 0 Q 0 -8 6 0" stroke="#3B82F6" stroke-width="2" fill="none"/>
    <path d="M -2 0 Q 0 -3 2 0" stroke="#3B82F6" stroke-width="2" fill="none"/>
    <circle cy="2" r="2" fill="#3B82F6"/>
  </g>

  <!-- IIIT Badge -->
  <circle cx="100" cy="70" r="18" fill="#0369A1"/>
  <text x="100" y="70" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">IIIT</text>
  <text x="100" y="78" font-family="Arial, sans-serif" font-size="5" fill="#BAE6FD" text-anchor="middle">Computing</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#7DD3FC" stroke-width="2"/>

  <defs>
    <linearGradient id="screenGradient" x1="100" y1="79" x2="100" y2="117">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0369A1" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
</svg>
