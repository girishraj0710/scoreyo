<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D NMAT - Card index theme -->
  <circle cx="100" cy="100" r="65" fill="#FEF3C7" opacity="0.4"/>
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Card index box -->
  <g transform="translate(100, 115)">
    <rect x="-26" y="-18" width="52" height="36" rx="3" fill="#92400E"/>
    <rect x="-24" y="-16" width="48" height="32" fill="#D97706"/>

    <!-- Index cards sticking out -->
    <rect x="-20" y="-22" width="12" height="6" rx="1" fill="#FEF3C7"/>
    <rect x="-6" y="-22" width="12" height="6" rx="1" fill="#FEF3C7"/>
    <rect x="8" y="-22" width="12" height="6" rx="1" fill="#FEF3C7"/>

    <!-- Drawer handle -->
    <ellipse cy="8" rx="10" ry="3" fill="#7C2D12"/>
  </g>

  <!-- Badge -->
  <circle cx="100" cy="70" r="18" fill="#D97706"/>
  <text x="100" y="72" font-family="Arial" font-size="8" font-weight="bold" fill="white" text-anchor="middle">NMAT</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#FCD34D" stroke-width="2"/>
</svg>
