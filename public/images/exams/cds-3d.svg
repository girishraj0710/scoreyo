<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D CDS - Crossed swords theme -->
  <circle cx="100" cy="100" r="65" fill="#E0F2FE" opacity="0.4"/>
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Crossed swords -->
  <g transform="translate(100, 110)">
    <!-- Sword 1 -->
    <rect x="-3" y="-30" width="6" height="60" rx="1" fill="#94A3B8" transform="rotate(-45 100 110)"/>
    <path d="M -8 -30 L 0 -40 L 8 -30" fill="#CBD5E1" transform="rotate(-45 100 110)"/>
    <rect x="-10" y="-32" width="20" height="4" fill="#F59E0B" transform="rotate(-45 100 110)"/>

    <!-- Sword 2 -->
    <rect x="-3" y="-30" width="6" height="60" rx="1" fill="#94A3B8" transform="rotate(45 100 110)"/>
    <path d="M -8 -30 L 0 -40 L 8 -30" fill="#CBD5E1" transform="rotate(45 100 110)"/>
    <rect x="-10" y="-32" width="20" height="4" fill="#F59E0B" transform="rotate(45 100 110)"/>
  </g>

  <!-- Badge -->
  <circle cx="100" cy="70" r="18" fill="#1E40AF"/>
  <text x="100" y="72" font-family="Arial" font-size="9" font-weight="bold" fill="white" text-anchor="middle">CDS</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#60A5FA" stroke-width="2"/>
</svg>
