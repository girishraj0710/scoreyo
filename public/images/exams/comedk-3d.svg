<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D COMEDK - Microscope/Research theme (from emoji: 🔬) -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#E0F2FE" opacity="0.4"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Microscope (center) -->
  <g transform="translate(100, 110)">
    <!-- Base -->
    <ellipse cy="25" rx="28" ry="8" fill="#94A3B8"/>
    <ellipse cy="23" rx="28" ry="8" fill="#CBD5E1"/>

    <!-- Stand -->
    <rect x="-6" y="15" width="12" height="10" fill="#64748B"/>

    <!-- Stage plate -->
    <ellipse cy="15" rx="20" ry="6" fill="#94A3B8"/>
    <rect x="-18" y="13" width="36" height="4" fill="#CBD5E1"/>

    <!-- Sample slide -->
    <rect x="-12" y="11" width="24" height="2" fill="#DBEAFE"/>
    <circle cx="-6" cy="12" r="2" fill="#8B5CF6" opacity="0.6"/>
    <circle cx="6" cy="12" r="2" fill="#3B82F6" opacity="0.6"/>

    <!-- Body tube -->
    <rect x="-8" y="-20" width="16" height="35" fill="#475569"/>
    <rect x="-8" y="-20" width="16" height="35" fill="url(#microscopeGradient)"/>

    <!-- Eyepiece -->
    <rect x="-9" y="-28" width="18" height="9" rx="3" fill="#1E293B"/>
    <circle cy="-23" r="4" fill="#0C4A6E"/>

    <!-- Objective lenses -->
    <path d="M -6 10 L -10 15 L 10 15 L 6 10 Z" fill="#0C4A6E"/>
    <ellipse cy="15" rx="10" ry="3" fill="#0369A1"/>

    <!-- Focus knobs -->
    <circle cx="-12" cy="0" r="3" fill="#F59E0B"/>
    <circle cx="12" cy="0" r="3" fill="#F59E0B"/>
    <circle cx="-12" cy="6" r="3" fill="#FCD34D"/>
    <circle cx="12" cy="6" r="3" fill="#FCD34D"/>
  </g>

  <!-- Lab beaker -->
  <g transform="translate(55, 95)">
    <path d="M -12 -12 L -10 12 Q -10 16 0 18 Q 10 16 10 12 L 12 -12 Z" fill="#DBEAFE" opacity="0.8"/>
    <rect x="-10" y="-16" width="20" height="5" fill="#3B82F6" opacity="0.6"/>
    <ellipse cy="-16" rx="10" ry="3" fill="#60A5FA"/>

    <!-- Measurement marks -->
    <line x1="-8" y1="0" x2="-6" y2="0" stroke="#0369A1" stroke-width="1"/>
    <line x1="-8" y1="6" x2="-6" y2="6" stroke="#0369A1" stroke-width="1"/>
  </g>

  <!-- Cell structure -->
  <g transform="translate(145, 95)">
    <circle r="18" fill="#8B5CF6" opacity="0.3"/>
    <circle r="18" fill="url(#cellGradient)"/>
    <circle r="15" fill="#E9D5FF" opacity="0.6"/>

    <!-- Nucleus -->
    <circle r="6" fill="#7C3AED"/>

    <!-- Organelles -->
    <ellipse cx="-8" cy="-6" rx="4" ry="6" fill="#A78BFA" opacity="0.7"/>
    <ellipse cx="8" cy="-4" rx="5" ry="4" fill="#A78BFA" opacity="0.7"/>
    <ellipse cx="7" cy="7" rx="4" ry="5" fill="#A78BFA" opacity="0.7"/>
    <ellipse cx="-6" cy="6" rx="5" ry="4" fill="#A78BFA" opacity="0.7"/>

    <!-- Small dots -->
    <circle cx="-3" cy="-10" r="1.5" fill="#8B5CF6"/>
    <circle cx="4" cy="-12" r="1.5" fill="#8B5CF6"/>
    <circle cx="10" cy="2" r="1.5" fill="#8B5CF6"/>
  </g>

  <!-- Petri dish with bacteria -->
  <g transform="translate(55, 140)">
    <ellipse rx="20" ry="18" fill="#DBEAFE" opacity="0.7"/>
    <ellipse cy="-3" rx="20" ry="15" fill="#E0E7FF" opacity="0.8"/>

    <!-- Bacteria colonies -->
    <circle cx="-8" cy="-6" r="4" fill="#10B981" opacity="0.7"/>
    <circle cx="6" cy="-8" r="5" fill="#059669" opacity="0.7"/>
    <circle cx="8" cy="2" r="3.5" fill="#10B981" opacity="0.7"/>
    <circle cx="-6" cy="4" r="4.5" fill="#059669" opacity="0.7"/>
    <circle cx="0" cy="-2" r="3" fill="#10B981" opacity="0.7"/>
  </g>

  <!-- Test tubes rack -->
  <g transform="translate(145, 140)">
    <!-- Rack -->
    <rect x="-16" y="6" width="32" height="4" rx="1" fill="#94A3B8"/>
    <rect x="-16" y="10" width="32" height="3" fill="#CBD5E1"/>

    <!-- Test tubes -->
    <g>
      <rect x="-12" y="-8" width="6" height="18" rx="1.5" fill="#DBEAFE" opacity="0.8"/>
      <rect x="-12" y="6" width="6" height="4" fill="#DC2626" opacity="0.7"/>
      <ellipse cx="-9" cy="-8" rx="3" ry="1.5" fill="#93C5FD"/>
    </g>
    <g>
      <rect x="-3" y="-8" width="6" height="18" rx="1.5" fill="#DBEAFE" opacity="0.8"/>
      <rect x="-3" y="4" width="6" height="6" fill="#8B5CF6" opacity="0.7"/>
      <ellipse cx="0" cy="-8" rx="3" ry="1.5" fill="#93C5FD"/>
    </g>
    <g>
      <rect x="6" y="-8" width="6" height="18" rx="1.5" fill="#DBEAFE" opacity="0.8"/>
      <rect x="6" y="7" width="6" height="3" fill="#10B981" opacity="0.7"/>
      <ellipse cx="9" cy="-8" rx="3" ry="1.5" fill="#93C5FD"/>
    </g>
  </g>

  <!-- Molecular model -->
  <g transform="translate(55, 65)">
    <circle r="4" fill="#EF4444"/>
    <circle cx="-12" cy="-8" r="4" fill="#3B82F6"/>
    <circle cx="12" cy="-8" r="4" fill="#10B981"/>
    <circle cx="-10" cy="10" r="4" fill="#F59E0B"/>
    <circle cx="10" cy="10" r="4" fill="#8B5CF6"/>

    <line x1="0" y1="0" x2="-12" y2="-8" stroke="#64748B" stroke-width="2.5"/>
    <line x1="0" y1="0" x2="12" y2="-8" stroke="#64748B" stroke-width="2.5"/>
    <line x1="0" y1="0" x2="-10" y2="10" stroke="#64748B" stroke-width="2.5"/>
    <line x1="0" y1="0" x2="10" y2="10" stroke="#64748B" stroke-width="2.5"/>
  </g>

  <!-- Lab chart -->
  <g transform="translate(145, 65)">
    <rect x="-16" y="-16" width="32" height="32" rx="3" fill="white" stroke="#E5E7EB" stroke-width="2"/>

    <!-- Data points -->
    <circle cx="-10" cy="8" r="2" fill="#3B82F6"/>
    <circle cx="-4" cy="4" r="2" fill="#3B82F6"/>
    <circle cx="2" cy="-2" r="2" fill="#3B82F6"/>
    <circle cx="8" cy="-8" r="2" fill="#3B82F6"/>

    <!-- Connecting line -->
    <path d="M -10 8 L -4 4 L 2 -2 L 8 -8" stroke="#3B82F6" stroke-width="2" fill="none"/>

    <!-- Title -->
    <text y="-8" font-family="Arial, sans-serif" font-size="5" fill="#64748B" text-anchor="middle">Research</text>
  </g>

  <!-- COMEDK Badge -->
  <circle cx="100" cy="70" r="18" fill="#0369A1"/>
  <text x="100" y="67" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white" text-anchor="middle">COME</text>
  <text x="100" y="76" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#BAE6FD" text-anchor="middle">DK</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#7DD3FC" stroke-width="2"/>

  <defs>
    <linearGradient id="microscopeGradient" x1="100" y1="82" x2="100" y2="130">
      <stop offset="0%" stop-color="#64748B" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1E293B" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="cellGradient" x1="145" y1="77" x2="145" y2="113">
      <stop offset="0%" stop-color="#DDD6FE" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
</svg>
