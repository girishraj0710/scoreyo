<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D BDS - Tooth theme (from emoji: 🦷) -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#F0FDFA" opacity="0.4"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Large Tooth (center) -->
  <g transform="translate(100, 110)">
    <!-- Tooth crown -->
    <path d="M -16 -10 Q -18 -18 -12 -24 Q -8 -28 0 -28 Q 8 -28 12 -24 Q 18 -18 16 -10 L 12 0 L -12 0 Z"
          fill="white"/>
    <path d="M -16 -10 Q -18 -18 -12 -24 Q -8 -28 0 -28 Q 8 -28 12 -24 Q 18 -18 16 -10 L 12 0 L -12 0 Z"
          fill="url(#toothGradient)"/>

    <!-- Tooth surface details -->
    <path d="M -10 -22 Q -6 -24 0 -24 Q 6 -24 10 -22" stroke="#E0E7EB" stroke-width="1.5" fill="none" opacity="0.5"/>

    <!-- Shine/highlight -->
    <ellipse cx="-6" cy="-18" rx="4" ry="6" fill="white" opacity="0.7"/>

    <!-- Roots -->
    <path d="M -10 0 L -8 12 Q -8 16 -6 18 L -4 18 Q -2 16 -2 12 L 0 0" fill="#FEF3C7"/>
    <path d="M 2 0 L 2 12 Q 2 16 4 18 L 6 18 Q 8 16 8 12 L 10 0" fill="#FEF3C7"/>

    <!-- Root canals -->
    <line x1="-6" y1="2" x2="-5" y2="14" stroke="#F59E0B" stroke-width="1.5" opacity="0.6"/>
    <line x1="5" y1="2" x2="5" y2="14" stroke="#F59E0B" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Dental tools -->
  <g transform="translate(55, 95)">
    <!-- Mirror -->
    <circle cy="-8" r="8" fill="#DBEAFE"/>
    <circle cy="-8" r="6" fill="#E0F2FE"/>
    <line x1="0" y1="0" x2="0" y2="8" stroke="#64748B" stroke-width="2"/>

    <!-- Probe -->
    <line x1="8" y1="8" x2="10" y2="-8" stroke="#94A3B8" stroke-width="2"/>
    <path d="M 10 -8 L 12 -12 L 10 -11" fill="#64748B"/>
  </g>

  <!-- Toothbrush -->
  <g transform="translate(145, 95)">
    <!-- Handle -->
    <rect x="-4" y="-12" width="8" height="24" rx="2" fill="#3B82F6"/>
    <rect x="-3" y="-10" width="6" height="20" rx="1" fill="#60A5FA"/>

    <!-- Brush head -->
    <rect x="-6" y="12" width="12" height="8" rx="2" fill="white"/>

    <!-- Bristles -->
    <line x1="-4" y1="14" x2="-4" y2="18" stroke="#DBEAFE" stroke-width="1"/>
    <line x1="-2" y1="14" x2="-2" y2="19" stroke="#DBEAFE" stroke-width="1"/>
    <line x1="0" y1="14" x2="0" y2="18" stroke="#DBEAFE" stroke-width="1"/>
    <line x1="2" y1="14" x2="2" y2="19" stroke="#DBEAFE" stroke-width="1"/>
    <line x1="4" y1="14" x2="4" y2="18" stroke="#DBEAFE" stroke-width="1"/>
  </g>

  <!-- Dental chair -->
  <g transform="translate(55, 140)">
    <!-- Seat -->
    <rect x="-14" y="-6" width="28" height="12" rx="3" fill="#3B82F6"/>
    <rect x="-12" y="-4" width="24" height="8" rx="2" fill="#60A5FA"/>

    <!-- Backrest -->
    <rect x="-14" y="-16" width="4" height="12" rx="2" fill="#3B82F6"/>

    <!-- Base/stand -->
    <rect x="-4" y="6" width="8" height="6" fill="#64748B"/>
    <ellipse cy="12" rx="12" ry="3" fill="#94A3B8"/>
  </g>

  <!-- Dental X-ray -->
  <g transform="translate(145, 140)">
    <rect x="-14" y="-12" width="28" height="24" rx="2" fill="#1E293B"/>
    <rect x="-12" y="-10" width="24" height="20" rx="1" fill="#E0E7EB"/>

    <!-- X-ray teeth image -->
    <circle cx="-8" cy="-4" r="3" fill="#94A3B8" opacity="0.6"/>
    <circle cx="0" cy="-4" r="3" fill="#94A3B8" opacity="0.6"/>
    <circle cx="8" cy="-4" r="3" fill="#94A3B8" opacity="0.6"/>
    <circle cx="-8" cy="4" r="3" fill="#94A3B8" opacity="0.6"/>
    <circle cx="0" cy="4" r="3" fill="#94A3B8" opacity="0.6"/>
    <circle cx="8" cy="4" r="3" fill="#94A3B8" opacity="0.6"/>
  </g>

  <!-- Dental floss -->
  <g transform="translate(55, 65)">
    <ellipse rx="10" ry="12" fill="#10B981"/>
    <ellipse rx="8" ry="10" fill="#22C55E"/>

    <!-- Floss strand -->
    <line x1="0" y1="12" x2="0" y2="20" stroke="white" stroke-width="1.5"/>

    <!-- Label -->
    <text y="2" font-family="Arial, sans-serif" font-size="4" font-weight="bold" fill="white" text-anchor="middle">FLOSS</text>
  </g>

  <!-- Toothpaste tube -->
  <g transform="translate(145, 65)">
    <!-- Tube body -->
    <rect x="-10" y="-6" width="20" height="12" rx="2" fill="#DC2626"/>
    <rect x="-8" y="-4" width="16" height="8" fill="#EF4444"/>

    <!-- Cap -->
    <rect x="10" y="-3" width="6" height="6" rx="1" fill="white"/>

    <!-- Stripe -->
    <rect x="-8" y="0" width="16" height="2" fill="white"/>

    <!-- Text -->
    <text y="2" font-family="Arial, sans-serif" font-size="3" font-weight="bold" fill="white" text-anchor="middle">DENTAL</text>
  </g>

  <!-- BDS Badge -->
  <circle cx="100" cy="70" r="18" fill="#10B981"/>
  <text x="100" y="68" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">BDS</text>
  <text x="100" y="77" font-family="Arial, sans-serif" font-size="6" fill="#D1FAE5" text-anchor="middle">Dental</text>
  <circle cx="100" cy="70" r="15" fill="none" stroke="#6EE7B7" stroke-width="2"/>

  <!-- Smiling teeth -->
  <g transform="translate(100, 150)">
    <path d="M -20 0 Q 0 8 20 0" stroke="#64748B" stroke-width="2" fill="none"/>

    <!-- Teeth -->
    <rect x="-16" y="-2" width="4" height="4" rx="1" fill="white"/>
    <rect x="-10" y="-2" width="4" height="4" rx="1" fill="white"/>
    <rect x="-4" y="-2" width="4" height="4" rx="1" fill="white"/>
    <rect x="2" y="-2" width="4" height="4" rx="1" fill="white"/>
    <rect x="8" y="-2" width="4" height="4" rx="1" fill="white"/>
    <rect x="14" y="-2" width="4" height="4" rx="1" fill="white"/>
  </g>

  <defs>
    <linearGradient id="toothGradient" x1="100" y1="82" x2="100" y2="110">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F8FAFC" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
</svg>
