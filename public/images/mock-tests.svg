<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Stopwatch - detailed illustration -->
  <!-- Shadow -->
  <ellipse cx="60" cy="90" rx="28" ry="4" fill="#000000" opacity="0.1"/>

  <!-- Stopwatch button -->
  <rect x="57" y="28" width="6" height="6" rx="2" fill="#059669"/>
  <line x1="55" y1="32" x2="50" y2="28" stroke="#047857" stroke-width="2" stroke-linecap="round"/>
  <line x1="65" y1="32" x2="70" y2="28" stroke="#047857" stroke-width="2" stroke-linecap="round"/>

  <!-- Main circle -->
  <circle cx="60" cy="60" r="28" fill="#10B981"/>
  <circle cx="60" cy="60" r="26" fill="#D1FAE5"/>

  <!-- Inner ring -->
  <circle cx="60" cy="60" r="22" fill="none" stroke="#10B981" stroke-width="1" opacity="0.3"/>

  <!-- Hour markers -->
  <circle cx="60" cy="38" r="2" fill="#059669"/>
  <circle cx="78" cy="48" r="2" fill="#059669"/>
  <circle cx="82" cy="60" r="2" fill="#059669"/>
  <circle cx="78" cy="72" r="2" fill="#059669"/>
  <circle cx="60" cy="82" r="2" fill="#059669"/>
  <circle cx="42" cy="72" r="2" fill="#059669"/>
  <circle cx="38" cy="60" r="2" fill="#059669"/>
  <circle cx="42" cy="48" r="2" fill="#059669"/>

  <!-- Clock hands -->
  <line x1="60" y1="60" x2="60" y2="45" stroke="#047857" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="60" x2="72" y2="67" stroke="#059669" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Center circle -->
  <circle cx="60" cy="60" r="4" fill="#047857"/>
  <circle cx="60" cy="60" r="2" fill="#D1FAE5"/>

  <!-- Outer rim highlight -->
  <circle cx="60" cy="60" r="28" stroke="#047857" stroke-width="2" fill="none"/>
</svg>
