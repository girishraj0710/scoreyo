<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White circular background -->
  <circle cx="100" cy="90" r="55" fill="white" opacity="0.95"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="145" rx="40" ry="6" fill="#000000" opacity="0.1"/>

  <!-- Stopwatch button -->
  <rect x="95" y="38" width="10" height="8" rx="2" fill="#1E293B"/>
  <circle cx="100" cy="38" r="3" fill="#64748B"/>

  <!-- Stopwatch body -->
  <circle cx="100" cy="90" r="40" fill="#1E293B"/>
  <circle cx="100" cy="90" r="37" fill="white"/>

  <!-- Timer ring (progress) -->
  <circle cx="100" cy="90" r="32" fill="none" stroke="#10B981" stroke-width="4" stroke-dasharray="50 150" transform="rotate(-90 100 90)"/>

  <!-- Hour markers -->
  <circle cx="100" cy="61" r="2.5" fill="#94A3B8"/>
  <circle cx="129" cy="90" r="2.5" fill="#94A3B8"/>
  <circle cx="100" cy="119" r="2.5" fill="#94A3B8"/>
  <circle cx="71" cy="90" r="2.5" fill="#94A3B8"/>

  <!-- Clock hands -->
  <line x1="100" y1="90" x2="100" y2="70" stroke="#1E293B" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="90" x2="115" y2="95" stroke="#059669" stroke-width="3" stroke-linecap="round"/>

  <!-- Center -->
  <circle cx="100" cy="90" r="5" fill="#1E293B"/>
  <circle cx="100" cy="90" r="3" fill="white"/>

  <!-- Checkmark badge -->
  <circle cx="135" cy="105" r="12" fill="#10B981"/>
  <path d="M130 105 L133 108 L140 101" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
