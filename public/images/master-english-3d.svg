<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bookBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="170" rx="55" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Dictionary/Book -->
  <rect x="55" y="70" width="90" height="90" rx="6" fill="url(#bookBlue)"/>
  <rect x="60" y="75" width="80" height="80" rx="4" fill="#EFF6FF"/>

  <!-- Pages effect -->
  <rect x="57" y="72" width="86" height="86" rx="5" fill="#DBEAFE" opacity="0.5"/>

  <!-- Large letter display -->
  <text x="100" y="125" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#3B82F6" text-anchor="middle">A</text>

  <!-- Phonetic -->
  <text x="100" y="140" font-family="Arial" font-size="12" fill="#60A5FA" text-anchor="middle">/eɪ/</text>

  <!-- Dictionary bookmark tabs -->
  <rect x="145" y="80" width="10" height="15" fill="#EF4444"/>
  <text x="150" y="91" font-family="Arial" font-size="8" font-weight="bold" fill="#FFFFFF" text-anchor="middle">A</text>

  <rect x="145" y="100" width="10" height="15" fill="#F59E0B"/>
  <text x="150" y="111" font-family="Arial" font-size="8" font-weight="bold" fill="#FFFFFF" text-anchor="middle">B</text>

  <rect x="145" y="120" width="10" height="15" fill="#10B981"/>
  <text x="150" y="131" font-family="Arial" font-size="8" font-weight="bold" fill="#FFFFFF" text-anchor="middle">C</text>

  <!-- Graduation cap -->
  <path d="M100 50 L70 60 L100 70 L130 60 Z" fill="#1F2937"/>
  <path d="M70 60 L70 68 Q70 72 100 80 Q130 72 130 68 L130 60" fill="#374151"/>
  <rect x="128" y="58" width="3" height="20" fill="#1F2937"/>
  <circle cx="129.5" cy="78" r="3" fill="#FBBF24"/>
</svg>
