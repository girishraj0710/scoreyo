<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Simple 3D Topic Practice - Student at desk -->

  <!-- Shadow -->
  <ellipse cx="100" cy="165" rx="50" ry="8" fill="#000000" opacity="0.1"/>

  <!-- Desk -->
  <rect x="45" y="110" width="110" height="8" rx="2" fill="#8B5A3C"/>
  <rect x="45" y="118" width="110" height="40" fill="#A67C52"/>
  <rect x="47" y="120" width="106" height="36" fill="#8B5A3C"/>

  <!-- Book on desk -->
  <rect x="80" y="95" width="40" height="6" rx="1" fill="#FF9A76"/>
  <rect x="82" y="85" width="36" height="16" rx="2" fill="#FFA07A"/>
  <line x1="100" y1="85" x2="100" y2="101" stroke="#FF8C69" stroke-width="1.5"/>

  <!-- Student head -->
  <circle cx="100" cy="70" r="14" fill="#FFD4A3"/>

  <!-- Happy face -->
  <circle cx="96" cy="68" r="2" fill="#333"/>
  <circle cx="104" cy="68" r="2" fill="#333"/>
  <path d="M95 74 Q100 77 105 74" stroke="#333" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Body/Shirt -->
  <path d="M86 84 L100 80 L114 84 L114 110 L86 110 Z" fill="#4A90E2"/>

  <!-- Arms -->
  <path d="M86 88 L75 95 L75 105 L80 103" stroke="#FFD4A3" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M114 88 L125 95 L125 105 L120 103" stroke="#FFD4A3" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- Thought bubbles -->
  <circle cx="130" cy="55" r="8" fill="#FFF" stroke="#DDD" stroke-width="2"/>
  <text x="130" y="60" font-family="Arial" font-size="12" fill="#FF9A76" text-anchor="middle" font-weight="bold">A</text>
  <circle cx="145" cy="45" r="6" fill="#FFF" stroke="#DDD" stroke-width="2"/>
  <text x="145" y="49" font-family="Arial" font-size="10" fill="#4A90E2" text-anchor="middle" font-weight="bold">?</text>

  <!-- Sparkles -->
  <circle cx="60" cy="60" r="3" fill="#FFD700" opacity="0.7"/>
  <circle cx="70" cy="50" r="2" fill="#FFA500" opacity="0.6"/>
</svg>
