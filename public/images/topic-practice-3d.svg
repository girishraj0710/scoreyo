<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="pencilGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="170" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Books stack -->
  <rect x="70" y="120" width="60" height="50" rx="4" fill="url(#bookGrad)"/>
  <rect x="75" y="115" width="50" height="45" rx="3" fill="#FEF3C7"/>
  <line x1="75" y1="137" x2="125" y2="137" stroke="#FCD34D" stroke-width="1"/>
  <line x1="75" y1="145" x2="125" y2="145" stroke="#FCD34D" stroke-width="1"/>
  <line x1="75" y1="153" x2="125" y2="153" stroke="#FCD34D" stroke-width="1"/>

  <!-- Apple on books -->
  <circle cx="110" cy="100" r="10" fill="#DC2626"/>
  <ellipse cx="110" cy="105" rx="8" ry="6" fill="#EF4444"/>
  <path d="M110 90 Q108 92 108 95" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="112" cy="98" rx="3" ry="2" fill="#FCA5A5" opacity="0.6"/>

  <!-- Pencil -->
  <rect x="130" y="130" width="12" height="50" rx="2" fill="url(#pencilGrad)" transform="rotate(25 136 155)"/>
  <path d="M125 175 L130 165 L135 165 L140 175 Z" fill="#FDE68A" transform="rotate(25 132.5 170)"/>
  <path d="M130 165 L135 165 L132.5 160 Z" fill="#78350F" transform="rotate(25 132.5 163)"/>

  <!-- Star badge -->
  <circle cx="90" cy="95" r="15" fill="#FCD34D"/>
  <path d="M90 85 L92 91 L98 92 L93 96 L94 102 L90 99 L86 102 L87 96 L82 92 L88 91 Z" fill="#FFFFFF"/>
</svg>
