<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Student going to school - Simple clean style -->

  <!-- Shadow -->
  <ellipse cx="100" cy="165" rx="45" ry="7" fill="#000000" opacity="0.12"/>

  <!-- Books in backpack -->
  <rect x="85" y="95" width="8" height="15" rx="1" fill="#FB923C" transform="rotate(-15 89 102.5)"/>
  <rect x="95" y="92" width="8" height="18" rx="1" fill="#F97316" transform="rotate(5 99 101)"/>

  <!-- Backpack -->
  <path d="M75 105 Q75 95 85 95 L115 95 Q125 95 125 105 L125 140 Q125 145 120 145 L80 145 Q75 145 75 140 Z" fill="#FF9A76"/>
  <rect x="82" y="100" width="36" height="8" rx="2" fill="#FF8C69"/>
  <circle cx="88" cy="135" r="3" fill="#333" opacity="0.3"/>
  <circle cx="112" cy="135" r="3" fill="#333" opacity="0.3"/>

  <!-- Student body -->
  <rect x="85" y="118" width="30" height="35" rx="4" fill="#4A90E2"/>

  <!-- Legs -->
  <rect x="88" y="150" width="10" height="18" rx="2" fill="#2C5282"/>
  <rect x="102" y="150" width="10" height="18" rx="2" fill="#2C5282"/>
  <ellipse cx="93" cy="168" rx="6" ry="3" fill="#1A365D"/>
  <ellipse cx="107" cy="168" rx="6" ry="3" fill="#1A365D"/>

  <!-- Arms -->
  <rect x="72" y="125" width="8" height="20" rx="3" fill="#FFD4A3"/>
  <rect x="120" y="125" width="8" height="20" rx="3" fill="#FFD4A3"/>

  <!-- Head -->
  <circle cx="100" cy="95" r="18" fill="#FFD4A3"/>

  <!-- Hair -->
  <path d="M82 88 Q82 75 100 75 Q118 75 118 88" fill="#3D2817"/>

  <!-- Happy face -->
  <circle cx="93" cy="93" r="2.5" fill="#333"/>
  <circle cx="107" cy="93" r="2.5" fill="#333"/>
  <path d="M92 102 Q100 106 108 102" stroke="#333" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Book in hand -->
  <rect x="68" y="138" width="10" height="14" rx="1" fill="#FCD34D"/>
  <line x1="68" y1="145" x2="78" y2="145" stroke="#F59E0B" stroke-width="0.5"/>

  <!-- Sparkles for energy -->
  <circle cx="135" cy="80" r="3" fill="#FFD700" opacity="0.8"/>
  <circle cx="145" cy="95" r="2" fill="#FFA500" opacity="0.7"/>
  <circle cx="55" cy="85" r="2.5" fill="#FFD700" opacity="0.7"/>
</svg>
