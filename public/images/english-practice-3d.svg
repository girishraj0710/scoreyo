<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White circular background -->
  <circle cx="100" cy="90" r="55" fill="white" opacity="0.95"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="145" rx="50" ry="6" fill="#000000" opacity="0.1"/>

  <!-- Dictionary book -->
  <rect x="60" y="65" width="80" height="70" rx="4" fill="#1E293B"/>
  <rect x="63" y="68" width="74" height="64" rx="3" fill="white"/>

  <!-- Pages effect -->
  <rect x="61" y="66" width="78" height="68" rx="3.5" fill="#E2E8F0" opacity="0.5"/>

  <!-- Large letter -->
  <text x="100" y="108" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="#3B82F6" text-anchor="middle">A</text>

  <!-- Phonetic -->
  <text x="100" y="120" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">/eɪ/</text>

  <!-- Bookmark tabs -->
  <rect x="140" y="72" width="8" height="12" fill="#EF4444"/>
  <text x="144" y="81" font-family="Arial" font-size="7" font-weight="bold" fill="white" text-anchor="middle">A</text>

  <rect x="140" y="87" width="8" height="12" fill="#F59E0B"/>
  <text x="144" y="96" font-family="Arial" font-size="7" font-weight="bold" fill="white" text-anchor="middle">B</text>

  <rect x="140" y="102" width="8" height="12" fill="#10B981"/>
  <text x="144" y="111" font-family="Arial" font-size="7" font-weight="bold" fill="white" text-anchor="middle">C</text>

  <!-- Graduation cap -->
  <path d="M100 48 L75 56 L100 64 L125 56 Z" fill="#1E293B"/>
  <path d="M75 56 L75 62 Q75 65 100 72 Q125 65 125 62 L125 56" fill="#334155"/>
  <rect x="123" y="55" width="2.5" height="16" fill="#1E293B"/>
  <circle cx="124.25" cy="71" r="2.5" fill="#FCD34D"/>
</svg>
