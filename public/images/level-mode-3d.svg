<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D Level Mode with trophy and achievement badges -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#E9D5FF" opacity="0.3"/>

  <!-- Trophy shadow -->
  <ellipse cx="100" cy="160" rx="45" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Trophy base platform -->
  <ellipse cx="100" cy="145" rx="32" ry="6" fill="#7C3AED"/>
  <ellipse cx="100" cy="143" rx="32" ry="6" fill="#8B5CF6"/>

  <!-- Trophy pedestal -->
  <path d="M88 135 L112 135 L108 145 L92 145 Z" fill="#9333EA"/>
  <path d="M88 135 L112 135 L108 145 L92 145 Z" fill="url(#pedestalGradient)"/>
  <ellipse cx="100" cy="135" rx="12" ry="3" fill="#A855F7"/>

  <!-- Trophy stem -->
  <rect x="94" y="120" width="12" height="16" rx="2" fill="#9333EA"/>
  <rect x="95" y="121" width="10" height="14" fill="#A855F7"/>

  <!-- Trophy cup main body -->
  <path d="M70 65 L70 85 C70 95 80 102 100 105 C120 102 130 95 130 85 L130 65 Z"
        fill="#A855F7"/>
  <path d="M70 65 L70 85 C70 95 80 102 100 105 C120 102 130 95 130 85 L130 65 Z"
        fill="url(#trophyGradient)"/>

  <!-- Trophy handles (3D) -->
  <path d="M70 68 L60 68 C55 68 52 72 52 77 C52 82 55 86 60 86 L70 86"
        stroke="#9333EA" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M70 68 L62 68 C58 68 55 72 55 77 C55 82 58 86 62 86 L70 86"
        stroke="#A855F7" stroke-width="2" fill="none" stroke-linecap="round"/>

  <path d="M130 68 L140 68 C145 68 148 72 148 77 C148 82 145 86 140 86 L130 86"
        stroke="#9333EA" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M130 68 L138 68 C142 68 145 72 145 77 C145 82 142 86 138 86 L130 86"
        stroke="#A855F7" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Trophy rim -->
  <ellipse cx="100" cy="65" rx="30" ry="8" fill="#C084FC"/>
  <ellipse cx="100" cy="63" rx="30" ry="6" fill="#DDD6FE"/>

  <!-- Star on trophy (3D) -->
  <path d="M100 72 L102 79 L109 79 L103.5 83 L105.5 90 L100 86 L94.5 90 L96.5 83 L91 79 L98 79 Z"
        fill="#FCD34D" stroke="#F59E0B" stroke-width="2"/>
  <path d="M100 75 L101 79 L105 79 L102 81 L103 85 L100 83 L97 85 L98 81 L95 79 L99 79 Z"
        fill="#FEF3C7"/>

  <!-- Level badges on sides -->
  <circle cx="45" cy="95" r="16" fill="#8B5CF6"/>
  <text x="45" y="101" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <circle cx="45" cy="85" r="3" fill="#FCD34D"/>

  <circle cx="155" cy="95" r="16" fill="#8B5CF6"/>
  <text x="155" y="101" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">5</text>
  <circle cx="155" cy="85" r="3" fill="#FCD34D"/>

  <!-- Achievement stars -->
  <path d="M75 45 L76 48 L79 48 L76.5 50 L77.5 53 L75 51 L72.5 53 L73.5 50 L71 48 L74 48 Z" fill="#FBBF24"/>
  <path d="M125 50 L126 53 L129 53 L126.5 55 L127.5 58 L125 56 L122.5 58 L123.5 55 L121 53 L124 53 Z" fill="#FBBF24"/>

  <!-- Shine effect -->
  <path d="M85 70 Q88 78 85 85" stroke="#F3E8FF" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <defs>
    <linearGradient id="trophyGradient" x1="100" y1="65" x2="100" y2="105">
      <stop offset="0%" stop-color="#DDD6FE" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pedestalGradient" x1="100" y1="135" x2="100" y2="145">
      <stop offset="0%" stop-color="#C084FC" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#9333EA" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
