<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="level1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="level2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="level3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="170" rx="55" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Mountain peaks (levels) -->
  <path d="M30 160 L55 110 L80 160 Z" fill="url(#level1)"/>
  <path d="M65 160 L95 85 L125 160 Z" fill="url(#level2)"/>
  <path d="M110 160 L145 55 L180 160 Z" fill="url(#level3)"/>

  <!-- Level badges -->
  <circle cx="55" cy="110" r="12" fill="#FFFFFF"/>
  <text x="55" y="115" font-family="Arial" font-size="14" font-weight="bold" fill="#8B5CF6" text-anchor="middle">1</text>

  <circle cx="95" cy="85" r="12" fill="#FFFFFF"/>
  <text x="95" y="90" font-family="Arial" font-size="14" font-weight="bold" fill="#7C3AED" text-anchor="middle">2</text>

  <circle cx="145" cy="55" r="12" fill="#FFFFFF"/>
  <text x="145" y="60" font-family="Arial" font-size="14" font-weight="bold" fill="#6D28D9" text-anchor="middle">3</text>

  <!-- Flag on peak -->
  <line x1="145" y1="55" x2="145" y2="30" stroke="#7C3AED" stroke-width="2"/>
  <path d="M145 30 L145 40 L160 35 Z" fill="#FCD34D"/>

  <!-- Stars -->
  <path d="M160 70 L161 73 L164 73 L161.5 75 L162.5 78 L160 76 L157.5 78 L158.5 75 L156 73 L159 73 Z" fill="#FCD34D"/>
  <path d="M125 60 L126 62 L128 62 L126.5 63.5 L127 66 L125 64.5 L123 66 L123.5 63.5 L122 62 L124 62 Z" fill="#FBBF24"/>
</svg>
