<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White circular background -->
  <circle cx="100" cy="90" r="55" fill="white" opacity="0.95"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="145" rx="45" ry="6" fill="#000000" opacity="0.1"/>

  <!-- Trophy base -->
  <ellipse cx="100" cy="125" rx="25" ry="5" fill="#334155"/>
  <path d="M85 118 L115 118 L112 125 L88 125 Z" fill="#475569"/>
  <ellipse cx="100" cy="118" rx="15" ry="3" fill="#64748B"/>

  <!-- Trophy stem -->
  <rect x="95" y="108" width="10" height="12" rx="1.5" fill="#475569"/>
  <rect x="96" y="109" width="8" height="10" fill="#64748B"/>

  <!-- Trophy cup -->
  <path d="M75 60 L75 75 C75 82 85 88 100 90 C115 88 125 82 125 75 L125 60 Z" fill="#1E293B"/>
  <path d="M75 60 L75 75 C75 82 85 88 100 90 C115 88 125 82 125 75 L125 60 Z" fill="url(#cupGradient)"/>

  <!-- Trophy handles -->
  <path d="M75 63 L68 63 C64 63 62 66 62 70 C62 74 64 77 68 77 L75 77" stroke="#334155" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M125 63 L132 63 C136 63 138 66 138 70 C138 74 136 77 132 77 L125 77" stroke="#334155" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Trophy rim -->
  <ellipse cx="100" cy="60" rx="25" ry="6" fill="#475569"/>
  <ellipse cx="100" cy="59" rx="25" ry="5" fill="#CBD5E1"/>

  <!-- Star on cup -->
  <path d="M100 68 L101.5 73 L106.5 73 L102.5 76 L104 81 L100 78 L96 81 L97.5 76 L93.5 73 L98.5 73 Z" fill="#FCD34D"/>
  <path d="M100 70 L101 73 L104 73 L102 75 L102.5 78 L100 76.5 L97.5 78 L98 75 L96 73 L99 73 Z" fill="white"/>

  <!-- Level badges -->
  <circle cx="55" cy="90" r="12" fill="#8B5CF6"/>
  <text x="55" y="95" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">1</text>

  <circle cx="145" cy="90" r="12" fill="#A855F7"/>
  <text x="145" y="95" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">5</text>

  <!-- Achievement stars -->
  <path d="M75 45 L76 48 L79 48 L76.5 50 L77.5 53 L75 51 L72.5 53 L73.5 50 L71 48 L74 48 Z" fill="#FCD34D"/>
  <path d="M125 48 L126 51 L129 51 L126.5 53 L127.5 56 L125 54 L122.5 56 L123.5 53 L121 51 L124 51 Z" fill="#FBBF24"/>

  <defs>
    <linearGradient id="cupGradient" x1="100" y1="60" x2="100" y2="90">
      <stop offset="0%" stop-color="#E2E8F0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1E293B" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
