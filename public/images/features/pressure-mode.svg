<svg width="600" height="450" viewBox="0 0 600 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="450" fill="#FAF8F5"/>

  <!-- Decorative stress waves -->
  <circle cx="520" cy="220" r="80" fill="#DC143C" opacity="0.08"/>
  <circle cx="520" cy="220" r="110" fill="#DC143C" opacity="0.05"/>
  <circle cx="100" cy="100" r="60" fill="#F59E0B" opacity="0.1"/>

  <!-- Timer/Stopwatch -->
  <circle cx="300" cy="200" r="100" fill="white" stroke="#16213E" stroke-width="5"/>
  <circle cx="300" cy="200" r="90" fill="none" stroke="#DC143C" stroke-width="8" stroke-dasharray="283 283" stroke-dashoffset="70"/>
  
  <!-- Timer hands -->
  <line x1="300" y1="200" x2="300" y2="130" stroke="#16213E" stroke-width="5" stroke-linecap="round"/>
  <line x1="300" y1="200" x2="350" y2="220" stroke="#F26A4B" stroke-width="4" stroke-linecap="round"/>
  <circle cx="300" cy="200" r="8" fill="#16213E"/>

  <!-- Timer button on top -->
  <rect x="290" y="90" width="20" height="15" rx="3" fill="#C89B3C"/>

  <!-- Digital countdown -->
  <rect x="240" y="280" width="120" height="50" rx="8" fill="#16213E"/>
  <text x="300" y="315" fill="#DC143C" font-size="32" font-weight="bold" text-anchor="middle" font-family="'JetBrains Mono', monospace">00:14</text>

  <!-- Pressure waves radiating -->
  <path d="M 420 150 Q 440 140 460 150" stroke="#F26A4B" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M 430 170 Q 450 160 470 170" stroke="#F26A4B" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M 140 150 Q 120 140 100 150" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M 130 170 Q 110 160 90 170" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Target/focus reticle -->
  <circle cx="450" cy="250" r="40" fill="none" stroke="#DC143C" stroke-width="3"/>
  <circle cx="450" cy="250" r="25" fill="none" stroke="#DC143C" stroke-width="2"/>
  <circle cx="450" cy="250" r="8" fill="#DC143C"/>
  <line x1="410" y1="250" x2="425" y2="250" stroke="#DC143C" stroke-width="2"/>
  <line x1="475" y1="250" x2="490" y2="250" stroke="#DC143C" stroke-width="2"/>
  <line x1="450" y1="210" x2="450" y2="225" stroke="#DC143C" stroke-width="2"/>
  <line x1="450" y1="275" x2="450" y2="290" stroke="#DC143C" stroke-width="2"/>

  <!-- Progress bars showing increasing difficulty -->
  <rect x="120" y="350" width="80" height="12" rx="6" fill="#2E8B57"/>
  <rect x="220" y="350" width="100" height="12" rx="6" fill="#F59E0B"/>
  <rect x="340" y="350" width="120" height="12" rx="6" fill="#DC143C"/>

  <!-- Lightning bolt for intensity -->
  <path d="M 500 100 L 480 130 L 495 130 L 475 160 L 505 135 L 490 135 Z" fill="#FCD34D"/>

  <!-- "ADAPTIVE" badge -->
  <rect x="380" y="370" width="90" height="26" rx="13" fill="#7C3AED"/>
  <text x="425" y="390" fill="white" font-size="14" font-weight="bold" text-anchor="middle" font-family="system-ui">ADAPTIVE</text>
</svg>
