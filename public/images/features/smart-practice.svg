<svg width="600" height="500" viewBox="0 0 600 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Target/Goal circles (left side) -->
  <circle cx="200" cy="250" r="100" fill="#FEE2E2"/>
  <circle cx="200" cy="250" r="70" fill="#FECACA"/>
  <circle cx="200" cy="250" r="40" fill="#EF4444"/>
  <circle cx="200" cy="250" r="15" fill="#DC2626"/>

  <!-- Arrow hitting target -->
  <line x1="340" y1="150" x2="215" y2="235" stroke="#16213E" stroke-width="4"/>
  <polygon points="215,235 225,240 220,230" fill="#16213E"/>
  <rect x="340" y="145" width="15" height="10" rx="2" fill="#EF4444"/>

  <!-- Growth chart (right side) -->
  <line x1="360" y1="350" x2="560" y2="350" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="360" y1="200" x2="360" y2="350" stroke="#CBD5E1" stroke-width="2"/>

  <!-- Rising bars -->
  <rect x="380" y="310" width="45" height="40" rx="4" fill="#BFDBFE"/>
  <rect x="435" y="280" width="45" height="70" rx="4" fill="#93C5FD"/>
  <rect x="490" y="240" width="45" height="110" rx="4" fill="#60A5FA"/>

  <!-- Trend arrow -->
  <line x1="395" y1="315" x2="520" y2="245" stroke="#10B981" stroke-width="4" stroke-linecap="round"/>
  <polygon points="520,245 510,250 515,240" fill="#10B981"/>

  <!-- Percentage improvement -->
  <circle cx="520" cy="220" r="35" fill="#D1FAE5"/>
  <text x="520" y="230" font-family="system-ui" font-size="20" font-weight="700" fill="#10B981" text-anchor="middle">+47%</text>

  <!-- Progress indicator (top) -->
  <rect x="150" y="100" width="300" height="30" rx="15" fill="#F1F5F9"/>
  <rect x="150" y="100" width="210" height="30" rx="15" fill="#8B5CF6"/>
  <text x="305" y="120" font-family="system-ui" font-size="13" font-weight="600" fill="white" text-anchor="middle">70% Complete</text>

  <!-- Brain icon with sparkle -->
  <circle cx="480" cy="320" r="25" fill="#EEF2FF"/>
  <circle cx="475" cy="315" r="5" fill="#6366F1"/>
  <circle cx="485" cy="315" r="5" fill="#6366F1"/>
  <path d="M480 330 Q475 335 470 330" stroke="#6366F1" stroke-width="2" fill="none"/>

  <!-- AI sparkle -->
  <path d="M510 310 L512 316 L518 318 L512 320 L510 326 L508 320 L502 318 L508 316 Z" fill="#8B5CF6"/>

  <!-- Success checkmarks -->
  <circle cx="120" cy="180" r="20" fill="#D1FAE5"/>
  <path d="M112 180 L118 186 L128 176" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <circle cx="100" cy="300" r="18" fill="#DBEAFE"/>
  <path d="M93 300 L98 305 L107 296" stroke="#3B82F6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Stars for achievement -->
  <path d="M550 150 L553 160 L563 163 L553 166 L550 176 L547 166 L537 163 L547 160 Z" fill="#FCD34D"/>
  <path d="M320 200 L322 206 L328 208 L322 210 L320 216 L318 210 L312 208 L318 206 Z" fill="#C084FC"/>
</svg>
