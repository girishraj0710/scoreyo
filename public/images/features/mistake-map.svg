<svg width="600" height="500" viewBox="0 0 600 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft background -->
  <defs>
    <linearGradient id="mistakeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FEF9E7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="600" height="500" fill="url(#mistakeBg)" rx="20"/>

  <!-- Main Analysis Card -->
  <rect x="100" y="100" width="400" height="300" rx="16" fill="white" opacity="0.95"/>

  <!-- Title -->
  <text x="300" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1E293B" text-anchor="middle">Weakness Analysis</text>

  <!-- Category Bars -->
  <!-- Bar 1 - Calculation Errors -->
  <text x="130" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B">Calculation Errors</text>
  <rect x="130" y="195" width="320" height="28" rx="6" fill="#F1F5F9"/>
  <rect x="130" y="195" width="240" height="28" rx="6" fill="#EF4444"/>
  <text x="440" y="213" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#EF4444" text-anchor="end">35%</text>

  <!-- Bar 2 - Concept Gaps -->
  <text x="130" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B">Concept Gaps</text>
  <rect x="130" y="255" width="320" height="28" rx="6" fill="#F1F5F9"/>
  <rect x="130" y="255" width="192" height="28" rx="6" fill="#F59E0B"/>
  <text x="440" y="273" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#F59E0B" text-anchor="end">28%</text>

  <!-- Bar 3 - Time Pressure -->
  <text x="130" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B">Time Pressure</text>
  <rect x="130" y="315" width="320" height="28" rx="6" fill="#F1F5F9"/>
  <rect x="130" y="315" width="160" height="28" rx="6" fill="#8B5CF6"/>
  <text x="440" y="333" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#8B5CF6" text-anchor="end">23%</text>

  <!-- Bar 4 - Silly Mistakes -->
  <text x="130" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B">Silly Mistakes</text>
  <rect x="130" y="375" width="320" height="28" rx="6" fill="#F1F5F9"/>
  <rect x="130" y="375" width="96" height="28" rx="6" fill="#3B82F6"/>
  <text x="440" y="393" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#3B82F6" text-anchor="end">14%</text>

  <!-- Magnifying Glass Icon (floating) -->
  <circle cx="480" cy="160" r="32" fill="white" stroke="#64748B" stroke-width="3"/>
  <circle cx="480" cy="160" r="22" fill="#FEF3C7"/>
  <line x1="502" y1="182" x2="520" y2="200" stroke="#64748B" stroke-width="6" stroke-linecap="round"/>

  <!-- Alert icon inside glass -->
  <circle cx="480" cy="157" r="3" fill="#EF4444"/>
  <rect x="478.5" y="163" width="3" height="8" rx="1.5" fill="#EF4444"/>
</svg>
