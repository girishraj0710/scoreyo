<svg width="600" height="450" viewBox="0 0 600 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="450" fill="#FAF8F5"/>

  <!-- Decorative circles -->
  <circle cx="520" cy="80" r="60" fill="#F26A4B" opacity="0.1"/>
  <circle cx="100" cy="380" r="40" fill="#C89B3C" opacity="0.15"/>

  <!-- Book stack -->
  <rect x="150" y="280" width="180" height="30" rx="4" fill="#0EA5E9"/>
  <rect x="170" y="250" width="200" height="30" rx="4" fill="#7C3AED"/>
  <rect x="140" y="220" width="160" height="30" rx="4" fill="#F26A4B"/>

  <!-- Open book -->
  <path d="M180 200 L180 320 L300 320 L300 200 L240 220 L180 200 Z" fill="white" stroke="#16213E" stroke-width="3"/>
  <path d="M240 220 L240 320" stroke="#16213E" stroke-width="3"/>

  <!-- Book lines -->
  <line x1="200" y1="240" x2="230" y2="240" stroke="#5A6478" stroke-width="2" opacity="0.5"/>
  <line x1="200" y1="260" x2="230" y2="260" stroke="#5A6478" stroke-width="2" opacity="0.5"/>
  <line x1="200" y1="280" x2="230" y2="280" stroke="#5A6478" stroke-width="2" opacity="0.5"/>
  <line x1="250" y1="240" x2="280" y2="240" stroke="#5A6478" stroke-width="2" opacity="0.5"/>
  <line x1="250" y1="260" x2="280" y2="260" stroke="#5A6478" stroke-width="2" opacity="0.5"/>
  <line x1="250" y1="280" x2="280" y2="280" stroke="#5A6478" stroke-width="2" opacity="0.5"/>

  <!-- Lightbulb -->
  <circle cx="420" cy="150" r="50" fill="#FCD34D"/>
  <circle cx="420" cy="150" r="40" fill="white"/>
  <rect x="405" y="190" width="30" height="15" rx="3" fill="#C89B3C"/>
  <rect x="410" y="205" width="20" height="8" rx="2" fill="#16213E"/>

  <!-- Sparkles -->
  <path d="M480 120 L485 130 L495 135 L485 140 L480 150 L475 140 L465 135 L475 130 Z" fill="#F26A4B"/>
  <path d="M360 180 L363 186 L369 189 L363 192 L360 198 L357 192 L351 189 L357 186 Z" fill="#7C3AED"/>

  <!-- Checkmark -->
  <circle cx="380" cy="280" r="25" fill="#2E8B57"/>
  <path d="M370 280 L377 287 L390 274" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow -->
  <path d="M310 240 Q350 200 390 160" stroke="#F26A4B" stroke-width="3" stroke-dasharray="8,6" fill="none"/>
</svg>
