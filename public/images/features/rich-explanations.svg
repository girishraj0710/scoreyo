<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#F8F9FA"/>

  <!-- Question Card -->
  <rect x="40" y="40" width="720" height="520" rx="16" fill="white"/>
  <rect x="40" y="40" width="720" height="520" rx="16" stroke="#E2E8F0" stroke-width="2"/>

  <!-- Question Header -->
  <rect x="40" y="40" width="720" height="60" rx="16" fill="#6366F1"/>
  <text x="70" y="75" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">Question 47: Physics - Kinematics</text>
  <circle cx="700" cy="70" r="18" fill="white" opacity="0.3"/>
  <text x="700" y="77" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">?</text>

  <!-- Question Text -->
  <text x="70" y="140" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#1E293B">A particle moves with velocity v = 3t² + 2t. What is its acceleration at t = 2s?</text>

  <!-- Options -->
  <rect x="70" y="170" width="660" height="50" rx="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="100" y="202" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#991B1B">A) 10 m/s²</text>
  <circle cx="710" cy="195" r="12" fill="#DC2626"/>
  <path d="M706 195 L710 199 L718 188" stroke="white" stroke-width="2" fill="none"/>

  <rect x="70" y="230" width="660" height="50" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="100" y="262" font-family="Arial, sans-serif" font-size="15" fill="#475569">B) 14 m/s²</text>

  <rect x="70" y="290" width="660" height="50" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="3"/>
  <text x="100" y="322" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#047857">C) 14 m/s²</text>
  <circle cx="710" cy="315" r="12" fill="#10B981"/>
  <text x="710" y="321" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">✓</text>

  <rect x="70" y="350" width="660" height="50" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="100" y="382" font-family="Arial, sans-serif" font-size="15" fill="#475569">D) 18 m/s²</text>

  <!-- Explanation Section -->
  <rect x="70" y="420" width="660" height="130" rx="12" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>

  <!-- Step by Step header -->
  <circle cx="100" cy="450" r="18" fill="#3B82F6"/>
  <text x="100" y="457" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <text x="130" y="455" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E3A8A">Step-by-step explanation:</text>

  <!-- Trap Alert Badge -->
  <rect x="550" y="435" width="160" height="30" rx="15" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="630" y="456" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#D97706" text-anchor="middle">⚠️ Trap Alert</text>

  <!-- Explanation points -->
  <text x="100" y="480" font-family="Arial, sans-serif" font-size="13" fill="#1E40AF">• Acceleration a = dv/dt (differentiate velocity)</text>
  <text x="100" y="500" font-family="Arial, sans-serif" font-size="13" fill="#1E40AF">• a = d(3t² + 2t)/dt = 6t + 2</text>
  <text x="100" y="520" font-family="Arial, sans-serif" font-size="13" fill="#1E40AF">• At t = 2s: a = 6(2) + 2 = 12 + 2 = 14 m/s²</text>

  <!-- Formula box -->
  <rect x="540" y="480" width="180" height="60" rx="8" fill="white" stroke="#DBEAFE" stroke-width="2"/>
  <text x="555" y="500" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2563EB">Key Formula:</text>
  <text x="555" y="518" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1E40AF">a = dv/dt</text>
  <text x="555" y="534" font-family="Arial, sans-serif" font-size="11" fill="#64748B">Acceleration = rate of change</text>
</svg>