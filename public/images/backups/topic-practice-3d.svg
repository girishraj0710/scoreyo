<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D Topic Practice with books and pencil -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#FED7AA" opacity="0.3"/>

  <!-- Book stack shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="10" fill="#000000" opacity="0.15"/>

  <!-- Bottom book -->
  <rect x="55" y="120" width="90" height="15" rx="2" fill="#FB923C"/>
  <rect x="58" y="122" width="84" height="11" rx="1" fill="#FDBA74"/>
  <path d="M58 122 L142 122 L142 133 L58 133" fill="url(#bookGradient1)"/>

  <!-- Middle book -->
  <rect x="60" y="102" width="80" height="20" rx="2" fill="#F97316"/>
  <rect x="63" y="105" width="74" height="14" rx="1" fill="#FED7AA"/>
  <!-- Book lines -->
  <line x1="70" y1="110" x2="130" y2="110" stroke="#FB923C" stroke-width="1.5" opacity="0.6"/>
  <line x1="70" y1="114" x2="130" y2="114" stroke="#FB923C" stroke-width="1.5" opacity="0.6"/>

  <!-- Top book (open) -->
  <path d="M65 85 L65 105 Q65 107 67 107 L98 107 Q100 107 100 105 L100 87 Q100 85 98 85 Z" fill="#FB923C"/>
  <path d="M135 85 L135 105 Q135 107 133 107 L102 107 Q100 107 100 105 L100 87 Q100 85 102 85 Z" fill="#FB923C"/>

  <!-- Open book pages -->
  <rect x="68" y="88" width="30" height="16" fill="#FFF7ED"/>
  <rect x="102" y="88" width="30" height="16" fill="#FFF7ED"/>
  <!-- Page lines -->
  <line x1="72" y1="92" x2="94" y2="92" stroke="#FDBA74" stroke-width="1" opacity="0.5"/>
  <line x1="72" y1="96" x2="94" y2="96" stroke="#FDBA74" stroke-width="1" opacity="0.5"/>
  <line x1="72" y1="100" x2="90" y2="100" stroke="#FDBA74" stroke-width="1" opacity="0.5"/>
  <line x1="106" y1="92" x2="128" y2="92" stroke="#FDBA74" stroke-width="1" opacity="0.5"/>
  <line x1="106" y1="96" x2="128" y2="96" stroke="#FDBA74" stroke-width="1" opacity="0.5"/>
  <line x1="106" y1="100" x2="124" y2="100" stroke="#FDBA74" stroke-width="1" opacity="0.5"/>

  <!-- Pencil -->
  <g transform="rotate(25 145 80)">
    <rect x="140" y="50" width="12" height="45" rx="2" fill="#FCD34D"/>
    <rect x="140" y="50" width="12" height="8" rx="2" fill="#EF4444"/>
    <circle cx="146" cy="54" r="3" fill="#92400E"/>
    <path d="M146 95 L143 100 L149 100 Z" fill="#78350F"/>
    <!-- Shine -->
    <rect x="144" y="58" width="2" height="28" fill="#FEF3C7" opacity="0.6"/>
  </g>

  <!-- Light bulb icon (learning) -->
  <circle cx="50" cy="60" r="14" fill="#FCD34D" opacity="0.8"/>
  <path d="M50 50 L51 53 L53 53 L51.5 54.5 L52 57 L50 55.5 L48 57 L48.5 54.5 L47 53 L49 53 Z" fill="#FBBF24"/>

  <!-- Star icon -->
  <circle cx="150" cy="130" r="12" fill="#FBBF24" opacity="0.8"/>
  <path d="M150 123 L151 126 L154 126 L151.5 128 L152.5 131 L150 129 L147.5 131 L148.5 128 L146 126 L149 126 Z" fill="#F59E0B"/>

  <defs>
    <linearGradient id="bookGradient1" x1="58" y1="122" x2="142" y2="133">
      <stop offset="0%" stop-color="#FDBA74" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FB923C" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
