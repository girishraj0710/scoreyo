<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="guideGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="170" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Guidebook stack (3 books) -->
  <rect x="60" y="130" width="80" height="15" rx="3" fill="#B45309"/>
  <rect x="62" y="132" width="76" height="11" rx="2" fill="url(#guideGrad)"/>

  <rect x="60" y="105" width="80" height="15" rx="3" fill="#D97706"/>
  <rect x="62" y="107" width="76" height="11" rx="2" fill="url(#guideGrad)"/>

  <rect x="60" y="80" width="80" height="15" rx="3" fill="#F59E0B"/>
  <rect x="62" y="82" width="76" height="11" rx="2" fill="url(#guideGrad)"/>

  <!-- Book titles/spines -->
  <line x1="65" y1="87" x2="75" y2="87" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="65" y1="112" x2="75" y2="112" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="65" y1="137" x2="75" y2="137" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Magnifying glass -->
  <circle cx="130" cy="70" r="18" fill="#FFFFFF" stroke="#F59E0B" stroke-width="3"/>
  <circle cx="130" cy="70" r="12" fill="#FEF3C7"/>
  <line x1="142" y1="82" x2="155" y2="95" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>

  <!-- Search text inside glass -->
  <text x="130" y="74" font-family="Arial" font-size="12" font-weight="bold" fill="#F59E0B" text-anchor="middle">A+</text>

  <!-- Bookmark ribbons -->
  <rect x="90" y="65" width="6" height="20" fill="#EF4444"/>
  <path d="M90 85 L93 81 L96 85 Z" fill="#DC2626"/>

  <rect x="105" y="70" width="6" height="15" fill="#10B981"/>
  <path d="M105 85 L108 82 L111 85 Z" fill="#059669"/>

  <!-- Star rating -->
  <path d="M70 60 L71 63 L74 63 L71.5 65 L72.5 68 L70 66 L67.5 68 L68.5 65 L66 63 L69 63 Z" fill="#FBBF24"/>
  <path d="M80 60 L81 63 L84 63 L81.5 65 L82.5 68 L80 66 L77.5 68 L78.5 65 L76 63 L79 63 Z" fill="#FBBF24"/>
  <path d="M90 60 L91 63 L94 63 L91.5 65 L92.5 68 L90 66 L87.5 68 L88.5 65 L86 63 L89 63 Z" fill="#FBBF24"/>
</svg>
