  <!-- Star rating -->
  <path d="M72 55 L73 58 L76 58 L73.5 60 L74.5 63 L72 61 L69.5 63 L70.5 60 L68 58 L71 58 Z" fill="#FCD34D"/>
  <path d="M82 55 L83 58 L86 58 L83.5 60 L84.5 63 L82 61 L79.5 63 L80.5 60 L78 58 L81 58 Z" fill="#FCD34D"/>
  <path d="M92 55 L93 58 L96 58 L93.5 60 L94.5 63 L92 61 L89.5 63 L90.5 60 L88 58 L91 58 Z" fill="#FBBF24"/>
