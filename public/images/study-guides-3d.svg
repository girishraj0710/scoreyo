<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Man reading book - Simple clean style -->

  <!-- Shadow -->
  <ellipse cx="100" cy="165" rx="40" ry="7" fill="#000000" opacity="0.12"/>

  <!-- Sitting base -->
  <ellipse cx="100" cy="155" rx="30" ry="8" fill="#D97706"/>

  <!-- Legs -->
  <rect x="88" y="140" width="10" height="20" rx="3" fill="#B45309"/>
  <rect x="102" y="140" width="10" height="20" rx="3" fill="#B45309"/>
  <ellipse cx="93" cy="158" rx="7" ry="4" fill="#92400E"/>
  <ellipse cx="107" cy="158" rx="7" ry="4" fill="#92400E"/>

  <!-- Body -->
  <rect x="85" y="100" width="30" height="42" rx="4" fill="#F59E0B"/>

  <!-- Book held in front -->
  <rect x="75" y="115" width="50" height="35" rx="3" fill="#FBBF24"/>
  <rect x="78" y="118" width="44" height="29" rx="2" fill="#FEF3C7"/>

  <!-- Book spine -->
  <rect x="99" y="115" width="2" height="35" fill="#D97706"/>

  <!-- Text lines on book -->
  <line x1="82" y1="125" x2="97" y2="125" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="82" y1="132" x2="95" y2="132" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="82" y1="139" x2="97" y2="139" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>

  <line x1="103" y1="125" x2="118" y2="125" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="103" y1="132" x2="116" y2="132" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="103" y1="139" x2="118" y2="139" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Arms holding book -->
  <rect x="70" y="115" width="8" height="25" rx="3" fill="#FCD34D"/>
  <rect x="122" y="115" width="8" height="25" rx="3" fill="#FCD34D"/>

  <!-- Head -->
  <circle cx="100" cy="85" r="16" fill="#FCD34D"/>

  <!-- Hair -->
  <path d="M84 78 Q84 68 100 68 Q116 68 116 78" fill="#78350F"/>

  <!-- Focused eyes (reading) -->
  <circle cx="93" cy="85" r="2" fill="#333"/>
  <circle cx="107" cy="85" r="2" fill="#333"/>

  <!-- Slight smile -->
  <path d="M94 92 Q100 94 106 92" stroke="#333" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Thought bubble (learning) -->
  <circle cx="135" cy="70" r="12" fill="#FEF3C7"/>
  <circle cx="125" cy="82" r="5" fill="#FEF3C7"/>
  <circle cx="120" cy="88" r="3" fill="#FEF3C7"/>

  <!-- Lightbulb in thought bubble -->
  <circle cx="135" cy="70" r="6" fill="#FBBF24"/>
  <path d="M133 75 L133 77 L137 77 L137 75" fill="#F59E0B"/>

  <!-- Sparkles -->
  <circle cx="145" cy="55" r="2.5" fill="#FBBF24" opacity="0.8"/>
  <circle cx="55" cy="100" r="3" fill="#FCD34D" opacity="0.7"/>
</svg>
