<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White circular background -->
  <circle cx="100" cy="90" r="55" fill="white" opacity="0.95"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="145" rx="50" ry="6" fill="#000000" opacity="0.1"/>

  <!-- Book stack (3 books) -->
  <rect x="68" y="105" width="64" height="12" rx="2" fill="#334155"/>
  <rect x="70" y="107" width="60" height="8" fill="#64748B"/>

  <rect x="66" y="88" width="68" height="12" rx="2" fill="#475569"/>
  <rect x="68" y="90" width="64" height="8" fill="#94A3B8"/>
  <line x1="72" y1="94" x2="82" y2="94" stroke="white" stroke-width="1"/>

  <rect x="64" y="70" width="72" height="13" rx="2" fill="#1E293B"/>
  <rect x="66" y="72" width="68" height="9" fill="#CBD5E1"/>
