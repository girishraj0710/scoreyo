<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D Study Guide with book, bookmark, and highlight elements -->

  <!-- Background glow -->
  <circle cx="100" cy="100" r="65" fill="#FEF3C7" opacity="0.3"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="155" rx="55" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Book pages (layered for 3D depth) -->
  <rect x="58" y="62" width="84" height="100" rx="6" fill="#F3F4F6" transform="rotate(-3 100 110)"/>
  <rect x="56" y="60" width="84" height="100" rx="6" fill="#E5E7EB" transform="rotate(-1.5 100 110)"/>

  <!-- Main book cover -->
  <rect x="54" y="55" width="92" height="105" rx="8" fill="#F59E0B"/>
  <rect x="56" y="57" width="88" height="101" rx="7" fill="#FFFFFF"/>

  <!-- Bookmark ribbon (3D effect) -->
  <rect x="122" y="55" width="10" height="50" fill="#F59E0B" opacity="0.9"/>
  <rect x="123" y="55" width="8" height="50" fill="#FBBF24"/>
  <path d="M127 105 L123 99 L131 99 Z" fill="#F59E0B"/>

  <!-- Title bar with gradient -->
  <rect x="62" y="65" width="76" height="14" rx="4" fill="url(#titleGradient)"/>

  <!-- Content sections -->
  <!-- Chapter 1 -->
  <circle cx="68" cy="90" r="3" fill="#F59E0B"/>
  <rect x="76" y="88" width="55" height="4" rx="2" fill="#FDE68A"/>

  <rect x="76" y="98" width="60" height="3" rx="1.5" fill="#E5E7EB"/>
  <rect x="76" y="104" width="58" height="3" rx="1.5" fill="#E5E7EB"/>
  <rect x="76" y="110" width="50" height="3" rx="1.5" fill="#E5E7EB"/>

  <!-- Chapter 2 -->
  <circle cx="68" cy="123" r="3" fill="#F59E0B"/>
  <rect x="76" y="121" width="50" height="4" rx="2" fill="#FDE68A"/>

  <rect x="76" y="131" width="55" height="3" rx="1.5" fill="#E5E7EB"/>
  <rect x="76" y="137" width="52" height="3" rx="1.5" fill="#E5E7EB"/>
  <rect x="76" y="143" width="48" height="3" rx="1.5" fill="#E5E7EB"/>

  <!-- Side badges -->
  <!-- Left badge - star (key concept) -->
  <circle cx="35" cy="100" r="14" fill="#FBBF24" stroke="#F59E0B" stroke-width="2"/>
  <path d="M35 93 L36.5 97.5 L41 98 L38 101 L38.8 105.5 L35 103.2 L31.2 105.5 L32 101 L29 98 L33.5 97.5 Z" fill="#FFFFFF"/>

  <!-- Right badge - lightbulb (insights) -->
  <circle cx="165" cy="110" r="14" fill="#FCD34D"/>
  <circle cx="165" cy="108" r="7" fill="#FFFFFF" opacity="0.9"/>
  <rect x="163" y="114" width="4" height="6" rx="2" fill="#F59E0B"/>
  <line x1="158" y1="105" x2="155" y2="102" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <line x1="172" y1="105" x2="175" y2="102" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>

  <!-- Highlight marker effect -->
  <rect x="76" y="95" width="45" height="6" rx="2" fill="#FDE68A" opacity="0.4"/>

  <!-- Page corner fold (3D detail) -->
  <path d="M140 155 L146 150 L146 160 Z" fill="#F3F4F6"/>
  <path d="M140 155 L146 150 L140 150 Z" fill="#E5E7EB"/>

  <!-- Progress dots -->
  <circle cx="85" cy="175" r="3" fill="#F59E0B"/>
  <circle cx="100" cy="175" r="3" fill="#FBBF24"/>
  <circle cx="115" cy="175" r="3" fill="#FDE68A"/>

  <defs>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
  </defs>
</svg>
