<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Lightning bolt with energy - detailed illustration -->
  <!-- Shadow -->
  <ellipse cx="60" cy="90" rx="25" ry="4" fill="#000000" opacity="0.1"/>

  <!-- Energy circle background -->
  <circle cx="60" cy="55" r="32" fill="url(#energy-gradient)" opacity="0.3"/>

  <!-- Lightning bolt main -->
  <path d="M68 20 L48 55 L58 55 L52 85 L72 50 L62 50 Z"
        fill="#F43F5E"/>
  <path d="M68 20 L48 55 L58 55 L52 85 L72 50 L62 50 Z"
        stroke="#DC2626" stroke-width="2" stroke-linejoin="round"/>

  <!-- Inner lightning highlight -->
  <path d="M65 25 L50 55 L57 55 L54 75 L67 50 L62 50 Z"
        fill="#FCA5A5" opacity="0.8"/>

  <!-- Energy sparks -->
  <circle cx="42" cy="45" r="3" fill="#F43F5E"/>
  <path d="M40 43 L38 41 M44 43 L46 41" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round"/>

  <circle cx="78" cy="42" r="3" fill="#F43F5E"/>
  <path d="M76 40 L74 38 M80 40 L82 38" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round"/>

  <circle cx="38" cy="65" r="2.5" fill="#F43F5E"/>
  <path d="M36 63 L34 61" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round"/>

  <circle cx="82" cy="62" r="2.5" fill="#F43F5E"/>
  <path d="M84 60 L86 58" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Energy rings -->
  <circle cx="60" cy="55" r="35" stroke="#F43F5E" stroke-width="1.5" fill="none" opacity="0.4"/>
  <circle cx="60" cy="55" r="40" stroke="#F43F5E" stroke-width="1" fill="none" opacity="0.2"/>

  <defs>
    <radialGradient id="energy-gradient">
      <stop offset="0%" stop-color="#F43F5E" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F43F5E" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
