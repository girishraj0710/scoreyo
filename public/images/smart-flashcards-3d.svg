<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="170" rx="50" ry="8" fill="#000000" opacity="0.15"/>

  <!-- Back cards (stack effect) -->
  <rect x="75" y="105" width="50" height="60" rx="6" fill="#DDD6FE" transform="rotate(-8 100 135)"/>
  <rect x="75" y="100" width="50" height="60" rx="6" fill="#E9D5FF" transform="rotate(-4 100 130)"/>

  <!-- Front flashcard -->
  <rect x="75" y="95" width="50" height="60" rx="6" fill="#FFFFFF" stroke="url(#cardGrad)" stroke-width="3"/>

  <!-- Question side -->
  <text x="100" y="118" font-family="Arial" font-size="12" fill="#8B5CF6" text-anchor="middle" font-weight="bold">Question</text>
  <circle cx="100" cy="135" r="12" fill="#A78BFA"/>
  <text x="100" y="140" font-family="Arial" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">?</text>

  <!-- Flip indicator -->
  <path d="M110 145 L115 145 L115 150 M115 145 L110 148" stroke="#A78BFA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Answer card (flipped, behind) -->
  <rect x="130" y="70" width="50" height="60" rx="6" fill="#FFFFFF" stroke="url(#cardGrad)" stroke-width="3" opacity="0.7" transform="rotate(15 155 100)"/>
  <text x="155" y="93" font-family="Arial" font-size="12" fill="#10B981" text-anchor="middle" font-weight="bold" transform="rotate(15 155 93)">Answer</text>
  <path d="M150 105 L153 108 L160 101" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" transform="rotate(15 155 105)"/>

  <!-- AI sparkle -->
  <circle cx="60" cy="80" r="15" fill="#FBBF24"/>
  <path d="M60 72 L61 76 L65 77 L61 78 L60 82 L59 78 L55 77 L59 76 Z" fill="#FFFFFF"/>
</svg>
